<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VirtusLab — Gastón</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0a0a0c;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    color: #f5f1e8;
    font-feature-settings: 'tnum' 1, 'kern' 1;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #app-wrapper {
    width: 100%;
    min-height: 100vh;
  }
  #app {
    max-width: 1600px;
    margin: 0 auto;
    min-height: 100vh;
  }
  #app > div {
    min-height: 100vh;
    border: none !important;
  }
  .sticky-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: #16161a;
    border-bottom: 0.5px solid rgba(245,241,232,0.08);
  }
  .num {
    font-variant-numeric: tabular-nums;
    font-feature-settings: 'tnum' 1;
  }
  button, .card {
    transition: all 0.18s ease;
  }
  .header-btn-icon { display: none; }
  button:hover:not(:disabled) {
    filter: brightness(1.12);
  }
  .card:hover {
    border-color: rgba(245,241,232,0.18) !important;
  }
  button { font-family: inherit; cursor: pointer; }
  button:focus { outline: none; }
  input, textarea, select { font-family: inherit; }
  input:focus, textarea:focus, select:focus {
    border-color: #3b82f6 !important;
    outline: none;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #16161a; }
  ::-webkit-scrollbar-thumb { background: rgba(245,241,232,0.16); }

  /* ============ RESPONSIVE MOBILE ============ */
  @media (max-width: 768px) {
    #app { max-width: 100%; }

    /* Reduce all 2rem padding to 1rem */
    .sticky-header > div,
    .sticky-header div[style*="padding: 14px 2rem"],
    div[style*="padding: 1.5rem 2rem"],
    div[style*="padding: 12px 2rem"],
    div[style*="padding: 11px 2rem"],
    div[style*="padding: 6px 2rem"] {
      padding-left: 1rem !important;
      padding-right: 1rem !important;
    }

    /* Header: keep logo+actions in one row, no wrap */
    .header-row {
      flex-wrap: nowrap !important;
      gap: 8px !important;
    }
    .header-logo {
      gap: 10px !important;
      flex-shrink: 1 !important;
      min-width: 0 !important;
    }
    .header-text {
      overflow: hidden;
    }
    .header-text > div:first-child {
      font-size: 17px !important;
      letter-spacing: 1px !important;
    }
    .header-tagline {
      display: none !important;
    }
    .header-actions {
      gap: 6px !important;
    }
    /* Icon-only buttons on mobile */
    .header-btn {
      padding: 6px 8px !important;
    }
    .header-btn-label {
      display: none !important;
    }
    .header-btn-icon {
      display: inline-block !important;
    }
    .header-btn-profile {
      width: 34px;
      height: 34px;
      padding: 0 !important;
      justify-content: center !important;
      border-radius: 50% !important;
    }

    /* Nav scroll horizontal */
    .sticky-header div[style*="space-around"] {
      justify-content: flex-start !important;
      padding: 0 0.5rem !important;
    }
    .sticky-header div[style*="space-around"] button {
      padding: 12px 10px !important;
      font-size: 10px !important;
      flex-shrink: 0;
    }

    /* All grids: collapse based on column count */
    div[style*="grid-template-columns: repeat(4, 1fr)"] {
      grid-template-columns: repeat(2, 1fr) !important;
    }
    div[style*="grid-template-columns: repeat(5, 1fr)"] {
      grid-template-columns: repeat(2, 1fr) !important;
    }
    div[style*="grid-template-columns: repeat(3, 1fr)"] {
      grid-template-columns: 1fr !important;
    }
    .bars-grid {
      grid-template-columns: repeat(3, 1fr) !important;
      gap: 4px !important;
    }
    div[style*="grid-template-columns: 1fr 1fr"] {
      grid-template-columns: 1fr !important;
    }
    div[style*="grid-template-columns: 2fr 1fr"] {
      grid-template-columns: 1fr !important;
    }
    .dash-top {
      grid-template-columns: 1fr !important;
    }

    /* Weekly strip: 2 columns instead of 7 */
    div[style*="grid-template-columns: repeat(7, 1fr)"] {
      grid-template-columns: repeat(2, 1fr) !important;
    }

    /* Day expanded grid (strain/cal/macros) collapse to 1 column */
    div[style*="grid-template-columns: 1fr 1fr 1fr"] {
      grid-template-columns: repeat(3, 1fr) !important;
    }

    /* Section title padding reduce */
    div[style*="padding: 1.5rem 2rem"] {
      padding: 1rem 1rem !important;
    }

    /* Modals padding */
    div[style*="padding: 1.5rem"][style*="max-width: 560px"],
    div[style*="padding: 1.5rem"][style*="max-width: 600px"],
    div[style*="padding: 1.75rem"] {
      padding: 1.25rem 1rem !important;
    }

    /* Bigger touch targets for buttons in lists */
    button[onclick*="toggleDay"],
    button[onclick*="toggleNutritionDay"] {
      padding: 16px 14px !important;
    }

    /* Smaller numerals on mobile to save space */
    button[onclick*="toggleDay"] > div:first-child,
    button[onclick*="toggleNutritionDay"] > div:first-child {
      font-size: 16px !important;
      flex: 0 0 24px !important;
    }

    /* Sticky nav arrow indicator */
    .sticky-header div[style*="space-around"] {
      overflow-x: auto !important;
      -webkit-overflow-scrolling: touch;
    }

    /* Heatmap shrink */
    #heatmap {
      grid-template-columns: repeat(26, 1fr) !important;
    }

    /* Reduce padding inside cards */
    .card[style*="padding: 18px 20px"],
    div[style*="padding: 18px 20px"] {
      padding: 14px 14px !important;
    }

    /* Footer padding */
    div[style*="padding: 14px 1.5rem"] {
      padding: 14px 1rem !important;
    }

    /* Status menu fix - position relative on mobile */
    div[style*="position: absolute"][style*="right: 0"][style*="top: calc"] {
      right: -8px !important;
    }

    /* CHARTS: more height on mobile so they don't compress */
    div[style*="height: 220px"] {
      height: 260px !important;
    }
    div[style*="height: 200px"] {
      height: 240px !important;
    }
    div[style*="height: 380px"] {
      height: 320px !important;
    }
  }

  @media (max-width: 480px) {
    /* Even tighter for small phones */
    div[style*="grid-template-columns: 1fr 1fr 1fr"] {
      grid-template-columns: 1fr !important;
    }
    .bars-grid {
      grid-template-columns: 1fr !important;
    }
    /* Section title smaller */
    div[style*="font-size: 19px"][style*="font-weight: 500"][style*="letter-spacing: -0.2px"] {
      font-size: 17px !important;
    }
    /* Hide brand text completely on very small screens, keep icon */
    .header-text {
      display: none !important;
    }
    /* Charts a bit taller */
    div[style*="height: 220px"] {
      height: 280px !important;
    }
  }
</style>
</head>
<body>
<div id="auth-screen" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a0c; padding: 20px;">
  <div style="width: 100%; max-width: 380px; text-align: center;">
    <div style="margin-bottom: 32px;">
      <div style="font-size: 22px; letter-spacing: 3px; font-weight: 600; color: #f5f1e8; text-transform: uppercase;">VirtusLab</div>
      <div style="font-size: 10px; letter-spacing: 2px; color: #6b6962; margin-top: 6px; text-transform: uppercase;">Engineered for Peak Human Performance</div>
    </div>
    <div id="auth-error" style="display: none; background: rgba(184,64,64,0.12); border: 0.5px solid #b84040; color: #b84040; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px;"></div>
    <div id="auth-success" style="display: none; background: rgba(122,148,86,0.12); border: 0.5px solid #7a9456; color: #7a9456; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px;"></div>
    <div id="auth-form-login">
      <input id="auth-email" type="email" placeholder="Email" style="width: 100%; padding: 13px 16px; margin-bottom: 10px; background: #16161a; border: 0.5px solid rgba(245,241,232,0.08); border-radius: 6px; color: #f5f1e8; font-size: 14px; outline: none;" />
      <input id="auth-pass" type="password" placeholder="Contraseña" style="width: 100%; padding: 13px 16px; margin-bottom: 16px; background: #16161a; border: 0.5px solid rgba(245,241,232,0.08); border-radius: 6px; color: #f5f1e8; font-size: 14px; outline: none;" />
      <button onclick="handleLogin()" style="width: 100%; padding: 13px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-weight: 500;">Iniciar sesión</button>
      <div style="margin-top: 16px; font-size: 12px; color: #6b6962;">
        ¿No tenés cuenta? <a href="#" onclick="showRegister()" style="color: #3b82f6; text-decoration: none;">Registrate</a>
      </div>
    </div>
    <div id="auth-form-register" style="display: none;">
      <input id="reg-name" type="text" placeholder="Nombre completo" style="width: 100%; padding: 13px 16px; margin-bottom: 10px; background: #16161a; border: 0.5px solid rgba(245,241,232,0.08); border-radius: 6px; color: #f5f1e8; font-size: 14px; outline: none;" />
      <input id="reg-email" type="email" placeholder="Email" style="width: 100%; padding: 13px 16px; margin-bottom: 10px; background: #16161a; border: 0.5px solid rgba(245,241,232,0.08); border-radius: 6px; color: #f5f1e8; font-size: 14px; outline: none;" />
      <input id="reg-pass" type="password" placeholder="Contraseña (mín. 6 caracteres)" style="width: 100%; padding: 13px 16px; margin-bottom: 16px; background: #16161a; border: 0.5px solid rgba(245,241,232,0.08); border-radius: 6px; color: #f5f1e8; font-size: 14px; outline: none;" />
      <button onclick="handleRegister()" style="width: 100%; padding: 13px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-weight: 500;">Crear cuenta</button>
      <div style="margin-top: 16px; font-size: 12px; color: #6b6962;">
        ¿Ya tenés cuenta? <a href="#" onclick="showLogin()" style="color: #3b82f6; text-decoration: none;">Iniciá sesión</a>
      </div>
    </div>
  </div>
</div>
<div id="app-wrapper" style="display: none;"><div id="app"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ============ SUPABASE CONFIG ============
const SUPABASE_URL = 'https://pybkzlslfbwoktyvcwhk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_obpv0u23Rf4O-EChOmOg3w_jT7-C3Lf';
let _supabase = null;
let currentUser = null;

try {
  if (window.supabase && window.supabase.createClient) {
    _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } else {
    console.error('Supabase JS not loaded');
    document.getElementById('auth-error').textContent = 'Error cargando Supabase. Recargá la página.';
    document.getElementById('auth-error').style.display = 'block';
  }
} catch(e) {
  console.error('Supabase init error:', e);
}

// ============ AUTH SYSTEM ============
async function initAuth() {
  if (!_supabase) { showAuthScreen(); return; }
  const { data: { session } } = await _supabase.auth.getSession();
  if (session) {
    currentUser = session.user;
    hideAuthScreen();
    await loadUserData();
    await handleWhoopAuthCallback();
    render();
  } else {
    showAuthScreen();
  }
  // Listen for auth changes
  _supabase.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      hideAuthScreen();
      await loadUserData();
      await handleWhoopAuthCallback();
      render();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      showAuthScreen();
    }
  });
}

async function signUp(email, password, fullName) {
  const { data, error } = await _supabase.auth.signUp({
    email, password,
    options: { data: { full_name: fullName } }
  });
  if (error) throw error;
  return data;
}

async function signIn(email, password) {
  const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
  if (error) throw error;
  return data;
}

async function signOut() {
  await _supabase.auth.signOut();
  currentUser = null;
  showAuthScreen();
}

function showAuthScreen() {
  document.getElementById('app-wrapper').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

function hideAuthScreen() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-wrapper').style.display = 'block';
}

// ============ SUPABASE DATA LAYER ============
// Sessions — replaces localStorage
async function getAllSessions() {
  if (!currentUser) return [];
  const { data, error } = await _supabase
    .from('sessions')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('date', { ascending: false });
  if (error) { console.warn('Error reading sessions:', error); return []; }
  // Map DB format to app format
  return (data || []).map(s => ({
    id: s.id,
    dayIndex: s.day_index,
    date: s.date,
    exercises: s.exercises || [],
    aerobics: s.aerobics || [],
    rpe: s.rpe,
    notes: s.notes,
  }));
}

// Cache for sessions to avoid constant fetches during render
let _sessionsCache = null;
let _sessionsCacheTime = 0;
const CACHE_TTL = 5000; // 5 seconds

function getCachedSessions() {
  if (_sessionsCache && (Date.now() - _sessionsCacheTime < CACHE_TTL)) {
    return _sessionsCache;
  }
  return null;
}

function invalidateSessionsCache() {
  _sessionsCache = null;
  _sessionsCacheTime = 0;
}

async function ensureSessionsLoaded() {
  if (!_sessionsCache) {
    _sessionsCache = await getAllSessions();
    _sessionsCacheTime = Date.now();
  }
  return _sessionsCache;
}

function getSessionsForDay(dayIndex) {
  const cached = getCachedSessions();
  if (cached) return cached.filter(s => s.dayIndex === dayIndex).sort((a,b) => a.date.localeCompare(b.date));
  return []; // Will be populated after ensureSessionsLoaded
}

async function addSession(session) {
  if (!currentUser) return;
  session.id = 's_' + Date.now();
  const { error } = await _supabase.from('sessions').insert({
    id: session.id,
    user_id: currentUser.id,
    day_index: session.dayIndex,
    date: session.date,
    exercises: session.exercises,
    aerobics: session.aerobics || [],
    rpe: session.rpe,
    notes: session.notes,
  });
  if (error) console.warn('Error saving session:', error);
  invalidateSessionsCache();
}

async function deleteSession(sessionId) {
  if (!currentUser) return;
  const { error } = await _supabase.from('sessions').delete().eq('id', sessionId);
  if (error) console.warn('Error deleting session:', error);
  invalidateSessionsCache();
}

// Habit checks — daily persistence
async function loadHabitChecks(date) {
  if (!currentUser) return {};
  const { data, error } = await _supabase
    .from('habit_checks')
    .select('habit_id, done')
    .eq('user_id', currentUser.id)
    .eq('date', date);
  if (error) { console.warn('Error loading habits:', error); return {}; }
  const map = {};
  (data || []).forEach(h => { map[h.habit_id] = h.done; });
  return map;
}

async function saveHabitCheck(habitId, done, date) {
  if (!currentUser) return;
  const { error } = await _supabase
    .from('habit_checks')
    .upsert({
      user_id: currentUser.id,
      habit_id: habitId,
      date: date || todayISO(),
      done: done,
    }, { onConflict: 'user_id,habit_id,date' });
  if (error) console.warn('Error saving habit:', error);
}

// Load user data on login
async function loadUserData() {
  // Load sessions cache
  await ensureSessionsLoaded();
  // Load today's habit checks
  const checks = await loadHabitChecks(todayISO());
  habits.forEach(h => {
    if (checks[h.id] !== undefined) h.done = checks[h.id];
    else h.done = false;
  });
  // Check WHOOP connection status
  await checkWhoopConnection();
  // If WHOOP is connected, load stored data from Supabase
  if (whoopConnected) {
    await applyRealWhoopData();
    // Auto-sync in background (Nivel 2)
    autoSyncWhoopBackground();
  }
}

// Background sync — doesn't block UI, silent fail
async function autoSyncWhoopBackground() {
  if (!whoopTokens || !currentUser) return;
  try {
    const response = await fetch('/.netlify/functions/whoop-sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_token: whoopTokens.access_token,
        refresh_token: whoopTokens.refresh_token,
        expires_at: whoopTokens.expires_at,
      })
    });
    const data = await response.json();
    if (data.error) return;
    if (data.newTokens) {
      await _supabase
        .from('whoop_tokens')
        .update({
          access_token: data.newTokens.access_token,
          refresh_token: data.newTokens.refresh_token,
          expires_at: data.newTokens.expires_at,
          updated_at: new Date().toISOString(),
        })
        .eq('user_id', currentUser.id);
      whoopTokens = { ...whoopTokens, ...data.newTokens };
    }
    whoopData = {
      recovery: data.recovery || [],
      sleep: data.sleep || [],
      cycles: data.cycles || [],
      profile: data.profile || null,
      syncedAt: new Date().toISOString(),
    };
    await saveWhoopDataToSupabase(whoopData.recovery, whoopData.sleep, whoopData.cycles);
    await applyRealWhoopData();
    render();
  } catch(e) {
    console.warn('Auto-sync failed silently:', e);
  }
}

// ============ WHOOP INTEGRATION ============
let whoopConnected = false;
let whoopTokens = null;

const WHOOP_CLIENT_ID = '708dc8a7-b891-46ab-af98-5d5049a1502c';
const WHOOP_REDIRECT_URI = 'https://virtuslab1.netlify.app/.netlify/functions/whoop-callback';
const WHOOP_SCOPES = 'offline read:recovery read:sleep read:workout read:cycles read:profile read:body_measurement';

async function checkWhoopConnection() {
  if (!currentUser || !_supabase) return;
  try {
    const { data, error } = await _supabase
      .from('whoop_tokens')
      .select('*')
      .eq('user_id', currentUser.id)
      .maybeSingle();
    if (error) { console.warn('Error checking WHOOP:', error); return; }
    if (data) {
      whoopTokens = data;
      whoopConnected = true;
    } else {
      whoopConnected = false;
      whoopTokens = null;
    }
  } catch(e) {
    console.warn('WHOOP check error:', e);
  }
}

async function handleWhoopAuthCallback() {
  // Check if URL has WHOOP tokens in the hash
  if (window.location.hash && window.location.hash.includes('access_token')) {
    const params = new URLSearchParams(window.location.hash.substring(1));
    const access_token = params.get('access_token');
    const refresh_token = params.get('refresh_token');
    const expires_in = parseInt(params.get('expires_in') || '3600');

    if (access_token && refresh_token && currentUser) {
      const expires_at = new Date(Date.now() + expires_in * 1000).toISOString();
      const { error } = await _supabase
        .from('whoop_tokens')
        .upsert({
          user_id: currentUser.id,
          access_token,
          refresh_token,
          expires_at,
          updated_at: new Date().toISOString(),
        }, { onConflict: 'user_id' });
      if (error) {
        console.error('Error saving WHOOP tokens:', error);
        alert('Error guardando conexión WHOOP: ' + error.message);
      } else {
        whoopConnected = true;
        whoopTokens = { access_token, refresh_token, expires_at };
        // Clean the URL
        window.history.replaceState({}, document.title, window.location.pathname);
        alert('WHOOP conectado correctamente.');
        render();
      }
    }
  }
}

function connectWhoop() {
  const state = 'vl_' + Math.random().toString(36).substring(2, 15);
  const authUrl = 'https://api.prod.whoop.com/oauth/oauth2/auth'
    + '?client_id=' + WHOOP_CLIENT_ID
    + '&redirect_uri=' + encodeURIComponent(WHOOP_REDIRECT_URI)
    + '&response_type=code'
    + '&scope=' + encodeURIComponent(WHOOP_SCOPES)
    + '&state=' + state;
  window.location.href = authUrl;
}

async function disconnectWhoop() {
  if (!confirm('¿Desconectar WHOOP? Dejarás de recibir datos automáticos.')) return;
  if (!currentUser) return;
  const { error } = await _supabase
    .from('whoop_tokens')
    .delete()
    .eq('user_id', currentUser.id);
  if (error) {
    alert('Error: ' + error.message);
  } else {
    whoopConnected = false;
    whoopTokens = null;
    render();
  }
}

let _whoopSyncing = false;
let whoopData = null;

// Transform WHOOP API data into the legacy WHOOP_RAW format the portal uses
function transformWhoopToLegacy(recoveryArr, sleepArr, cyclesArr) {
  // Build a map by date
  const byDate = {};

  // Recovery: contains HRV, RHR, recovery score, SpO2, skin temp
  (recoveryArr || []).forEach(r => {
    const score = r.score || {};
    // Use cycle_id to match with cycle data, or derive date from created_at
    const dateStr = (r.created_at || '').split('T')[0];
    if (!dateStr) return;
    const key = dateStr.substring(5); // "MM-DD"
    if (!byDate[key]) byDate[key] = { d: key };
    byDate[key].hrv = Math.round(score.hrv_rmssd_milli || 0);
    byDate[key].rhr = Math.round(score.resting_heart_rate || 0);
    byDate[key].rec = Math.round(score.recovery_score || 0);
    byDate[key].sp = score.spo2_percentage || null;
    byDate[key].sk = score.skin_temp_celsius || null;
  });

  // Sleep: contains duration, efficiency, stages
  (sleepArr || []).forEach(s => {
    const score = s.score || {};
    const stages = score.stage_summary || {};
    const dateStr = (s.end || s.created_at || '').split('T')[0];
    if (!dateStr) return;
    const key = dateStr.substring(5);
    if (!byDate[key]) byDate[key] = { d: key };
    // sleep duration in hours
    const totalMilli = stages.total_in_bed_time_milli || 0;
    byDate[key].sl = +(totalMilli / 3600000).toFixed(2);
    byDate[key].eff = Math.round(score.sleep_efficiency_percentage || 0);
    byDate[key].reg = Math.round(score.sleep_consistency_percentage || 0);
    byDate[key].dp = Math.round((stages.total_slow_wave_sleep_time_milli || 0) / 60000);
    byDate[key].rm = Math.round((stages.total_rem_sleep_time_milli || 0) / 60000);
    byDate[key].rsp = score.respiratory_rate ? +score.respiratory_rate.toFixed(1) : null;
  });

  // Cycles: contains strain, avg HR, max HR
  (cyclesArr || []).forEach(c => {
    const score = c.score || {};
    const dateStr = (c.start || c.created_at || '').split('T')[0];
    if (!dateStr) return;
    const key = dateStr.substring(5);
    if (!byDate[key]) byDate[key] = { d: key };
    byDate[key].str = score.strain ? +score.strain.toFixed(1) : null;
  });

  // Convert to array sorted by date
  return Object.values(byDate)
    .filter(d => d.hrv != null)
    .sort((a, b) => a.d.localeCompare(b.d));
}

async function saveWhoopDataToSupabase(recoveryArr, sleepArr, cyclesArr) {
  if (!currentUser || !_supabase) return;

  // Build all records then do batch upserts
  const recoveryRecords = [];
  (recoveryArr || []).forEach(r => {
    const score = r.score || {};
    const date = (r.created_at || '').split('T')[0];
    if (!date) return;
    recoveryRecords.push({
      user_id: currentUser.id,
      cycle_id: r.cycle_id || null,
      sleep_id: r.sleep_id || null,
      date,
      recovery_score: Math.round(score.recovery_score || 0) || null,
      hrv_rmssd: score.hrv_rmssd_milli || null,
      resting_hr: Math.round(score.resting_heart_rate || 0) || null,
      spo2: score.spo2_percentage || null,
      skin_temp: score.skin_temp_celsius || null,
      raw_json: r,
    });
  });

  const sleepRecords = [];
  (sleepArr || []).forEach(s => {
    const score = s.score || {};
    const stages = score.stage_summary || {};
    const date = (s.end || s.created_at || '').split('T')[0];
    if (!date) return;
    sleepRecords.push({
      user_id: currentUser.id,
      sleep_id: s.id || null,
      date,
      total_sleep_min: Math.round((stages.total_in_bed_time_milli || 0) / 60000) || null,
      sleep_efficiency: score.sleep_efficiency_percentage || null,
      sleep_performance: score.sleep_performance_percentage || null,
      sleep_consistency: score.sleep_consistency_percentage || null,
      slow_wave_min: Math.round((stages.total_slow_wave_sleep_time_milli || 0) / 60000) || null,
      rem_min: Math.round((stages.total_rem_sleep_time_milli || 0) / 60000) || null,
      light_min: Math.round((stages.total_light_sleep_time_milli || 0) / 60000) || null,
      awake_min: Math.round((stages.total_awake_time_milli || 0) / 60000) || null,
      respiratory_rate: score.respiratory_rate || null,
      raw_json: s,
    });
  });

  const cycleRecords = [];
  (cyclesArr || []).forEach(c => {
    const score = c.score || {};
    const date = (c.start || c.created_at || '').split('T')[0];
    if (!date) return;
    cycleRecords.push({
      user_id: currentUser.id,
      cycle_id: c.id || null,
      date,
      strain: score.strain || null,
      kilojoules: score.kilojoule || null,
      avg_hr: Math.round(score.average_heart_rate || 0) || null,
      max_hr: Math.round(score.max_heart_rate || 0) || null,
      raw_json: c,
    });
  });

  // Batch upserts (one query each, much faster than row-by-row)
  const results = {};
  if (recoveryRecords.length > 0) {
    const { error } = await _supabase.from('whoop_recovery').upsert(recoveryRecords, { onConflict: 'user_id,date' });
    results.recovery = error ? ('Error: ' + error.message) : 'OK (' + recoveryRecords.length + ')';
  }
  if (sleepRecords.length > 0) {
    const { error } = await _supabase.from('whoop_sleep').upsert(sleepRecords, { onConflict: 'user_id,date' });
    results.sleep = error ? ('Error: ' + error.message) : 'OK (' + sleepRecords.length + ')';
  }
  if (cycleRecords.length > 0) {
    const { error } = await _supabase.from('whoop_cycles').upsert(cycleRecords, { onConflict: 'user_id,date' });
    results.cycles = error ? ('Error: ' + error.message) : 'OK (' + cycleRecords.length + ')';
  }
  console.log('WHOOP save results:', results);
  return results;
}

async function loadWhoopDataFromSupabase() {
  if (!currentUser || !_supabase) return null;
  try {
    const [rec, slp, cyc] = await Promise.all([
      _supabase.from('whoop_recovery').select('*').eq('user_id', currentUser.id).order('date', { ascending: true }),
      _supabase.from('whoop_sleep').select('*').eq('user_id', currentUser.id).order('date', { ascending: true }),
      _supabase.from('whoop_cycles').select('*').eq('user_id', currentUser.id).order('date', { ascending: true }),
    ]);
    const recovery = (rec.data || []).map(r => r.raw_json).filter(Boolean);
    const sleep = (slp.data || []).map(s => s.raw_json).filter(Boolean);
    const cycles = (cyc.data || []).map(c => c.raw_json).filter(Boolean);
    if (recovery.length === 0 && sleep.length === 0 && cycles.length === 0) return null;
    return { recovery, sleep, cycles };
  } catch(e) {
    console.warn('Error loading WHOOP data:', e);
    return null;
  }
}

async function applyRealWhoopData() {
  // Try to load data from Supabase and update the portal's data
  const stored = await loadWhoopDataFromSupabase();
  if (!stored) return false;
  const transformed = transformWhoopToLegacy(stored.recovery, stored.sleep, stored.cycles);
  if (transformed.length === 0) return false;
  // Replace the portal's data
  recomputeBaseline(transformed);
  return true;
}

async function syncWhoop() {
  if (!whoopTokens || !currentUser) return;
  if (_whoopSyncing) return;
  _whoopSyncing = true;
  render();

  try {
    const response = await fetch('/.netlify/functions/whoop-sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_token: whoopTokens.access_token,
        refresh_token: whoopTokens.refresh_token,
        expires_at: whoopTokens.expires_at,
      })
    });
    const data = await response.json();

    if (data.error) {
      alert('Error sincronizando: ' + (data.detail || data.error));
      _whoopSyncing = false;
      render();
      return;
    }

    // If tokens were refreshed, save new tokens
    if (data.newTokens) {
      const { error } = await _supabase
        .from('whoop_tokens')
        .update({
          access_token: data.newTokens.access_token,
          refresh_token: data.newTokens.refresh_token,
          expires_at: data.newTokens.expires_at,
          updated_at: new Date().toISOString(),
        })
        .eq('user_id', currentUser.id);
      if (!error) {
        whoopTokens = { ...whoopTokens, ...data.newTokens };
      }
    }

    whoopData = {
      recovery: data.recovery || [],
      sleep: data.sleep || [],
      cycles: data.cycles || [],
      profile: data.profile || null,
      syncedAt: new Date().toISOString(),
    };

    // Save to Supabase (in background)
    await saveWhoopDataToSupabase(whoopData.recovery, whoopData.sleep, whoopData.cycles);

    // Apply real data to portal
    await applyRealWhoopData();

    const msg = `Sincronizado:\n• ${whoopData.recovery.length} recovery\n• ${whoopData.sleep.length} sleep\n• ${whoopData.cycles.length} cycles\n\nLos datos reales ahora se muestran en el portal.`;
    alert(msg);
  } catch(e) {
    alert('Error: ' + e.message);
  }
  _whoopSyncing = false;
  render();
}

let last30 = days.slice(-30);
let baseline = {
  hrv: Math.round(last30.reduce((s,d)=>s+d.hrv,0)/last30.length),
  rhr: Math.round(last30.reduce((s,d)=>s+d.rhr,0)/last30.length),
  sleep: +(last30.reduce((s,d)=>s+d.sl,0)/last30.length).toFixed(1),
  reg: Math.round(last30.filter(d=>d.reg).reduce((s,d)=>s+d.reg,0)/last30.filter(d=>d.reg).length),
  resp: +(last30.reduce((s,d)=>s+d.rsp,0)/last30.length).toFixed(1),
  rec: Math.round(last30.reduce((s,d)=>s+d.rec,0)/last30.length),
  strain: +(days.slice(-30).reduce((s,d)=>s+d.str,0)/30).toFixed(1),
  acwr: 1.0,
  fatigue: 40,
  spo2: 97.5,
  skin: 33.4,
};

// Recomputes days/todayData/last30/baseline from a new WHOOP_RAW-like array
function recomputeBaseline(newRawData) {
  days = newRawData.filter(d => d.hrv !== null);
  if (days.length === 0) return;
  todayData = days[days.length - 1];
  last30 = days.slice(-30);
  const regDays = last30.filter(d=>d.reg);
  baseline = {
    hrv: Math.round(last30.reduce((s,d)=>s+d.hrv,0)/last30.length),
    rhr: Math.round(last30.reduce((s,d)=>s+d.rhr,0)/last30.length),
    sleep: +(last30.reduce((s,d)=>s+(d.sl||0),0)/last30.length).toFixed(1),
    reg: regDays.length > 0 ? Math.round(regDays.reduce((s,d)=>s+d.reg,0)/regDays.length) : 0,
    resp: +(last30.reduce((s,d)=>s+(d.rsp||0),0)/last30.length).toFixed(1),
    rec: Math.round(last30.reduce((s,d)=>s+(d.rec||0),0)/last30.length),
    strain: +(days.slice(-30).reduce((s,d)=>s+(d.str||0),0)/30).toFixed(1),
    acwr: 1.0,
    fatigue: 40,
    spo2: last30.reduce((s,d)=>s+(d.sp||0),0)/last30.length || 97.5,
    skin: last30.reduce((s,d)=>s+(d.sk||0),0)/last30.length || 33.4,
  };
}

// Expande un ejercicio en formato shorthand a array de sets independientes.
// Si recibe {sets:4, reps:5, weight:140} devuelve [{reps:5,weight:140}, ...x4]
function expandSets(exercise) {
  const arr = [];
  // Soporta piramidal: si hay repsArr, cada elemento del array es las reps de una serie
  if (exercise.repsArr && Array.isArray(exercise.repsArr) && exercise.repsArr.length > 0) {
    exercise.repsArr.forEach(r => {
      arr.push({
        reps: r,
        weight: exercise.weight || 0,
        done: false
      });
    });
    return arr;
  }
  // Modo clásico: sets × reps uniformes
  const n = exercise.sets || 1;
  for (let i = 0; i < n; i++) {
    arr.push({
      reps: exercise.reps || 0,
      weight: exercise.weight || 0,
      done: false
    });
  }
  return arr;
}

// Display helper: para mostrar en la lista de ejercicios del día expandido
// Devuelve algo como "10-6-6-4-4-2" para piramidales, o "4×5" para uniformes
function displaySetsReps(e) {
  if (e.repsArr && Array.isArray(e.repsArr) && e.repsArr.length > 0) {
    return e.repsArr.join('-');
  }
  return (e.sets || 1) + '×' + (e.reps || 0);
}

// Detecta si todos los sets de un array tienen las mismas reps y peso
function setsAreUniform(setsArr) {
  if (!setsArr || setsArr.length === 0) return true;
  const first = setsArr[0];
  return setsArr.every(s => s.reps === first.reps && s.weight === first.weight);
}

function calcStrengthStrain(s) {
  if (!s || !s.exercises || !s.exercises.length) return 0;
  let t = 0;
  s.exercises.forEach(e => {
    // Calcular volumen total del ejercicio (tonelaje)
    let totalReps = 0;
    if (e.repsArr && Array.isArray(e.repsArr)) {
      // Piramidal: sumar todas las reps del array
      totalReps = e.repsArr.reduce((sum, r) => sum + r, 0);
    } else {
      totalReps = (e.sets || 0) * (e.reps || 0);
    }
    if (totalReps === 0) return;

    const weight = e.weight || 0;
    const est1rm = e.est1rm || 0;

    if (weight > 0 && est1rm > 0) {
      // Lift principal con peso y 1RM conocidos: tonelaje × factor de intensidad
      const ton = totalReps * weight;
      const intF = Math.pow(weight/est1rm, 1.5) * 2.5;
      t += ton * intF / 100;
    } else if (weight > 0) {
      // Accesorio con peso pero sin 1RM: tonelaje crudo escalado
      t += totalReps * weight * 0.008;
    } else {
      // Bodyweight o sin peso: estimación basada en reps × factor BW
      t += totalReps * 0.25;
    }
  });
  // Divisor 15 calibrado para que el strain máximo (sesión muy pesada) llegue a ~14-16
  return +(Math.min(t/15, 21)).toFixed(1);
}
function calcAerobicStrain(a) {
  if (!a) return 0;
  // Multiplicadores por tipo de sesión aeróbica
  // sprints: alta intensidad corta
  // intervals: trabajo Z3-Z4 (umbral, pasadas)
  // long: Z2 conversacional
  // walk: Z1 caminata suave
  // recovery: Z1 muy bajo (golf, paseo, recuperación activa)
  const m = {
    intervals: 0.32,
    long: 0.14,
    sprints: 0.40,
    walk: 0.06,
    recovery: 0.03
  };
  return +Math.min(a.duration * (m[a.type]||0.14), 21).toFixed(1);
}
function calcTotalStrain(d) {
  // Calcular dinámicamente desde los ejercicios reales del día
  const s = calcStrengthStrain(d.strength);
  // Soporta múltiples sesiones aeróbicas por día (aerobics[]) con fallback a aerobic
  const aeroList = d.aerobics || (d.aerobic ? [d.aerobic] : []);
  const a = aeroList.reduce((sum, ae) => sum + calcAerobicStrain(ae), 0);
  const aCapped = Math.min(a, 21);
  // Combinación: el sistema dominante pesa completo + 30% del secundario
  const big = Math.max(s, aCapped), sm = Math.min(s, aCapped);
  const total = +(big + 0.3 * sm).toFixed(1);
  return { strength: s, aerobic: aCapped, total: total };
}

function getTodayQuote() {
  const d = new Date();
  const dayOfYear = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
  return STOIC_QUOTES[dayOfYear % STOIC_QUOTES.length];
}

function macrosForDay(day, dayIndex) {
  // Si tenemos nutrición periodizada para este día, usarla
  const idx = dayIndex !== undefined ? dayIndex : weekPlan.indexOf(day);
  const planNutrition = PLAN_VIRTUS_NUTRITION[idx];
  if (planNutrition && userProfile.type === 'hybrid') {
    return { kcal: planNutrition.kcal, protein: planNutrition.p, carbs: planNutrition.c, fat: planNutrition.f, strain: calcTotalStrain(day).total };
  }
  // Fallback para otros perfiles
  const strain = calcTotalStrain(day).total;
  const kcal = Math.round(TDEE_BASE + strain * 80);
  const profileRatio = PROFILES[userProfile.type]?.macroRatio || {p:0.28, c:0.45, f:0.27};
  const dayAdjust = {
    rest: { p:+0.02, c:-0.08, f:+0.06 },
    posterior: { p:0, c:0, f:0 },
    quad: { p:0, c:+0.02, f:-0.02 },
    intervals: { p:-0.03, c:+0.05, f:-0.02 },
    long: { p:-0.06, c:+0.10, f:-0.04 },
  };
  const adj = dayAdjust[day.dayType] || { p:0, c:0, f:0 };
  const r = {
    p: Math.max(0.15, profileRatio.p + adj.p),
    c: Math.max(0.20, profileRatio.c + adj.c),
    f: Math.max(0.15, profileRatio.f + adj.f),
  };
  const total = r.p + r.c + r.f;
  r.p /= total; r.c /= total; r.f /= total;
  return { kcal, protein: Math.round(kcal*r.p/4), carbs: Math.round(kcal*r.c/4), fat: Math.round(kcal*r.f/9), strain };
}

function getActiveMode() {
  if (modeSick) return 'sick';
  if (afterShift) return 'shift';
  if (modeTravel) return 'travel';
  return null;
}

function getModifiedPlan(originalPlan) {
  const mode = getActiveMode();
  if (!mode) return originalPlan;

  if (mode === 'sick') {
    return originalPlan.map(d => ({
      ...d,
      dayType: 'rest',
      strength: null,
      aerobic: null,
      stability: { title: 'Descanso total', minutes: 0 },
      notes: 'Modo enfermo activo. Descanso obligatorio.'
    }));
  }

  if (mode === 'shift') {
    return originalPlan.map((d, i) => {
      if (i === 0) {
        return {
          ...d,
          dayType: 'rest',
          strength: null,
          aerobic: { title:'Caminata Z1', type:'long', duration:30, target:'FC <110' },
          stability: { title:'Movilidad suave', minutes:20 },
          notes:'Post-guardia. Prioridad: sueño + hidratación.'
        };
      }
      return d;
    });
  }

  if (mode === 'travel') {
    return originalPlan.map(d => {
      if (!d.strength && !d.aerobic) return d;
      return {
        ...d,
        strength: d.strength ? {
          title: d.strength.title + ' (viaje)',
          exercises: [
            { name:'Flexiones', sets:4, reps:15, weight:0, est1rm:0 },
            { name:'Sentadilla búlgara', sets:3, reps:12, weight:0, est1rm:0 },
            { name:'Dominadas (si hay barra)', sets:4, reps:8, weight:0, est1rm:0 },
            { name:'Plancha', sets:3, reps:60, weight:0, est1rm:0 },
          ]
        } : null,
        aerobic: d.aerobic ? { ...d.aerobic, title:d.aerobic.title + ' (outdoor)' } : null,
        notes:'Modo viaje. Sin equipamiento asumido.'
      };
    });
  }
  return originalPlan;
}

function getModifiedMacros(baseKcal, dayStrain) {
  const mode = getActiveMode();
  let kcal = baseKcal + dayStrain * 80;
  if (mode === 'shift') kcal = Math.round(kcal * 0.85);
  else if (mode === 'sick') kcal = Math.round(kcal * 1.10);
  return kcal;
}

function getModeForcedReadiness() {
  if (modeSick) return 'red';
  if (afterShift) return 'red';
  if (modeTravel) return 'yellow';
  return null;
}

function getActiveHabits() {
  const mode = getActiveMode();
  if (mode === 'sick') return habits.filter(h => h.cat === 'health');
  if (mode === 'shift') return habits.filter(h => h.cat !== 'circadian');
  if (mode === 'travel') return habits.filter(h => h.cat !== 'circadian' && h.cat !== 'work');
  return habits;
}

// ============ TRAINING ============
function renderTraining() {
  const currentPlan = getModifiedPlan(weekPlan);
  const totalStrain = +currentPlan.reduce((s,d)=>s+calcTotalStrain(d).total,0).toFixed(1);
  const trainDays = currentPlan.filter(d=>d.strength||d.aerobic).length;
  const mode = getActiveMode();
  // Calc weekly volume
  const strengthDays = currentPlan.filter(d=>d.strength).length;
  // Iteramos todas las sesiones aeróbicas de todos los días (aerobics[]), con fallback a aerobic
  const allAerobics = currentPlan.flatMap(d => d.aerobics || (d.aerobic ? [d.aerobic] : []));
  // Running real: días con al menos una sesión tipo long, intervals o sprints
  const runDays = currentPlan.filter(d => {
    const list = d.aerobics || (d.aerobic ? [d.aerobic] : []);
    return list.some(a => a.type === 'long' || a.type === 'intervals' || a.type === 'sprints');
  }).length;
  // Z2 base: suma de z2Min de todas las sesiones
  const z2Min = allAerobics.reduce((s,a) => s + (a.z2Min || 0), 0);
  // Z3-Z5: suma de highMin de todas las sesiones
  const z4z5Min = allAerobics.reduce((s,a) => s + (a.highMin || 0), 0);
  // Caminata Z1: sesiones tipo walk (sin incluir golf/recovery)
  const walkSessions = allAerobics.filter(a => a.type === 'walk');
  const z1Min = walkSessions.reduce((s,a) => s + (a.duration || 0), 0);

function renderDayContent(d, i) {
  const strain = calcTotalStrain(d);
  const metricLabel = {
    vl: 'Volume Load',
    trimp: 'TRIMP',
    mixto: 'Mixto (VL + TRIMP)',
  }[d.metric] || 'Strain';
  const metricExplain = {
    vl: 'Volume Load — Tonelaje ajustado por %1RM. Métrica estándar de powerlifting (INOL/Hristov) para días dominados por fuerza.',
    trimp: 'Training Impulse — Carga por zonas de FC (Edwards 1993). Base de Strain de WHOOP y Garmin. Usada para días dominados por running.',
    mixto: 'Mixto — Día con fuerza + aeróbico. Combinación ponderada de VL (tonelaje ajustado) y TRIMP (zonas de FC).',
  }[d.metric] || '';
  return `
    <div style="border: 0.5px solid ${VL.blue}; border-top: none; padding: 16px 18px; background: ${VL.panelHi};">

      ${d.strength ? `
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
          <div style="font-size: 11px; color: ${VL.blue}; letter-spacing: 1.4px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; font-weight: 500;">${ICONS.dumbbell} Gimnasio</div>
          <div style="font-size: 9px; color: ${VL.textFaint}; letter-spacing: 0.5px;">${d.strength.exercises.length} ejercicios</div>
        </div>
        <div style="display: grid; gap: 6px; margin-bottom: 18px;">
          ${d.strength.exercises.map((e, exIdx) => {
            return `
              <div style="background: ${VL.bg}; border: 0.5px solid ${VL.border}; border-radius: 6px; padding: 12px 14px;">
                <div style="display: flex; align-items: center; justify-content: space-between; gap: 12px;">
                  <div style="flex: 1; min-width: 0;">
                    <div style="font-size: 13px; color: ${VL.text}; font-weight: 500; line-height: 1.2;">${e.name}</div>
                  </div>
                  <div style="text-align: right; flex-shrink: 0;">
                    <div style="font-size: 16px; font-family: Georgia, serif; color: ${VL.text}; line-height: 1;">${displaySetsReps(e)}</div>
                    <div style="font-size: 9px; color: ${VL.textFaint}; margin-top: 3px; letter-spacing: 0.3px;">${e.repsArr ? 'reps por serie' : 'series · reps'}</div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `:''}

      ${(() => {
        const aeroList = d.aerobics || (d.aerobic ? [d.aerobic] : []);
        if (aeroList.length === 0) return '';
        // Agrupar por categoría
        const running = aeroList.filter(a => a.type === 'long' || a.type === 'intervals' || a.type === 'sprints');
        const walking = aeroList.filter(a => a.type === 'walk');
        const recovery = aeroList.filter(a => a.type === 'recovery');
        const renderSection = (title, list, icon) => list.length === 0 ? '' : `
          <div style="font-size: 11px; color: ${VL.blue}; letter-spacing: 1.4px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; font-weight: 500;">${icon} ${title}</div>
          <div style="display: grid; gap: 6px; margin-bottom: 22px;">
            ${list.map(a => `
              <div style="padding: 12px 14px; background: ${VL.bg}; border: 0.5px solid ${VL.border}; border-radius: 6px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <div style="font-size: 12px; color: ${VL.text};">${a.title}</div>
                  <div style="font-size: 14px; font-family: Georgia, serif; color: ${VL.blue};">${a.duration} min</div>
                </div>
                <div style="font-size: 10px; color: ${VL.textMuted}; margin-top: 4px;">${a.target}</div>
              </div>
            `).join('')}
          </div>
        `;
        return renderSection('Running', running, ICONS.runner) +
               renderSection('Caminata', walking, ICONS.runner) +
               renderSection('Recuperación', recovery, ICONS.heart);
      })()}

      <div style="font-size: 11px; color: ${VL.red}; letter-spacing: 1.4px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; font-weight: 500;">${ICONS.flame || ICONS.zap} Carga del día</div>
      <div style="padding: 14px 16px; background: ${VL.bg}; border: 0.5px solid ${VL.border}; border-left: 2px solid ${VL.red}; border-radius: 6px; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 8px;">
        <div>
          <div style="font-size: 9px; color: ${VL.textFaint}; letter-spacing: 1px; text-transform: uppercase;">Strain</div>
          <div style="font-size: 28px; font-weight: 500; font-family: Georgia, serif; line-height: 1; margin-top: 4px; color: ${VL.text};">${strain.total}</div>
        </div>
        <div style="text-align: right;">
          <div style="font-size: 9px; color: ${VL.textFaint}; letter-spacing: 1px; text-transform: uppercase;">Método</div>
          <div style="font-size: 13px; font-family: Georgia, serif; font-style: italic; color: ${VL.red}; margin-top: 6px;">${metricLabel}</div>
        </div>
      </div>
      <div style="font-size: 10px; color: ${VL.textFaint}; line-height: 1.55; padding: 10px 12px; background: ${VL.bg}; border: 0.5px solid ${VL.border}; border-radius: 6px; font-style: italic; margin-bottom: 18px;">${metricExplain}</div>

      ${(d.strength || d.aerobic) ? `
        <div style="border-top: 0.5px solid ${VL.border}; padding-top: 14px; margin-top: 4px;">
          <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;">
            <div>
              <div style="font-size: 9px; color: ${VL.blue}; letter-spacing: 1.4px; text-transform: uppercase; font-weight: 500;">Registro de sesiones</div>
              ${(() => {
                const sessions = getSessionsForDay(i);
                const last = sessions.length > 0 ? sessions[sessions.length-1] : null;
                if (last) {
                  return `<div style="font-size: 10px; color: ${VL.textMuted}; margin-top: 4px;">Última: ${last.date} · ${sessions.length} ${sessions.length === 1 ? 'sesión registrada' : 'sesiones registradas'}</div>`;
                }
                return `<div style="font-size: 10px; color: ${VL.textFaint}; margin-top: 4px;">Sin sesiones registradas todavía</div>`;
              })()}
            </div>
            <div style="display: flex; gap: 6px;">
              ${getSessionsForDay(i).length > 0 ? `<button onclick="openSessionHistory(${i})" style="padding: 9px 14px; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; border: 0.5px solid ${VL.border}; border-radius: 24px; background: transparent; color: ${VL.textMuted};">Ver histórico</button>` : ''}
              <button onclick="openSessionLog(${i})" style="padding: 9px 14px; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; border: 0.5px solid ${VL.blue}; border-radius: 24px; background: ${VL.blueDim}; color: ${VL.blue}; font-weight: 500; display: flex; align-items: center; gap: 6px;">${ICONS.plus} Registrar sesión</button>
            </div>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

    {h:'Corto', t:'Subir PRs de fuerza', cur:'150·160·130', tgt:'160·170·140', pct:35, type:'progress', icon:'dumbbell'},
    {h:'Corto', t:'V-taper visible', cur:'base', tgt:'visible', pct:55, type:'progress', icon:'target'},
    {h:'Corto', t:'VO2max > 55 ml/kg/min', cur:'52', tgt:'55', pct:40, type:'progress', icon:'pulse'},
    {h:'Medio', t:'80K mensuales en Z2', cur:'40K', tgt:'80K', pct:50, type:'progress', icon:'runner'},
    {h:'Medio', t:'Long run sostenido 120\'', cur:'90\'', tgt:'120\'', pct:60, type:'progress', icon:'runner'},
    {h:'Largo', t:'Maratón completable (sin fecha)', cur:'15K máx', tgt:'42K', pct:25, type:'progress', icon:'runner'},
    {h:'Largo', t:'Sub-20 en 5K (post-residencia)', cur:'21:20', tgt:'19:59', pct:30, type:'progress', icon:'zap'},
    {h:'Corto', t:'Laboratorio Baseline Virtus', cur:'pendiente', tgt:'completar', pct:0, type:'progress', icon:'flask'},
    {h:'Largo', t:'Protocolo 1: caso de estudio VirtusLab', cur:'diseño', tgt:'lanzamiento', pct:15, type:'progress', icon:'shield'},
  ];
  // Estado estandarizado según %
  function goalStatus(pct) {
    if (pct === 0) return 'pendiente';
    if (pct < 60) return 'en progreso';
    if (pct < 100) return 'avanzado';
    return 'completado';
  }
  // Color de barra: gris si no empezó, azul/verde según avance
  function goalColor(g) {
    if (g.pct === 0) return VL.textFaint;
    if (g.pct >= 60) return VL.green;
    return VL.blue;
  }
  return `
    ${sectionTitle('Objetivos', 'Finis ante oculos · ad virtutem')}
    <div style="display: flex; justify-content: flex-end; margin-bottom: 12px;">
      <button style="padding: 10px 18px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border: 0.5px solid ${VL.blue}; border-radius: 24px; background: ${VL.blueDim}; color: ${VL.blue}; display: flex; align-items: center; gap: 8px; font-weight: 500;">${ICONS.plus} Nuevo</button>
    </div>
    <div style="display: grid; gap: 6px;">
      ${goals.map(g => `
        <div style="border: 0.5px solid ${VL.border}; border-left: 2px solid ${VL.blue}; padding: 14px 16px; background: ${VL.panel}; color: ${VL.text};">
          <div style="display: flex; justify-content: space-between; align-items: start; gap: 10px;">
            <div style="display: flex; gap: 12px; flex: 1; min-width: 0; align-items: center;">
              <div style="color: ${VL.blue}; flex-shrink: 0;">${ICONS[g.icon]||''}</div>
              <div style="flex: 1; min-width: 0;">
                <div style="font-size: 9px; color: ${VL.blue}; letter-spacing: 1.2px; text-transform: uppercase;">${g.h} plazo</div>
                <div style="font-size: 13px; font-weight: 500; margin-top: 2px;">${g.t}</div>
                <div style="font-size: 11px; color: ${VL.textMuted}; margin-top: 2px;">${g.type === 'maintain' ? `actual ${g.cur}` : `actual ${g.cur} → meta ${g.tgt}`}</div>
              </div>
            </div>
            <div style="text-align: right; flex-shrink: 0;">
              <div style="font-size: 22px; font-weight: 500; font-family: Georgia, serif; color: ${VL.text}; line-height: 1;">${g.pct}<span style="font-size: 11px; color: ${VL.textMuted};">%</span></div>
              <div style="font-size: 10px; color: ${VL.textFaint}; margin-top: 2px;">${goalStatus(g.pct)}</div>
            </div>
          </div>
          <div style="height: 4px; background: ${VL.borderStrong}; margin-top: 10px;">
            <div style="height: 100%; width: ${g.pct}%; background: ${goalColor(g)};"></div>

    </div>
  `;
}

// Modal: Histórico de sesiones para un día específico
function renderSessionHistoryModal() {
  if (showSessionHistory === null || showSessionHistory === undefined) return '';
  const dayIdx = showSessionHistory;
  const day = weekPlan[dayIdx];
  if (!day) return '';
  const numerals = ['I','II','III','IV','V','VI','VII'];
  const allSessions = getSessionsForDay(dayIdx);
  // Filtrar sesiones inválidas (sin sets[] o sin actualWeight) — evita "undefined"
  const sessions = allSessions.filter(s => {
    if (!s.exercises || s.exercises.length === 0) return false;
    return s.exercises.some(e =>
      (e.sets && Array.isArray(e.sets) && e.sets.length > 0 && e.sets[0].weight !== undefined) ||
      (e.actualWeight !== undefined && e.actualWeight !== null)
    );
  });
  // Detectar si hay sesiones inválidas (formato viejo o corrupto)
  const invalidCount = allSessions.length - sessions.length;
  // Agrupar por ejercicio para gráficos — solo formato nuevo con sets[]
  const byExercise = {};
  sessions.forEach(s => {
    if (s.exercises) {
      s.exercises.forEach(e => {
        if (!byExercise[e.name]) byExercise[e.name] = [];
        let weight = null, reps = null, numSets = null;
        if (e.sets && Array.isArray(e.sets) && e.sets.length > 0) {
          // Top set = mayor peso
          const validSets = e.sets.filter(st => st.weight !== undefined && st.weight !== null);
          if (validSets.length > 0) {
            const topSet = validSets.reduce((max, st) => st.weight > max.weight ? st : max, validSets[0]);
            weight = topSet.weight;
            reps = topSet.reps;
            numSets = e.sets.length;
          }
        } else if (e.actualWeight !== undefined && e.actualWeight !== null) {
          // Formato viejo
          weight = e.actualWeight;
          reps = e.actualReps;
          numSets = e.actualSets;
        }
        if (weight !== null) {
          byExercise[e.name].push({
            date: s.date,
            weight: weight,
            reps: reps,
            numSets: numSets,
            rpe: s.rpe
          });
        }
      });
    }
  });
  // Helper: extraer summary de cada sesión para mostrar en lista "Todas las sesiones"
  function sessionSummary(s) {
    if (!s.exercises) return [];
    return s.exercises.map(e => {
      if (e.sets && Array.isArray(e.sets) && e.sets.length > 0) {
        const valid = e.sets.filter(st => st.weight !== undefined && st.weight !== null);
        if (valid.length === 0) return null;
        const top = valid.reduce((max, st) => st.weight > max.weight ? st : max, valid[0]);
        return { name: e.name, sets: valid.length, topReps: top.reps, topWeight: top.weight };
      } else if (e.actualWeight !== undefined && e.actualWeight !== null) {
        return { name: e.name, sets: e.actualSets, topReps: e.actualReps, topWeight: e.actualWeight };
      }
      return null;
    }).filter(x => x !== null);
  }
  return `
    <div style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); padding: 20px; z-index: 1000; overflow-y: auto;">
      <div style="background: ${VL.panel}; padding: 1.75rem; max-width: 760px; margin: 30px auto; border: 0.5px solid ${VL.borderStrong}; border-radius: 14px; color: ${VL.text};">

        <div style="padding-bottom: 16px; margin-bottom: 18px; border-bottom: 0.5px solid ${VL.border}; display: flex; justify-content: space-between; align-items: start; gap: 14px;">
          <div style="flex: 1;">
            <div style="font-size: 9px; color: ${VL.blue}; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;">Histórico · ${numerals[dayIdx]}</div>
            <div style="font-size: 20px; font-weight: 500; font-family: Georgia, serif; margin-top: 6px; color: ${VL.text}; line-height: 1.2;">${day.shortTitle}</div>
            <div style="font-size: 10px; color: ${VL.textFaint}; margin-top: 5px;">${sessions.length} ${sessions.length === 1 ? 'sesión válida' : 'sesiones válidas'}${invalidCount > 0 ? ` · <span style="color: ${VL.yellow};">${invalidCount} sesión(es) en formato antiguo, no se muestran</span>` : ''}</div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 6px; align-items: flex-end;">
            <button onclick="closeSessionHistory()" style="padding: 6px 12px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border: 0.5px solid ${VL.border}; border-radius: 20px; background: transparent; color: ${VL.textMuted};">Cerrar</button>

// Render charts in history modal (called from setTimeout after render)
function renderSessionHistoryCharts() {
  if (showSessionHistory === null || showSessionHistory === undefined) return;
  const dayIdx = showSessionHistory;
  const sessions = getSessionsForDay(dayIdx).filter(s => {
    if (!s.exercises) return false;
    return s.exercises.some(e =>
      (e.sets && Array.isArray(e.sets) && e.sets.length > 0 && e.sets[0].weight !== undefined) ||
      (e.actualWeight !== undefined && e.actualWeight !== null)
    );
  });
  const byExercise = {};
  sessions.forEach(s => {
    if (s.exercises) {
      s.exercises.forEach(e => {
        if (!byExercise[e.name]) byExercise[e.name] = [];
        let weight = null;
        if (e.sets && Array.isArray(e.sets) && e.sets.length > 0) {
          const valid = e.sets.filter(st => st.weight !== undefined && st.weight !== null);
          if (valid.length > 0) {
            weight = valid.reduce((max, st) => st.weight > max.weight ? st : max, valid[0]).weight;
          }
        } else if (e.actualWeight !== undefined && e.actualWeight !== null) {
          weight = e.actualWeight;
        }
        if (weight !== null) {
          byExercise[e.name].push({ date: s.date, weight: weight });
        }
      });
    }
  });
  Object.entries(byExercise).forEach(([name, records], chartIdx) => {
    const sorted = records.slice().sort((a,b) => a.date.localeCompare(b.date));
    if (sorted.length < 2) return;
    const ctx = document.getElementById('histChart_' + dayIdx + '_' + chartIdx);
    if (!ctx) return;
    try {
      // Detectar PR máximo (peso más alto) para destacarlo en rojo ladrillo
      const maxWeight = Math.max(...sorted.map(r => r.weight));
      const pointColors = sorted.map(r => r.weight === maxWeight ? VL.red : VL.blue);
      const pointSizes = sorted.map(r => r.weight === maxWeight ? 6 : 4);
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: sorted.map(r => r.date.slice(5)),
          datasets: [{
            data: sorted.map(r => r.weight),
            borderColor: VL.blue,
            backgroundColor: 'rgba(59,130,246,0.18)',
            borderWidth: 2.5,
            tension: 0.3,
            pointRadius: pointSizes,
            pointHoverRadius: 7,
            pointBackgroundColor: pointColors,
            pointBorderColor: VL.bg,
            pointBorderWidth: 2,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: {
            backgroundColor: VL.panel,
            titleColor: VL.text,
            bodyColor: VL.textMuted,
            borderColor: VL.borderStrong,
            borderWidth: 1,
            padding: 10,
            displayColors: false,
            titleFont: { size: 11, family: 'Georgia, serif' },
            bodyFont: { size: 12, family: 'Georgia, serif' },
            callbacks: {
              label: function(ctx) {
                const isPR = ctx.parsed.y === maxWeight;
                return ctx.parsed.y + ' kg' + (isPR ? '  · PR máximo' : '');
              }
            }
          }},
          scales: {
            x: {
              grid: { color: 'rgba(255,255,255,0.06)', drawBorder: false },
              ticks: { font: { size: 10, family: 'Georgia, serif' }, color: VL.textMuted }
            },
            y: {
              grid: { color: 'rgba(255,255,255,0.06)', drawBorder: false },
              ticks: { font: { size: 10, family: 'Georgia, serif' }, color: VL.textMuted, callback: v => v + 'kg' }
            }
          }
        }
      });
    } catch(e) {
      console.warn('Error rendering chart for ' + name, e);
    }
  });
}

window.setSection = function(id) {
  activeSection = id;
  openDayIndex = null;
  showStatusMenu = false;
  const scrollPos = window.scrollY;
  render();
  // Mantener el scroll en el nav sticky si estábamos scrolleados
  requestAnimationFrame(() => {
    const header = document.querySelector('.sticky-header');
    if (header && scrollPos > 0) {
      const headerHeight = header.offsetHeight;
      window.scrollTo(0, Math.min(scrollPos, headerHeight));
    } else {
      window.scrollTo(0, 0);
    }
  });
};
window.toggleMode = function() { modeResident = !modeResident; render(); };
window.toggleStatusMenu = function() { showStatusMenu = !showStatusMenu; render(); };
window.toggleShift = function() {
  if (afterShift) {
    const last = contextEvents.filter(e=>e.type==='shift').slice(-1)[0];
    if (last && !last.end) last.end = '2026-04-08';
    afterShift = false;
    modeConfig.shift.activeSince = null;
  } else {
    afterShift = true;
    modeConfig.shift.activeSince = '2026-04-08';
    contextEvents.push({ type:'shift', start:'2026-04-08', end:null, note:`Guardia ${modeConfig.shift.lastShiftHours}h` });
  }
  showStatusMenu = false;
  render();
};
window.toggleTravel = function() {
  if (modeTravel) {
    const last = contextEvents.filter(e=>e.type==='travel').slice(-1)[0];
    if (last && !last.end) last.end = '2026-04-08';
    modeTravel = false;
    modeConfig.travel.activeSince = null;
  } else {
    modeTravel = true;
    modeConfig.travel.activeSince = '2026-04-08';
    showModeConfig = 'travel';
  }
  showStatusMenu = false;
  render();
};
window.toggleSick = function() {
  if (modeSick) {
    const last = contextEvents.filter(e=>e.type==='sick').slice(-1)[0];
    if (last && !last.end) last.end = '2026-04-08';
    modeSick = false;
    modeConfig.sick.activeSince = null;
  } else {
    modeSick = true;
    modeConfig.sick.activeSince = '2026-04-08';
    showModeConfig = 'sick';
  }
  showStatusMenu = false;
  render();
};
window.openModeConfig = function(mode) { showModeConfig = mode; render(); };
window.closeModeConfig = function() {
  if (showModeConfig === 'travel' && modeTravel && !contextEvents.some(e=>e.type==='travel' && !e.end)) {
    contextEvents.push({ type:'travel', start:'2026-04-08', end:null, note:modeConfig.travel.destination || 'Viaje' });
  }
  if (showModeConfig === 'sick' && modeSick && !contextEvents.some(e=>e.type==='sick' && !e.end)) {
    const syms = Object.entries(modeConfig.sick.symptoms).filter(([k,v])=>v).map(([k])=>k).join(', ');
    contextEvents.push({ type:'sick', start:'2026-04-08', end:null, note:syms || 'Sin especificar' });
  }
  showModeConfig = null;
  render();
};
window.updateModeField = function(mode, field, value) {
  if (field.startsWith('symptom.')) {
    const sym = field.split('.')[1];
    modeConfig[mode].symptoms[sym] = !modeConfig[mode].symptoms[sym];
  } else {
    modeConfig[mode][field] = value;
  }
  render();
};

  }
};
window.closeTestResult = function() { showTestResult = null; render(); };
window.openTestSchedule = function() { showTestSchedule = true; render(); };
window.closeTestSchedule = function() { showTestSchedule = false; render(); };
window.openSessionLog = function(dayIdx) {
  showSessionLog = dayIdx;
  sessionFormData = {};
  window.sessionFormData = sessionFormData;
  render();
};
window.closeSessionLog = function() {
  showSessionLog = null;
  sessionFormData = {};
  window.sessionFormData = sessionFormData;
  render();
};
window.openSessionHistory = function(dayIdx) { showSessionHistory = dayIdx; render(); };
window.closeSessionHistory = function() { showSessionHistory = null; render(); };
window.setRPE = function(n) {
  if (window.sessionFormData) window.sessionFormData.rpe = n;
  render();
};
window.saveSession = async function() {
  if (showSessionLog === null) return;
  const fd = window.sessionFormData || sessionFormData;
  const session = {
    dayIndex: showSessionLog,
    date: fd.date || todayISO(),
    exercises: fd.exercises || [],
    aerobicDuration: fd.aerobicDuration || 0,
    aerobicNotes: fd.aerobicNotes || '',
    rpe: fd.rpe || 7,
    notes: fd.notes || ''
  };
  await addSession(session);
  showSessionLog = null;
  sessionFormData = {};
  window.sessionFormData = sessionFormData;
  await ensureSessionsLoaded();
  render();
};
window.deleteSessionById = async function(id) {
  try {
    await deleteSession(id);
    await ensureSessionsLoaded();
    render();
  } catch(e) {
    console.error('Error eliminando sesión:', e);
    alert('Error al eliminar: ' + e.message);
  }
};

// Borrar todas las sesiones de un día específico (con doble confirmación)
window.clearAllSessionsForDay = async function(dayIdx) {
  const sessionsForDay = getSessionsForDay(dayIdx);
  if (sessionsForDay.length === 0) return;
  const numerals = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  const dayName = numerals[dayIdx] || 'este día';
  const msg = '¿Borrar TODAS las ' + sessionsForDay.length + ' sesión(es) de ' + dayName + '?\n\nEsta acción no se puede deshacer.';
  if (!confirm(msg)) return;
  if (!confirm('Última confirmación: ¿Estás seguro? Se perderán los datos de ' + sessionsForDay.length + ' sesión(es) cargada(s).')) return;
  try {
    for (const s of sessionsForDay) {
      await deleteSession(s.id);
    }
    invalidateSessionsCache();
    await ensureSessionsLoaded();
    render();
  } catch(e) {
    console.error('Error borrando sesiones del día:', e);
    alert('Error: ' + e.message);
  }
};

// Toggle expanded/collapsed state of an exercise in the session log modal
window.toggleExerciseExpand = function(exIdx) {
  if (!window.sessionFormData || !window.sessionFormData.exercises) return;
  window.sessionFormData.exercises[exIdx].expanded = !window.sessionFormData.exercises[exIdx].expanded;
  render();
};

// Remove a specific set from an exercise
window.removeSet = function(exIdx, setIdx) {
  if (!window.sessionFormData || !window.sessionFormData.exercises) return;
  const ex = window.sessionFormData.exercises[exIdx];
  if (!ex || !ex.sets || ex.sets.length <= 1) return; // never delete the last set
  ex.sets.splice(setIdx, 1);
  render();
};

// Add a new empty set to an exercise (or copy of last set if exists)
window.addNewSet = function(exIdx) {
  if (!window.sessionFormData || !window.sessionFormData.exercises) return;
  const ex = window.sessionFormData.exercises[exIdx];
  if (!ex) return;
  if (!ex.sets) ex.sets = [];
  // Default to plan values if no sets exist, otherwise start from zero
  ex.sets.push({
    reps: ex.plannedReps || 0,
    weight: ex.plannedWeight || 0,
    done: false
  });
  render();
};

// Duplicate the last set of an exercise (useful for normal sessions where all sets are equal)
window.duplicateLastSet = function(exIdx) {
  if (!window.sessionFormData || !window.sessionFormData.exercises) return;
  const ex = window.sessionFormData.exercises[exIdx];
  if (!ex || !ex.sets || ex.sets.length === 0) return;
  const last = ex.sets[ex.sets.length - 1];
  ex.sets.push({
    reps: last.reps,
    weight: last.weight,
    done: false
  });
  render();
};

// Quick-confirm: marks the session as identical to the plan (pre-fills all sets with planned values)
window.confirmSessionAsPlanned = function() {
  if (!window.sessionFormData || !window.sessionFormData.exercises) return;
  window.sessionFormData.exercises.forEach(ex => {
    ex.sets = [];
    for (let i = 0; i < (ex.plannedSets || 1); i++) {
      ex.sets.push({
        reps: ex.plannedReps || 0,
        weight: ex.plannedWeight || 0,
        done: true
      });
    }
    // Collapse all exercises after confirming - clean view
    ex.expanded = false;
  });
  render();
};

// ============ AUTH UI HANDLERS ============
function showRegister() {
  document.getElementById('auth-form-login').style.display = 'none';
  document.getElementById('auth-form-register').style.display = 'block';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
}
function showLogin() {
  document.getElementById('auth-form-register').style.display = 'none';
  document.getElementById('auth-form-login').style.display = 'block';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
}
function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('auth-success').style.display = 'none';
}
function showAuthSuccess(msg) {
  const el = document.getElementById('auth-success');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('auth-error').style.display = 'none';
}

async function handleLogin() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  if (!email || !pass) { showAuthError('Completá email y contraseña'); return; }
  try {
    await signIn(email, pass);
  } catch(e) {
    showAuthError(e.message === 'Invalid login credentials' ? 'Email o contraseña incorrectos' : e.message);
  }
}

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if (!email || !pass) { showAuthError('Completá todos los campos'); return; }
  if (pass.length < 6) { showAuthError('La contraseña debe tener al menos 6 caracteres'); return; }
  try {
    await signUp(email, pass, name);
    showAuthSuccess('Cuenta creada. Revisá tu email para confirmar, o iniciá sesión directamente.');
  } catch(e) {
    showAuthError(e.message);
  }
}

// Enter key support for auth forms
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const ae = document.activeElement;
    if (ae && (ae.id === 'auth-email' || ae.id === 'auth-pass')) handleLogin();
    else if (ae && (ae.id === 'reg-name' || ae.id === 'reg-email' || ae.id === 'reg-pass')) handleRegister();
  }
});

window.showRegister = showRegister;
window.showLogin = showLogin;
window.handleLogin = handleLogin;
window.handleRegister = handleRegister;
window.handleSignOut = async function() { await signOut(); };

// ============ INIT — don't render until auth resolves ============
initAuth();
</script>
</body>
</html>
