<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ============ SUPABASE CONFIG ============
const SUPABASE_URL = 'https://pybkzlslfbwoktyvcwhk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_obpv0u23Rf4O-EChOmOg3w_jT7-C3Lf';
let _supabase = null;
let currentUser = null;

try {
  if (window.supabase && window.supabase.createClient) {
    _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } else {
    console.error('Supabase JS not loaded');
    document.getElementById('auth-error').textContent = 'Error cargando Supabase. Recargá la página.';
    document.getElementById('auth-error').style.display = 'block';
  }
} catch(e) {
  console.error('Supabase init error:', e);
}

// ============ AUTH SYSTEM ============
async function initAuth() {
  if (!_supabase) { showAuthScreen(); return; }
  const { data: { session } } = await _supabase.auth.getSession();
  if (session) {
    currentUser = session.user;
    hideAuthScreen();
    await loadUserData();
    await handleWhoopAuthCallback();
    render();
  } else {
    showAuthScreen();
  }
  _supabase.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      hideAuthScreen();
      await loadUserData();
      await handleWhoopAuthCallback();
      render();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      showAuthScreen();
    }
  });
}

async function signUp(email, password, fullName) {
  const { data, error } = await _supabase.auth.signUp({
    email, password,
    options: { data: { full_name: fullName } }
  });
  if (error) throw error;
  return data;
}

async function signIn(email, password) {
  const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
  if (error) throw error;
  return data;
}

async function signOut() {
  await _supabase.auth.signOut();
  currentUser = null;
  showAuthScreen();
}

function showAuthScreen() {
  document.getElementById('app-wrapper').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

function hideAuthScreen() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-wrapper').style.display = 'block';
}

// ============ SUPABASE DATA LAYER ============
async function getAllSessions() {
  if (!currentUser) return [];
  const { data, error } = await _supabase
    .from('sessions')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('date', { ascending: false });
  if (error) { console.warn('Error reading sessions:', error); return []; }
  return (data || []).map(s => ({
    id: s.id,
    dayIndex: s.day_index,
    date: s.date,
    exercises: s.exercises || [],
    aerobics: s.aerobics || [],
    rpe: s.rpe,
    notes: s.notes,
  }));
}

let _sessionsCache = null;
let _sessionsCacheTime = 0;
const CACHE_TTL = 5000;

function getCachedSessions() {
  if (_sessionsCache && (Date.now() - _sessionsCacheTime < CACHE_TTL)) {
    return _sessionsCache;
  }
  return null;
}

function invalidateSessionsCache() {
  _sessionsCache = null;
  _sessionsCacheTime = 0;
}

async function ensureSessionsLoaded() {
  if (!_sessionsCache) {
    _sessionsCache = await getAllSessions();
    _sessionsCacheTime = Date.now();
  }
  return _sessionsCache;
}

function getSessionsForDay(dayIndex) {
  const cached = getCachedSessions();
  if (cached) return cached.filter(s => s.dayIndex === dayIndex).sort((a,b) => a.date.localeCompare(b.date));
  return [];
}

async function addSession(session) {
  if (!currentUser) return;
  session.id = 's_' + Date.now();
  const { error } = await _supabase.from('sessions').insert({
    id: session.id,
    user_id: currentUser.id,
    day_index: session.dayIndex,
    date: session.date,
    exercises: session.exercises,
    aerobics: session.aerobics || [],
    rpe: session.rpe,
    notes: session.notes,
  });
  if (error) console.warn('Error saving session:', error);
  invalidateSessionsCache();
}

async function deleteSession(sessionId) {
  if (!currentUser) return;
  const { error } = await _supabase.from('sessions').delete().eq('id', sessionId);
  if (error) console.warn('Error deleting session:', error);
  invalidateSessionsCache();
}

async function loadHabitChecks(date) {
  if (!currentUser) return {};
  const { data, error } = await _supabase
    .from('habit_checks')
    .select('habit_id, done')
    .eq('user_id', currentUser.id)
    .eq('date', date);
  if (error) { console.warn('Error loading habits:', error); return {}; }
  const map = {};
  (data || []).forEach(h => { map[h.habit_id] = h.done; });
  return map;
}

async function saveHabitCheck(habitId, done, date) {
  if (!currentUser) return;
  const { error } = await _supabase
    .from('habit_checks')
    .upsert({
      user_id: currentUser.id,
      habit_id: habitId,
      date: date || todayISO(),
      done: done,
    }, { onConflict: 'user_id,habit_id,date' });
  if (error) console.warn('Error saving habit:', error);
}

async function loadUserData() {
  await ensureSessionsLoaded();
  const checks = await loadHabitChecks(todayISO());
  habits.forEach(h => {
    if (checks[h.id] !== undefined) h.done = checks[h.id];
    else h.done = false;
  });
  await checkWhoopConnection();
  if (whoopConnected) {
    await applyRealWhoopData();
    autoSyncWhoopBackground();
  }
}

async function autoSyncWhoopBackground() {
  if (!whoopTokens || !currentUser) return;

  async function fetchType(type) {
    const response = await fetch('/api/whoop-sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_token: whoopTokens.access_token,
        refresh_token: whoopTokens.refresh_token,
        expires_at: whoopTokens.expires_at,
        type,
      })
    });
    const data = await response.json();
    if (data.error) throw new Error(type);
    if (data.newTokens) whoopTokens = { ...whoopTokens, ...data.newTokens };
    return data.records || [];
  }

  try {
    const recovery = await fetchType('recovery');
    const sleep = await fetchType('sleep');
    const cycles = await fetchType('cycles');

    whoopData = {
      recovery, sleep, cycles,
      syncedAt: new Date().toISOString(),
    };

    if (whoopTokens.access_token !== null) {
      await _supabase
        .from('whoop_tokens')
        .update({
          access_token: whoopTokens.access_token,
          refresh_token: whoopTokens.refresh_token,
          expires_at: whoopTokens.expires_at,
          updated_at: new Date().toISOString(),
        })
        .eq('user_id', currentUser.id);
    }

    await saveWhoopDataToSupabase(whoopData.recovery, whoopData.sleep, whoopData.cycles);
    await applyRealWhoopData();
    render();
  } catch(e) {
    console.warn('Auto-sync failed silently:', e);
  }
}

// ============ WHOOP INTEGRATION ============
let whoopConnected = false;
let whoopTokens = null;

const WHOOP_CLIENT_ID = '708dc8a7-b891-46ab-af98-5d5049a1502c';
const WHOOP_REDIRECT_URI = window.location.origin + '/api/whoop-callback';
const WHOOP_SCOPES = 'offline read:recovery read:sleep read:workout read:cycles read:profile read:body_measurement';

async function checkWhoopConnection() {
  if (!currentUser || !_supabase) return;
  try {
    const { data, error } = await _supabase
      .from('whoop_tokens')
      .select('*')
      .eq('user_id', currentUser.id)
      .maybeSingle();
    if (error) { console.warn('Error checking WHOOP:', error); return; }
    if (data) {
      whoopTokens = data;
      whoopConnected = true;
    } else {
      whoopConnected = false;
      whoopTokens = null;
    }
  } catch(e) {
    console.warn('WHOOP check error:', e);
  }
}

async function handleWhoopAuthCallback() {

function transformWhoopToLegacy(recoveryArr, sleepArr, cyclesArr) {
  const byDate = {};

  (recoveryArr || []).forEach(r => {
    const score = r.score || {};
    const dateStr = (r.created_at || '').split('T')[0];
    if (!dateStr) return;
    const key = dateStr.substring(5);
    if (!byDate[key]) byDate[key] = { d: key, hrv:null, rhr:null, rec:null, str:null, sl:null, eff:null, reg:null, dp:null, rm:null, rsp:null, sp:null, sk:null };
    if (score.hrv_rmssd_milli != null) byDate[key].hrv = Math.round(score.hrv_rmssd_milli);
    if (score.resting_heart_rate != null) byDate[key].rhr = Math.round(score.resting_heart_rate);
    if (score.recovery_score != null) byDate[key].rec = Math.round(score.recovery_score);
    if (score.spo2_percentage != null) byDate[key].sp = score.spo2_percentage;
    if (score.skin_temp_celsius != null) byDate[key].sk = score.skin_temp_celsius;
  });

  const longestSleepByDate = {};
  (sleepArr || []).forEach(s => {
    const stages = (s.score || {}).stage_summary || {};
    const dateStr = (s.end || s.created_at || '').split('T')[0];
    if (!dateStr) return;
    const duration = stages.total_in_bed_time_milli || 0;
    if (!longestSleepByDate[dateStr] || duration > longestSleepByDate[dateStr].dur) {
      longestSleepByDate[dateStr] = { s, dur: duration };
    }
  });
  Object.entries(longestSleepByDate).forEach(([dateStr, { s }]) => {
    const score = s.score || {};
    const stages = score.stage_summary || {};
    const key = dateStr.substring(5);
    if (!byDate[key]) byDate[key] = { d: key, hrv:null, rhr:null, rec:null, str:null, sl:null, eff:null, reg:null, dp:null, rm:null, rsp:null, sp:null, sk:null };
    const totalMilli = stages.total_in_bed_time_milli || 0;
    if (totalMilli > 0) byDate[key].sl = +(totalMilli / 3600000).toFixed(2);
    if (score.sleep_efficiency_percentage != null) byDate[key].eff = Math.round(score.sleep_efficiency_percentage);
    if (score.sleep_consistency_percentage != null) byDate[key].reg = Math.round(score.sleep_consistency_percentage);
    if (stages.total_slow_wave_sleep_time_milli != null) byDate[key].dp = Math.round(stages.total_slow_wave_sleep_time_milli / 60000);
    if (stages.total_rem_sleep_time_milli != null) byDate[key].rm = Math.round(stages.total_rem_sleep_time_milli / 60000);
    if (score.respiratory_rate != null) byDate[key].rsp = +score.respiratory_rate.toFixed(1);
  });

  (cyclesArr || []).forEach(c => {
    const score = c.score || {};
    const dateStr = (c.start || c.created_at || '').split('T')[0];
    if (!dateStr) return;
    const key = dateStr.substring(5);
    if (!byDate[key]) byDate[key] = { d: key, hrv:null, rhr:null, rec:null, str:null, sl:null, eff:null, reg:null, dp:null, rm:null, rsp:null, sp:null, sk:null };
    if (score.strain != null) byDate[key].str = +score.strain.toFixed(1);
  });

  return Object.values(byDate)
    .filter(d => d.hrv != null)
    .sort((a, b) => a.d.localeCompare(b.d));
}

async function saveWhoopDataToSupabase(recoveryArr, sleepArr, cyclesArr) {
  if (!currentUser || !_supabase) return;

  const recoveryRecords = [];
  const seenRecoveryDates = new Set();
  (recoveryArr || []).forEach(r => {
    const score = r.score || {};
    const date = (r.created_at || '').split('T')[0];
    if (!date) return;
    if (seenRecoveryDates.has(date)) return;
    seenRecoveryDates.add(date);
    recoveryRecords.push({
      user_id: currentUser.id,
      cycle_id: r.cycle_id ? String(r.cycle_id) : null,
      sleep_id: r.sleep_id ? String(r.sleep_id) : null,
      date,
      recovery_score: Math.round(score.recovery_score || 0) || null,
      hrv_rmssd: score.hrv_rmssd_milli || null,
      resting_hr: Math.round(score.resting_heart_rate || 0) || null,
      spo2: score.spo2_percentage || null,
      skin_temp: score.skin_temp_celsius || null,
      raw_json: r,
    });
  });

  const sleepByDate = {};
  (sleepArr || []).forEach(s => {
    const score = s.score || {};
    const stages = score.stage_summary || {};
    const date = (s.end || s.created_at || '').split('T')[0];
    if (!date) return;
    const duration = stages.total_in_bed_time_milli || 0;
    if (!sleepByDate[date] || duration > (sleepByDate[date].duration || 0)) {
      sleepByDate[date] = { s, score, stages, duration };
    }
  });

  const sleepRecords = Object.entries(sleepByDate).map(([date, info]) => {
    const { s, score, stages } = info;
    return {
      user_id: currentUser.id,
      sleep_id: s.id ? String(s.id) : null,
      date,
      total_sleep_min: Math.round((stages.total_in_bed_time_milli || 0) / 60000) || null,
      sleep_efficiency: score.sleep_efficiency_percentage || null,
      sleep_performance: score.sleep_performance_percentage || null,
      sleep_consistency: score.sleep_consistency_percentage || null,
      slow_wave_min: Math.round((stages.total_slow_wave_sleep_time_milli || 0) / 60000) || null,
      rem_min: Math.round((stages.total_rem_sleep_time_milli || 0) / 60000) || null,
      light_min: Math.round((stages.total_light_sleep_time_milli || 0) / 60000) || null,
      awake_min: Math.round((stages.total_awake_time_milli || 0) / 60000) || null,
      respiratory_rate: score.respiratory_rate || null,
      raw_json: s,
    };
  });

  const cycleRecords = [];
  const seenCycleDates = new Set();
  (cyclesArr || []).forEach(c => {
    const score = c.score || {};
    const date = (c.start || c.created_at || '').split('T')[0];
    if (!date) return;
    if (seenCycleDates.has(date)) return;
    seenCycleDates.add(date);
    cycleRecords.push({
      user_id: currentUser.id,
      cycle_id: c.id ? String(c.id) : null,
      date,
      strain: score.strain || null,
      kilojoules: score.kilojoule || null,
      avg_hr: Math.round(score.average_heart_rate || 0) || null,
      max_hr: Math.round(score.max_heart_rate || 0) || null,
      raw_json: c,
    });
  });

  const results = {};
  if (recoveryRecords.length > 0) {
    const { error } = await _supabase.from('whoop_recovery').upsert(recoveryRecords, { onConflict: 'user_id,date' });
    results.recovery = error ? ('Error: ' + error.message) : 'OK (' + recoveryRecords.length + ')';
  }
  if (sleepRecords.length > 0) {
    const { error } = await _supabase.from('whoop_sleep').upsert(sleepRecords, { onConflict: 'user_id,date' });
    results.sleep = error ? ('Error: ' + error.message) : 'OK (' + sleepRecords.length + ')';
  }
  if (cycleRecords.length > 0) {
    const { error } = await _supabase.from('whoop_cycles').upsert(cycleRecords, { onConflict: 'user_id,date' });
    results.cycles = error ? ('Error: ' + error.message) : 'OK (' + cycleRecords.length + ')';
  }
  console.log('WHOOP save results:', results);
  return results;
}

async function loadWhoopDataFromSupabase() {
  if (!currentUser || !_supabase) return null;
  try {
    const [rec, slp, cyc] = await Promise.all([
      _supabase.from('whoop_recovery').select('*').eq('user_id', currentUser.id).order('date', { ascending: true }),
      _supabase.from('whoop_sleep').select('*').eq('user_id', currentUser.id).order('date', { ascending: true }),
      _supabase.from('whoop_cycles').select('*').eq('user_id', currentUser.id).order('date', { ascending: true }),
    ]);
    const recovery = (rec.data || []).map(r => r.raw_json).filter(Boolean);
    const sleep = (slp.data || []).map(s => s.raw_json).filter(Boolean);
    const cycles = (cyc.data || []).map(c => c.raw_json).filter(Boolean);
    if (recovery.length === 0 && sleep.length === 0 && cycles.length === 0) return null;
    return { recovery, sleep, cycles };
  } catch(e) {
    console.warn('Error loading WHOOP data:', e);
    return null;
  }
}

async function applyRealWhoopData() {
  const stored = await loadWhoopDataFromSupabase();
  if (!stored) return false;
  const transformed = transformWhoopToLegacy(stored.recovery, stored.sleep, stored.cycles);
  if (transformed.length === 0) return false;
  recomputeBaseline(transformed);
  return true;
}

async function syncWhoop() {
  if (!whoopTokens || !currentUser) return;
  if (_whoopSyncing) return;
  _whoopSyncing = true;
  render();

  const results = { recovery: [], sleep: [], cycles: [] };
  let newTokensUpdated = null;

  async function fetchType(type) {
    const response = await fetch('/api/whoop-sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_token: whoopTokens.access_token,
        refresh_token: whoopTokens.refresh_token,
        expires_at: whoopTokens.expires_at,
        type,
      })
    });
    const data = await response.json();
    if (data.error) throw new Error(type + ': ' + (data.detail || data.error));
    if (data.newTokens) newTokensUpdated = data.newTokens;
    return data.records || [];
  }

  try {
    results.recovery = await fetchType('recovery');
    if (newTokensUpdated) {
      whoopTokens = { ...whoopTokens, ...newTokensUpdated };
      newTokensUpdated = null;
    }
    results.sleep = await fetchType('sleep');
    if (newTokensUpdated) {
      whoopTokens = { ...whoopTokens, ...newTokensUpdated };
      newTokensUpdated = null;
    }
    results.cycles = await fetchType('cycles');
    if (newTokensUpdated) {
      whoopTokens = { ...whoopTokens, ...newTokensUpdated };
    }

    if (whoopTokens.access_token !== null) {
      await _supabase
        .from('whoop_tokens')
        .update({
          access_token: whoopTokens.access_token,
          refresh_token: whoopTokens.refresh_token,
          expires_at: whoopTokens.expires_at,
          updated_at: new Date().toISOString(),
        })
        .eq('user_id', currentUser.id);
    }

    whoopData = {
      recovery: results.recovery,
      sleep: results.sleep,
      cycles: results.cycles,
      syncedAt: new Date().toISOString(),
    };

    await saveWhoopDataToSupabase(whoopData.recovery, whoopData.sleep, whoopData.cycles);
    await applyRealWhoopData();

    alert('Sincronizado:\n• ' + whoopData.recovery.length + ' recovery\n• ' + whoopData.sleep.length + ' sleep\n• ' + whoopData.cycles.length + ' cycles\n\nLos datos reales se muestran en el portal.');
  } catch(e) {
    alert('Error: ' + e.message);
  }
  _whoopSyncing = false;
  render();
}

// Cambio 4a: limpia markdown del output de la IA para que se vea texto plano
function cleanMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/__([^_]+)__/g, '$1')
    .replace(/_([^_]+)_/g, '$1')
    .replace(/^#{1,6}\s+/gm, '')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/^\s*[-*+]\s+/gm, '• ')
    .trim();
}

  return ctx.join('\n');
}

function recomputeBaseline(newRawData) {
  const safeDays = newRawData.map(d => ({
    d: d.d,
    hrv: d.hrv ?? 60,
    rhr: d.rhr ?? 55,
    rec: d.rec ?? 50,
    str: d.str ?? 10,
    sl: d.sl ?? 7,
    eff: d.eff ?? 85,
    reg: d.reg ?? null,
    dp: d.dp ?? 100,
    rm: d.rm ?? 100,
    rsp: d.rsp ?? 13,
    sp: d.sp ?? 96,
    sk: d.sk ?? 34,
  }));
  days = safeDays.filter(d => d.hrv !== null);
  if (days.length === 0) return;
  todayData = days[days.length - 1];
  last30 = days.slice(-30);
  const regDays = last30.filter(d=>d.reg);
  baseline = {
    hrv: Math.round(last30.reduce((s,d)=>s+d.hrv,0)/last30.length),
    rhr: Math.round(last30.reduce((s,d)=>s+d.rhr,0)/last30.length),
    sleep: +(last30.reduce((s,d)=>s+(d.sl||0),0)/last30.length).toFixed(1),
    reg: regDays.length > 0 ? Math.round(regDays.reduce((s,d)=>s+d.reg,0)/regDays.length) : 50,
    resp: +(last30.reduce((s,d)=>s+(d.rsp||0),0)/last30.length).toFixed(1),
    rec: Math.round(last30.reduce((s,d)=>s+(d.rec||0),0)/last30.length),
    strain: +(days.slice(-30).reduce((s,d)=>s+(d.str||0),0)/30).toFixed(1),
    acwr: 1.0,
    fatigue: 40,
    spo2: +(last30.reduce((s,d)=>s+(d.sp||0),0)/last30.length).toFixed(1) || 97.5,
    skin: +(last30.reduce((s,d)=>s+(d.sk||0),0)/last30.length).toFixed(1) || 33.4,
  };
}

function todayISO() {
  const d = new Date();
  return d.toISOString().split('T')[0];

function expandSets(exercise) {
  const arr = [];
  if (exercise.repsArr && Array.isArray(exercise.repsArr) && exercise.repsArr.length > 0) {
    exercise.repsArr.forEach(r => {
      arr.push({
        reps: r,
        weight: exercise.weight || 0,
        done: false
      });
    });
    return arr;
  }
  const n = exercise.sets || 1;
  for (let i = 0; i < n; i++) {
    arr.push({
      reps: exercise.reps || 0,
      weight: exercise.weight || 0,
      done: false
    });
  }
  return arr;
}

function displaySetsReps(e) {
  if (e.repsArr && Array.isArray(e.repsArr) && e.repsArr.length > 0) {
    return e.repsArr.join('-');
  }
  return (e.sets || 1) + '×' + (e.reps || 0);
}

function setsAreUniform(setsArr) {
  if (!setsArr || setsArr.length === 0) return true;
  const first = setsArr[0];
  return setsArr.every(s => s.reps === first.reps && s.weight === first.weight);
}

function calcStrengthStrain(s) {
  if (!s || !s.exercises || !s.exercises.length) return 0;
  let t = 0;
  s.exercises.forEach(e => {
    let totalReps = 0;
    if (e.repsArr && Array.isArray(e.repsArr)) {
      totalReps = e.repsArr.reduce((sum, r) => sum + r, 0);
    } else {
      totalReps = (e.sets || 0) * (e.reps || 0);
    }
    if (totalReps === 0) return;
    const weight = e.weight || 0;
    const est1rm = e.est1rm || 0;
    if (weight > 0 && est1rm > 0) {
      const ton = totalReps * weight;
      const intF = Math.pow(weight/est1rm, 1.5) * 2.5;
      t += ton * intF / 100;
    } else if (weight > 0) {
      t += totalReps * weight * 0.008;
    } else {
      t += totalReps * 0.25;
    }
  });
  return +(Math.min(t/15, 21)).toFixed(1);
}

function calcAerobicStrain(a) {
  if (!a) return 0;
  const m = {
    intervals: 0.32,
    long: 0.14,
    sprints: 0.40,
    walk: 0.06,
    recovery: 0.03
  };
  return +Math.min(a.duration * (m[a.type]||0.14), 21).toFixed(1);
}

function calcTotalStrain(d) {
  const s = calcStrengthStrain(d.strength);
  const aeroList = d.aerobics || (d.aerobic ? [d.aerobic] : []);
  const a = aeroList.reduce((sum, ae) => sum + calcAerobicStrain(ae), 0);
  const aCapped = Math.min(a, 21);
  const big = Math.max(s, aCapped), sm = Math.min(s, aCapped);
  const total = +(big + 0.3 * sm).toFixed(1);
  return { strength: s, aerobic: aCapped, total: total };
}

function macrosForDay(day, dayIndex) {
  const idx = dayIndex !== undefined ? dayIndex : weekPlan.indexOf(day);
  const planNutrition = PLAN_VIRTUS_NUTRITION[idx];
  if (planNutrition && userProfile.type === 'hybrid') {
    return { kcal: planNutrition.kcal, protein: planNutrition.p, carbs: planNutrition.c, fat: planNutrition.f, strain: calcTotalStrain(day).total };
  }
  const strain = calcTotalStrain(day).total;
  const kcal = Math.round(TDEE_BASE + strain * 80);
  const profileRatio = PROFILES[userProfile.type]?.macroRatio || {p:0.28, c:0.45, f:0.27};
  const dayAdjust = {
    rest: { p:+0.02, c:-0.08, f:+0.06 },
    posterior: { p:0, c:0, f:0 },
    quad: { p:0, c:+0.02, f:-0.02 },
    intervals: { p:-0.03, c:+0.05, f:-0.02 },
    long: { p:-0.06, c:+0.10, f:-0.04 },
  };
  const adj = dayAdjust[day.dayType] || { p:0, c:0, f:0 };
  const r = {
    p: Math.max(0.15, profileRatio.p + adj.p),
    c: Math.max(0.20, profileRatio.c + adj.c),
    f: Math.max(0.15, profileRatio.f + adj.f),
  };
  const total = r.p + r.c + r.f;
  r.p /= total; r.c /= total; r.f /= total;
  return { kcal, protein: Math.round(kcal*r.p/4), carbs: Math.round(kcal*r.c/4), fat: Math.round(kcal*r.f/9), strain };
}

          aerobic: { title:'Caminata Z1', type:'long', duration:30, target:'FC <110' },
          stability: { title:'Movilidad suave', minutes:20 },
          notes:'Post-guardia. Prioridad: sueño + hidratación.'
        };
      }
      return d;
    });
  }

  if (mode === 'travel') {
    return originalPlan.map(d => {
      if (!d.strength && !d.aerobic) return d;
      return {
        ...d,
        strength: d.strength ? {
          title: d.strength.title + ' (viaje)',
          exercises: [
            { name:'Flexiones', sets:4, reps:15, weight:0, est1rm:0 },
            { name:'Sentadilla búlgara', sets:3, reps:12, weight:0, est1rm:0 },
            { name:'Dominadas (si hay barra)', sets:4, reps:8, weight:0, est1rm:0 },
            { name:'Plancha', sets:3, reps:60, weight:0, est1rm:0 },
          ]
        } : null,
        aerobic: d.aerobic ? { ...d.aerobic, title:d.aerobic.title + ' (outdoor)' } : null,
        notes:'Modo viaje. Sin equipamiento asumido.'
      };
    });
  }
  return originalPlan;
}

function getModifiedMacros(baseKcal, dayStrain) {
  const mode = getActiveMode();
  let kcal = baseKcal + dayStrain * 80;
  if (mode === 'shift') kcal = Math.round(kcal * 0.85);
  else if (mode === 'sick') kcal = Math.round(kcal * 1.10);
  return kcal;
}

function getModeForcedReadiness() {
  if (modeSick) return 'red';
  if (afterShift) return 'red';
  if (modeTravel) return 'yellow';
  return null;
}

function getActiveHabits() {
  const mode = getActiveMode();
  if (mode === 'sick') return habits.filter(h => h.cat === 'health');
  if (mode === 'shift') return habits.filter(h => h.cat !== 'circadian');
  if (mode === 'travel') return habits.filter(h => h.cat !== 'circadian' && h.cat !== 'work');
  return habits;
}

function getTodayPlanIndex() {
  const jsDay = new Date().getDay();
  return jsDay === 0 ? 6 : jsDay - 1;
}

function renderDayContent(d, i) {
  const strain = calcTotalStrain(d);

  }[d.metric] || 'Strain';
  const metricExplain = {
    vl: 'Volume Load — Tonelaje ajustado por %1RM. Métrica estándar de powerlifting (INOL/Hristov) para días dominados por fuerza.',
    trimp: 'Training Impulse — Carga por zonas de FC (Edwards 1993). Base de Strain de WHOOP y Garmin. Usada para días dominados por running.',
    mixto: 'Mixto — Día con fuerza + aeróbico. Combinación ponderada de VL (tonelaje ajustado) y TRIMP (zonas de FC).',
  }[d.metric] || '';

    <div style="border: 0.5px solid ${VL.blue}; border-top: none; padding: 16px 18px; background: ${VL.panelHi};">

      ${d.strength ? `

        </div>
        <div style="display: grid; gap: 6px; margin-bottom: 18px;">

            return `
              <div style="background: ${VL.bg}; border: 0.5px solid ${VL.border}; border-radius: 6px; padding: 12px 14px;">

                    <div style="font-size: 13px; color: ${VL.text}; font-weight: 500; line-height: 1.2;">${e.name}</div>

                    <div style="font-size: 9px; color: ${VL.textFaint}; margin-top: 3px; letter-spacing: 0.3px;">${e.repsArr ? 'reps por serie' : 'series · reps'}</div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `:''}

      ${(() => {
        const aeroList = d.aerobics || (d.aerobic ? [d.aerobic] : []);
        if (aeroList.length === 0) return '';
        const running = aeroList.filter(a => a.type === 'long' || a.type === 'intervals' || a.type === 'sprints');

function renderMedical() {
  const contextAsTimeline = contextEvents.map(e => {
    const labels = {
      shift: { title: 'Post-guardia', color: VL.red, icon: 'stethoscope' },
      travel: { title: 'Modo viaje', color: VL.yellow, icon: 'plane' },
      sick: { title: 'Modo enfermo', color: VL.red, icon: 'thermo2' },
    };
    const l = labels[e.type];
    const duration = e.end ? `${e.start} → ${e.end}` : `desde ${e.start} · activo`;
    return {
      type: 'context',
      contextType: e.type,
      date: e.start,
      title: l.title,
      color: l.color,
      icon: l.icon,
      summary: `${duration}${e.note ? ' · ' + e.note : ''}`,
      active: !e.end,
    };
  });

  const merged = [
    ...medicalTimeline.map(m => ({ ...m })),
    ...contextAsTimeline,
  ].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  return `
    ${sectionTitle('Consulta médica', 'Medicus sui · ad virtutem')}

    <div style="padding: 20px 22px; background: ${VL.panel}; border: 0.5px solid ${VL.border}; border-left: 2px solid ${VL.blue}; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">

        <div style="text-align: center; flex: 1;">
          <div style="font-size: 13px; color: ${VL.text}; font-weight: 500; margin-bottom: 4px;">Capa médica humana</div>
          <div style="font-size: 11px; color: ${VL.textMuted}; line-height: 1.6;">
            La IA da lecturas de corto plazo. La capa médica humana interpreta tendencias, biomarcadores y toma decisiones que se sostienen en el tiempo.
          </div>
        </div>
      </div>
      <div style="display: flex; gap: 8px; flex-shrink: 0;">
        <button onclick="openRequest()" style="padding: 10px 18px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border: 0.5px solid ${VL.blue}; border-radius: 24px; color: ${VL.blue}; background: ${VL.blueDim}; display: flex; align-items: center; gap: 8px; font-weight: 500;">${ICONS.stethoscope} Registrar evaluación</button>
        <button style="padding: 10px 16px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border: 0.5px solid ${VL.borderStrong}; border-radius: 14px; color: ${VL.text}; background: transparent; display: flex; align-items: center; gap: 8px;">${ICONS.share} Compartir</button>
      </div>
    </div>

    <div style="font-size: 9px; color: ${VL.textMuted}; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px;">Historia clínica · timeline longitudinal</div>

    <div style="position: relative; padding-left: 20px;">
      <div style="position: absolute; left: 5px; top: 8px; bottom: 8px; width: 1px; background: ${VL.border};"></div>
      ${merged.map(item => {
        const isAuto = item.type === 'note';
        const isContext = item.type === 'context';
        const color = isContext ? item.color : (isAuto ? VL.textFaint : VL.blue);
        const label = isContext ? 'Evento de contexto' : (isAuto ? 'Follow-up automático' : 'Auto-evaluación clínica');
        return `
          <div style="position: relative; margin-bottom: 12px;">
            <div style="position: absolute; left: -20px; top: 14px; width: 11px; height: 11px; border-radius: 50%; background: ${isAuto || isContext ? VL.bg : color}; border: 2px solid ${color};"></div>
            <div class="card" style="border: 0.5px solid ${VL.border}; border-left: 2px solid ${color}; padding: 12px 14px; background: ${VL.panel};">
              <div style="display: flex; justify-content: space-between; align-items: start; gap: 8px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 0;">
                  <div style="display: flex; align-items: center; gap: 6px; font-size: 9px; color: ${color}; letter-spacing: 1.2px; text-transform: uppercase;">
                    ${isContext ? ICONS[item.icon] : ''}
                    <span>${label}</span>
                    ${isContext && item.active ? `<span style="padding: 1px 5px; background: ${color}; color: ${VL.bg}; font-size: 8px; letter-spacing: 0.5px;">ACTIVO</span>` : ''}
                  </div>
                  <div style="font-size: 13px; font-weight: 500; margin-top: 2px;">${item.title}</div>
                  ${item.dr ? `<div style="font-size: 10px; color: ${VL.textMuted}; margin-top: 2px;">${item.dr}</div>` : ''}
                </div>
                <div style="font-size: 10px; color: ${VL.textFaint}; white-space: nowrap;">${item.date}</div>
              </div>
              <div style="font-size: 11px; color: ${VL.textMuted}; margin-top: 8px; line-height: 1.6;">${item.summary}</div>
            </div>
          </div>
        `;
      }).join('')}
    </div>

    <div style="margin-top: 14px; padding: 11px 14px; background: ${VL.bg}; border: 0.5px dashed ${VL.border}; font-size: 10px; color: ${VL.textFaint}; line-height: 1.6; text-align: center; font-style: italic;">
      Los eventos de contexto (modos post-guardia, viaje, enfermedad) se registran automáticamente y quedan disponibles para que la IA los tenga en cuenta al interpretar tus datos retrospectivamente.
    </div>
  `;
}

function renderSessionHistoryCharts() {
  const dayIdx = showSessionHistory;
  const d = weekPlan[dayIdx];
  const sessions = getSessionsForDay(dayIdx);
  if (!d || !d.strength || sessions.length === 0) return;
  d.strength.exercises.slice(0, 4).forEach((ex, exIdx) => {
    const ctx = document.getElementById('progChart' + exIdx);
    if (!ctx) return;
    const dataPoints = sessions.map(s => {
      const found = (s.exercises || []).find(e => e.name === ex.name);
      if (!found || !found.sets || found.sets.length === 0) return null;
      const topSet = found.sets.reduce((max, cur) => (cur.weight || 0) > (max.weight || 0) ? cur : max, found.sets[0]);
      return { date: s.date, weight: topSet.weight || 0 };
    }).filter(Boolean);
    if (dataPoints.length === 0) return;
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: dataPoints.map(p => p.date.substring(5)),
        datasets: [{
          data: dataPoints.map(p => p.weight),
          borderColor: VL.blue,
          backgroundColor: 'rgba(59,130,246,0.12)',
          tension: 0.3,
          fill: true,
          pointRadius: 3,
          pointBackgroundColor: VL.blue,
          borderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.parsed.y + ' kg' } } },
        scales: {
          x: { ticks: { font: { size: 9 }, color: VL.textMuted, maxTicksLimit: 8 }, grid: { color: VL.border } },
          y: { ticks: { font: { size: 9 }, color: VL.textMuted }, grid: { color: VL.border } },
        },
      },
    });
  });
}

<script>
// ============ WINDOW HANDLERS ============

// CAMBIO 2: setSection NO scrollea al top, mantiene la posición actual
window.setSection = function(id) {
  activeSection = id;
  openDayIndex = null;
  showStatusMenu = false;
  render();
};

window.toggleMode = function() {
  modeResident = !modeResident;
  render();
};

window.toggleStatusMenu = function() {
  showStatusMenu = !showStatusMenu;
  render();
};

window.toggleShift = function() {
  afterShift = !afterShift;
  if (afterShift) {
    modeConfig.shift.activeSince = new Date().toISOString();
    const today = new Date().toISOString().split('T')[0];
    contextEvents.unshift({ type:'shift', start:today, end:null, note:`Guardia de ${modeConfig.shift.lastShiftHours}hs` });
  } else {
    const active = contextEvents.find(e => e.type === 'shift' && !e.end);
    if (active) active.end = new Date().toISOString().split('T')[0];
    modeConfig.shift.activeSince = null;
  }
  showStatusMenu = false;
  render();
};

window.toggleTravel = function() {
  modeTravel = !modeTravel;
  if (modeTravel) {
    modeConfig.travel.activeSince = new Date().toISOString();
    const today = new Date().toISOString().split('T')[0];
    contextEvents.unshift({ type:'travel', start:today, end:null, note:modeConfig.travel.destination || 'En viaje' });
  } else {
    const active = contextEvents.find(e => e.type === 'travel' && !e.end);
    if (active) active.end = new Date().toISOString().split('T')[0];
    modeConfig.travel.activeSince = null;
  }
  showStatusMenu = false;
  render();
};

window.toggleSick = function() {
  modeSick = !modeSick;
  if (modeSick) {
    modeConfig.sick.activeSince = new Date().toISOString();
    const today = new Date().toISOString().split('T')[0];
    contextEvents.unshift({ type:'sick', start:today, end:null, note:`Severidad ${modeConfig.sick.severity}` });
  } else {
    const active = contextEvents.find(e => e.type === 'sick' && !e.end);
    if (active) active.end = new Date().toISOString().split('T')[0];
    modeConfig.sick.activeSince = null;
  }
  showStatusMenu = false;
  render();
};

window.openModeConfig = function(mode) {
  showModeConfig = mode;
  showStatusMenu = false;
  render();
};

window.closeModeConfig = function() {
  showModeConfig = null;
  render();
};

window.updateModeField = function(mode, field, value) {
  modeConfig[mode][field] = value;
  render();
};

window.toggleDay = function(i) {
  openDayIndex = openDayIndex === i ? null : i;
  render();
};

window.toggleNutritionDay = function(i) {
  openNutritionDay = openNutritionDay === i ? null : i;
  render();
};

window.setPerfView = function(v) {
  perfView = v;
  render();
};

window.toggleHabit = async function(id) {
  const h = habits.find(x => x.id === id);
  if (h) {
    h.done = !h.done;
    await saveHabitCheck(h.id, h.done, todayISO());
    render();
  }
};

window.openProfile = function() { showProfile = true; render(); };
window.closeProfile = function() { showProfile = false; render(); };
window.setProfile = function(type) {
  userProfile.type = type;
  weekPlan = PROFILE_PLANS[type] || weekPlanBase;
  openDayIndex = null;
  render();
};

window.openRequest = function() { showRequest = true; render(); };
window.closeRequest = function() { showRequest = false; render(); };

window.closeSettings = function() { showSettings = false; render(); };

// CAMBIO 4c: abrir chat scrollea al final
window.openChat = function() {
  showChat = true;
  render();
  scrollChatToBottom();
};
window.closeChat = function() {
  showChat = false;
  render();
};

// CAMBIO 4c: al mandar mensaje desde input, scroll después
window.sendChatFromInput = function() {
  const input = document.getElementById('chat-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendChatMessage(text);
};

window.sendChatSuggestion = function(text) {
  sendChatMessage(text);
};

window.openAddPR = function() { showAddPR = true; render(); };
window.closeAddPR = function() { showAddPR = false; render(); };

window.openTestProtocol = function(panel, idx) {
  const p = performanceTests.find(pp => pp.panel === panel);
  if (!p) return;
  const t = p.items[idx];
  if (!t) return;
  showTestProtocol = { ...t, _panel: panel, _idx: idx };
  render();
};

window.closeTestProtocol = function() {
  showTestProtocol = null;
  render();
};

window.openTestResult = function(panel, idx) {
  const p = performanceTests.find(pp => pp.panel === panel);
  if (!p) return;
  const t = p.items[idx];
  if (!t) return;
  showTestResult = { ...t, _panel: panel, _idx: idx };
  render();
};

window.closeTestResult = function() {
  showTestResult = null;
  render();
};

window.toggleTestProtocol = function(panel, idx) {

};

  showTestSchedule = true;
  render();
};

window.closeTestSchedule = function() {
  showTestSchedule = false;
  render();

// Session log handlers
window.openSessionLog = function(dayIdx) {
  showSessionLog = dayIdx;
  sessionFormData = { rpe: 7 };
  render();
};

window.closeSessionLog = function() {
  showSessionLog = null;
  sessionFormData = {};
  render();
};

window.openSessionHistory = function(dayIdx) {
  showSessionHistory = dayIdx;
  render();
};

window.closeSessionHistory = function() {
  showSessionHistory = null;
  render();
};

window.setRPE = function(n) {
  sessionFormData.rpe = n;
  render();
};

window.toggleExerciseExpand = function(exIdx) {
  if (!sessionFormData[exIdx]) return;
  sessionFormData[exIdx].expanded = !sessionFormData[exIdx].expanded;
  render();
};

window.removeSet = function(exIdx, setIdx) {
  if (!sessionFormData[exIdx]) return;
  sessionFormData[exIdx].sets.splice(setIdx, 1);
  render();
};

window.addNewSet = function(exIdx) {
  if (!sessionFormData[exIdx]) return;
  const last = sessionFormData[exIdx].sets[sessionFormData[exIdx].sets.length - 1] || { reps: 0, weight: 0, done: false };
  sessionFormData[exIdx].sets.push({ reps: last.reps, weight: last.weight, done: false });
  render();
};

window.duplicateLastSet = function(exIdx) {
  if (!sessionFormData[exIdx]) return;
  const last = sessionFormData[exIdx].sets[sessionFormData[exIdx].sets.length - 1];
  if (!last) return;
  sessionFormData[exIdx].sets.push({ ...last });
  render();
};

window.saveSession = async function(dayIdx) {
  const d = weekPlan[dayIdx];
  if (!d || !d.strength) return;
  const notesEl = document.getElementById('session-notes');
  const notes = notesEl ? notesEl.value : '';
  const rpe = sessionFormData.rpe !== undefined ? sessionFormData.rpe : 7;
  const exercises = d.strength.exercises.map((e, exIdx) => ({
    name: e.name,
    sets: (sessionFormData[exIdx] && sessionFormData[exIdx].sets) ? sessionFormData[exIdx].sets : expandSets(e),
  }));
  const session = {
    dayIndex: dayIdx,
    date: todayISO(),
    exercises,
    aerobics: d.aerobics || (d.aerobic ? [d.aerobic] : []),
    rpe,
    notes,
  };
  await addSession(session);
  await ensureSessionsLoaded();
  showSessionLog = null;
  sessionFormData = {};
  render();
};

window.confirmSessionAsPlanned = async function(dayIdx) {
  const d = weekPlan[dayIdx];
  if (!d || !d.strength) return;
  const session = {
    dayIndex: dayIdx,
    date: todayISO(),
    exercises: d.strength.exercises.map(e => ({ name: e.name, sets: expandSets(e) })),
    aerobics: d.aerobics || (d.aerobic ? [d.aerobic] : []),
    rpe: 7,
    notes: 'Sesión completada como estaba planificada.',
  };
  await addSession(session);
  await ensureSessionsLoaded();
  showSessionLog = null;
  sessionFormData = {};
  render();
};

window.deleteSessionById = async function(sessionId, dayIdx) {
  if (!confirm('¿Eliminar esta sesión?')) return;
  await deleteSession(sessionId);
  await ensureSessionsLoaded();
  render();
};

window.clearAllSessionsForDay = async function(dayIdx) {
  const sessions = getSessionsForDay(dayIdx);
  if (sessions.length === 0) return;
  if (!confirm(`¿Eliminar las ${sessions.length} sesiones de este día? Esta acción no se puede deshacer.`)) return;
  for (const s of sessions) {
    await deleteSession(s.id);
  }
  await ensureSessionsLoaded();
  render();
};


// ============ AUTH UI ============
function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  const elS = document.getElementById('auth-success');
  if (elS) elS.style.display = 'none';
  el.textContent = msg;
  el.style.display = 'block';
}

function showAuthSuccess(msg) {
  const el = document.getElementById('auth-success');
  const elE = document.getElementById('auth-error');
  if (elE) elE.style.display = 'none';
  el.textContent = msg;
  el.style.display = 'block';
}

function showRegister() {
  document.getElementById('auth-form-login').style.display = 'none';
  document.getElementById('auth-form-register').style.display = 'block';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
}

function showLogin() {
  document.getElementById('auth-form-register').style.display = 'none';
  document.getElementById('auth-form-login').style.display = 'block';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
}

async function handleLogin() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  if (!email || !pass) { showAuthError('Completá email y contraseña.'); return; }
  try {
    await signIn(email, pass);
  } catch(e) {
    showAuthError(e.message || 'Error al iniciar sesión.');
  }
}

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if (!name || !email || !pass) { showAuthError('Completá todos los campos.'); return; }
  if (pass.length < 6) { showAuthError('La contraseña debe tener al menos 6 caracteres.'); return; }
  try {
    const result = await signUp(email, pass, name);
    if (result.user && !result.session) {
      showAuthSuccess('Cuenta creada. Revisá tu email para confirmar.');
    }
  } catch(e) {
    showAuthError(e.message || 'Error al registrarse.');
  }
}

async function handleSignOut() {
  if (!confirm('¿Cerrar sesión?')) return;
  await signOut();
}

window.showRegister = showRegister;
window.showLogin = showLogin;
window.handleLogin = handleLogin;
window.handleRegister = handleRegister;
window.handleSignOut = handleSignOut;

// Permitir Enter en los formularios de auth
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const loginVisible = document.getElementById('auth-form-login') && document.getElementById('auth-form-login').style.display !== 'none';
  const registerVisible = document.getElementById('auth-form-register') && document.getElementById('auth-form-register').style.display !== 'none';
  const authScreenVisible = document.getElementById('auth-screen') && document.getElementById('auth-screen').style.display !== 'none';
  if (!authScreenVisible) return;
  if (loginVisible) handleLogin();
  else if (registerVisible) handleRegister();
});

// Inicio
initAuth();
</script>

function renderSessionHistoryModal() {
  const dayIdx = showSessionHistory;
  const sessions = getSessionsForDay(dayIdx);
  const numerals = ['I','II','III','IV','V','VI','VII'];
  const d = getModifiedPlan(weekPlan)[dayIdx];

  return `
    <div style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); padding: 20px; z-index: 1000; overflow-y: auto;">
      <div style="background: ${VL.panel}; padding: 1.5rem; max-width: 720px; margin: 20px auto; border: 0.5px solid ${VL.borderStrong}; border-radius: 14px; color: ${VL.text};">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 0.5px solid ${VL.border};">
          <div>
            <div style="font-size: 10px; color: ${VL.blue}; letter-spacing: 1.2px; text-transform: uppercase;">Histórico de sesiones</div>
            <div style="font-size: 18px; font-weight: 500; font-family: Georgia, serif;">Día ${numerals[dayIdx]} · ${d.shortTitle || ''}</div>
            <div style="font-size: 10px; color: ${VL.textFaint}; margin-top: 3px;">${sessions.length} ${sessions.length===1?'sesión registrada':'sesiones registradas'}</div>
          </div>
          <button onclick="closeSessionHistory()" style="padding: 6px 12px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border: 0.5px solid ${VL.border}; border-radius: 20px; background: transparent; color: ${VL.text};">Cerrar</button>
        </div>

        ${sessions.length === 0 ? `
          <div style="padding: 40px; text-align: center; color: ${VL.textFaint}; font-size: 12px; background: ${VL.bg}; border: 0.5px solid ${VL.border};">Sin sesiones registradas para este día.</div>
        ` : sessions.length >= 2 ? `
          <div style="margin-bottom: 20px; padding: 14px 16px; background: ${VL.bg}; border: 0.5px solid ${VL.border};">
            <div style="font-size: 10px; color: ${VL.blue}; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 10px;">Progresión</div>
            <div style="position: relative; height: 180px;"><canvas id="sessionHistoryChart"></canvas></div>
          </div>
        ` : ''}

        <div style="display: grid; gap: 6px;">
          ${sessions.map(s => `
            <div style="padding: 14px 16px; background: ${VL.bg}; border: 0.5px solid ${VL.border};">
              <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
                <div>
                  <div style="font-size: 12px; font-weight: 500;">${s.date}</div>
                  <div style="font-size: 10px; color: ${VL.textFaint}; margin-top: 2px;">RPE ${s.rpe}/10</div>
                </div>
                <button onclick="deleteSessionById('${s.id}', ${dayIdx})" style="padding: 6px 10px; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; border: 0.5px solid ${VL.red}; background: transparent; color: ${VL.red};">Borrar</button>
              </div>
              ${s.exercises && s.exercises.length > 0 ? `
                <div style="display: grid; gap: 4px; margin-top: 8px;">
                  ${s.exercises.map(e => {
                    const uniform = setsAreUniform(e.sets);
                    const totalReps = e.sets.reduce((sum,x)=>sum+x.reps,0);
                    const maxW = Math.max(...e.sets.map(x=>x.weight));
                    return `
                      <div style="font-size: 11px; color: ${VL.textMuted}; padding: 6px 8px; background: ${VL.panel};">
                        <strong style="color: ${VL.text};">${e.name}:</strong> ${uniform ? `${e.sets.length}×${e.sets[0].reps} @ ${e.sets[0].weight}kg` : `${totalReps} reps totales · max ${maxW}kg`}
                      </div>
                    `;
                  }).join('')}
                </div>
              ` : ''}
              ${s.notes ? `<div style="font-size: 10px; color: ${VL.textFaint}; margin-top: 8px; padding-top: 8px; border-top: 0.5px solid ${VL.border}; font-style: italic;">${s.notes}</div>` : ''}
            </div>
          `).join('')}
        </div>

        ${sessions.length > 0 ? `
          <button onclick="clearAllSessionsForDay(${dayIdx})" style="width: 100%; margin-top: 14px; padding: 12px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border: 0.5px solid ${VL.red}; border-radius: 24px; background: transparent; color: ${VL.red};">Borrar todo el histórico</button>
        ` : ''}
      </div>
    </div>
  `;
}

function renderSessionHistoryCharts() {
  const dayIdx = showSessionHistory;
  const sessions = getSessionsForDay(dayIdx);
  if (sessions.length < 2) return;
  const ctx = document.getElementById('sessionHistoryChart');
  if (!ctx) return;
  const rpeData = sessions.map(s => s.rpe);
  const labels = sessions.map(s => s.date.substring(5));
  new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{ label: 'RPE', data: rpeData, borderColor: VL.red, backgroundColor: 'rgba(184,64,64,0.12)', tension: 0.3, fill: true, pointRadius: 4, pointBackgroundColor: VL.red, borderWidth: 2 }]},
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 9 }, color: VL.textMuted }, grid: { color: VL.border } }, y: { min: 0, max: 10, ticks: { font: { size: 9 }, color: VL.textMuted }, grid: { color: VL.border } } } }
  });
}

<script>

// setSection NO hace scrollTo(0,0) - mantiene el scroll donde estaba
// El nav NO se re-renderiza completo - solo se actualizan los colores de los botones
// Así el scroll lateral del nav queda 100% quieto donde el usuario lo dejó
window.setSection = function(id) {
  activeSection = id;
  openDayIndex = null;
  showStatusMenu = false;
  render();
};

window.toggleDay = function(i) {
  openDayIndex = openDayIndex === i ? null : i;
  render();
};

window.toggleNutritionDay = function(i) {
  openNutritionDay = openNutritionDay === i ? null : i;
  render();
};

window.setPerfView = function(v) {
  perfView = v;
  render();
};

window.toggleStatusMenu = function() {
  showStatusMenu = !showStatusMenu;
  render();
};

window.toggleShift = function() {
  afterShift = !afterShift;
  if (afterShift) {
    modeConfig.shift.activeSince = new Date().toISOString();
    const now = new Date().toISOString().split('T')[0];
    contextEvents.push({ type:'shift', start: now, end: null, note: modeConfig.shift.lastShiftHours + 'hs guardia' });
  } else {
    const active = contextEvents.find(e => e.type === 'shift' && !e.end);
    if (active) active.end = new Date().toISOString().split('T')[0];
  }
  showStatusMenu = false;
  render();
};

window.toggleTravel = function() {
  modeTravel = !modeTravel;
  if (modeTravel) {
    modeConfig.travel.activeSince = new Date().toISOString();
    const now = new Date().toISOString().split('T')[0];
    contextEvents.push({ type:'travel', start: now, end: null, note: modeConfig.travel.destination || 'Viaje' });
  } else {
    const active = contextEvents.find(e => e.type === 'travel' && !e.end);
    if (active) active.end = new Date().toISOString().split('T')[0];
  }
  showStatusMenu = false;
  render();
};

window.toggleSick = function() {
  modeSick = !modeSick;
  if (modeSick) {
    modeConfig.sick.activeSince = new Date().toISOString();
    const now = new Date().toISOString().split('T')[0];
    contextEvents.push({ type:'sick', start: now, end: null, note: modeConfig.sick.severity });
  } else {
    const active = contextEvents.find(e => e.type === 'sick' && !e.end);
    if (active) active.end = new Date().toISOString().split('T')[0];
  }
  showStatusMenu = false;
  render();
};

window.openModeConfig = function(mode) {
  showModeConfig = mode;
  showStatusMenu = false;
  render();
};

window.closeModeConfig = function() {
  showModeConfig = null;
  render();
};

window.updateModeField = function(mode, field, value) {
  if (mode === 'travel' && field === 'duration') value = parseInt(value) || 7;
  if (mode === 'shift' && field === 'lastShiftHours') value = parseInt(value) || 24;
  modeConfig[mode][field] = value;
};

window.toggleHabit = async function(id) {
  const h = habits.find(x => x.id === id);
  if (h) {
    h.done = !h.done;
    await saveHabitCheck(h.id, h.done, todayISO());
    render();
  }
};

// ============ PROFILE / SETTINGS / REQUEST / ADD PR ============
window.openProfile = function() { showProfile = true; render(); };
window.closeProfile = function() { showProfile = false; render(); };
window.setProfile = function(type) {
  userProfile.type = type;
  weekPlan = PROFILE_PLANS[type] || weekPlanBase;
  render();
};

window.openRequest = function() { showRequest = true; render(); };
window.closeRequest = function() { showRequest = false; render(); };

window.openSettings = function() { showSettings = true; render(); };
window.closeSettings = function() { showSettings = false; render(); };

window.openAddPR = function() { showAddPR = true; render(); };
window.closeAddPR = function() { showAddPR = false; render(); };

// ============ CHAT HANDLERS ============
window.openChat = function() {
  showChat = true;
  render();
  scrollChatToBottom();
};

window.closeChat = function() {
  showChat = false;
  render();
};

window.sendChatFromInput = function() {
  const input = document.getElementById('chat-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendChatMessage(text);
};

window.sendChatSuggestion = function(text) {
  sendChatMessage(text);
};

// ============ TESTS ============
window.openTestProtocol = function(panelName, idx) {
  const panel = performanceTests.find(p => p.panel === panelName);
  if (panel) showTestProtocol = panel.items[idx];
  render();
};
window.closeTestProtocol = function() { showTestProtocol = null; render(); };

window.openTestResult = function(panelName, idx) {
  const panel = performanceTests.find(p => p.panel === panelName);
  if (panel) {
    const t = panel.items[idx];
    showTestResult = { testName: t.name, target: t.target, unit: t.unit, panel: panelName, idx };
  }
  render();
};
window.closeTestResult = function() { showTestResult = null; render(); };
window.toggleTestProtocol = function() {
  if (showTestResult) {
    const panel = performanceTests.find(p => p.panel === showTestResult.panel);
    if (panel) showTestProtocol = panel.items[showTestResult.idx];
    showTestResult = null;
    render();
  }
};

window.openTestSchedule = function() { showTestSchedule = true; render(); };
window.closeTestSchedule = function() { showTestSchedule = false; render(); };

// ============ SESSIONS ============
window.openSessionLog = function(dayIdx) {
  showSessionLog = dayIdx;
  delete sessionFormData[dayIdx];
  render();
};
window.closeSessionLog = function() {
  showSessionLog = null;
  sessionFormData = {};
  render();
};

window.openSessionHistory = function(dayIdx) {
  showSessionHistory = dayIdx;
  render();
};
window.closeSessionHistory = function() {
  showSessionHistory = null;
  render();
};

window.toggleExerciseExpand = function(dayIdx, eIdx) {
  if (sessionFormData[dayIdx] && sessionFormData[dayIdx].exercises[eIdx]) {
    sessionFormData[dayIdx].exercises[eIdx].expanded = !sessionFormData[dayIdx].exercises[eIdx].expanded;
    render();
  }
};

window.removeSet = function(dayIdx, eIdx, sIdx) {
  if (sessionFormData[dayIdx] && sessionFormData[dayIdx].exercises[eIdx]) {
    sessionFormData[dayIdx].exercises[eIdx].sets.splice(sIdx, 1);
    render();
  }
};

window.addNewSet = function(dayIdx, eIdx) {
  if (sessionFormData[dayIdx] && sessionFormData[dayIdx].exercises[eIdx]) {
    const sets = sessionFormData[dayIdx].exercises[eIdx].sets;
    const last = sets[sets.length - 1];
    sets.push({
      reps: last ? last.reps : 8,
      weight: last ? last.weight : 0,
      done: false,
    });
    render();
  }
};

window.duplicateLastSet = function(dayIdx, eIdx) {
  if (sessionFormData[dayIdx] && sessionFormData[dayIdx].exercises[eIdx]) {
    const sets = sessionFormData[dayIdx].exercises[eIdx].sets;
    const last = sets[sets.length - 1];
    if (last) sets.push({ ...last });
    render();
  }
};

window.setRPE = function(dayIdx, n) {
  if (sessionFormData[dayIdx]) {
    sessionFormData[dayIdx].rpe = n;
    render();
  }
};

window.confirmSessionAsPlanned = async function(dayIdx) {
  const d = getModifiedPlan(weekPlan)[dayIdx];
  const session = {
    dayIndex: dayIdx,
    date: todayISO(),
    exercises: d.strength ? d.strength.exercises.map(e => ({
      name: e.name,
      sets: expandSets(e),
    })) : [],
    aerobics: (d.aerobics || (d.aerobic ? [d.aerobic] : [])).map(a => ({ title: a.title, type: a.type, duration: a.duration, done: true })),
    rpe: 7,
    notes: 'Confirmada como planeada',
  };
  await addSession(session);
  showSessionLog = null;
  sessionFormData = {};
  render();
};

window.saveSession = async function(dayIdx) {
  const f = sessionFormData[dayIdx];
  if (!f) return;
  const session = {
    dayIndex: dayIdx,
    date: todayISO(),
    exercises: f.exercises.map(e => ({ name: e.name, sets: e.sets })),
    aerobics: f.aerobics,
    rpe: f.rpe,
    notes: f.notes || '',
  };
  await addSession(session);
  showSessionLog = null;
  sessionFormData = {};
  render();
};

window.deleteSessionById = async function(id, dayIdx) {
  if (!confirm('¿Borrar esta sesión?')) return;
  await deleteSession(id);
  render();
};

window.clearAllSessionsForDay = async function(dayIdx) {
  if (!confirm('¿Borrar TODAS las sesiones de este día?')) return;
  const sessions = getSessionsForDay(dayIdx);
  for (const s of sessions) await deleteSession(s.id);
  showSessionHistory = null;
  render();
};

// ============ AUTH UI HANDLERS ============
window.showRegister = function() {
  document.getElementById('auth-form-login').style.display = 'none';
  document.getElementById('auth-form-register').style.display = 'block';
  hideAuthMessages();
};

window.showLogin = function() {
  document.getElementById('auth-form-register').style.display = 'none';
  document.getElementById('auth-form-login').style.display = 'block';
  hideAuthMessages();
};

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('auth-success').style.display = 'none';
}

function showAuthSuccess(msg) {
  const el = document.getElementById('auth-success');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('auth-error').style.display = 'none';
}

function hideAuthMessages() {
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
}

window.handleLogin = async function() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  if (!email || !pass) { showAuthError('Email y contraseña son obligatorios'); return; }
  try {
    await signIn(email, pass);
  } catch(e) {
    showAuthError(e.message || 'Error al iniciar sesión');
  }
};

window.handleRegister = async function() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if (!name || !email || !pass) { showAuthError('Todos los campos son obligatorios'); return; }
  if (pass.length < 6) { showAuthError('La contraseña debe tener al menos 6 caracteres'); return; }
  try {
    await signUp(email, pass, name);
    showAuthSuccess('Cuenta creada. Revisá tu email para confirmar.');
  } catch(e) {
    showAuthError(e.message || 'Error al registrarse');
  }
};

window.handleSignOut = async function() {
  if (!confirm('¿Cerrar sesión?')) return;
  await signOut();
};

// Enter key para login
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const authScreen = document.getElementById('auth-screen');
    if (authScreen && authScreen.style.display !== 'none') {
      const registerVisible = document.getElementById('auth-form-register').style.display === 'block';
      if (registerVisible) handleRegister();
      else handleLogin();
    }
  }
});

// ============ INIT ============
initAuth();

</script>
