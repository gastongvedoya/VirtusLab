  body {

  .auth-card { width: 100%; max-width: 420px; text-align: center; }

    .patient-row { grid-template-columns: 1fr auto; }

</style>

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;').replaceAll("'", '&#39;');
}
function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function ageFromDate(birthISO) {
  if (!birthISO) return null;
  const b = new Date(birthISO), t = new Date();
  let age = t.getFullYear() - b.getFullYear();
  const m = t.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && t.getDate() < b.getDate())) age--;
  return age;
}
function calcTDEE(kg, cm, age, sex, activity) {
  if (!kg || !cm || !age) return null;
  const bmr = sex === 'F' ? (10*kg + 6.25*cm - 5*age - 161) : (10*kg + 6.25*cm - 5*age + 5);
  return Math.round(bmr * (activity || 1.5));
}
function calcMacros(tdee, ratio) {
  if (!tdee) return null;
  const p = Math.round(tdee * ratio.p / 4);
  const c = Math.round(tdee * ratio.c / 4);
  const f = Math.round(tdee * ratio.f / 9);
  return { kcal: tdee, p, c, f };
}
function safeChart(canvasId, config) {

  if (!canvas) return null;
  const existing = Chart.getChart(canvas);
  if (existing) existing.destroy();
  return new Chart(canvas, config);
}
function avg(arr, key) {
  const vals = arr.map(x => key ? x[key] : x).filter(v => v !== null && v !== undefined && !isNaN(v));
  if (!vals.length) return null;
  return vals.reduce((s, v) => s + Number(v), 0) / vals.length;
}

async function initAuth() {
  if (!_supabase) { showAuthError('Error cargando Supabase. Recargá la página.'); return; }
  const { data: { session } } = await _supabase.auth.getSession();
  if (session) { currentUser = session.user; await onSignedIn(); } else { showAuthScreen(); }
  _supabase.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) { currentUser = session.user; await onSignedIn(); }
    else if (event === 'SIGNED_OUT') { currentUser = null; currentProfile = null; showAuthScreen(); }
  });
}
async function onSignedIn() {
  const profile = await loadProfile();
  if (!profile) {
    await _supabase.from('profiles').insert({ id: currentUser.id, full_name: '' });
    currentProfile = { id: currentUser.id, full_name: '', role: 'athlete', profile_complete: false };
  } else {
    currentProfile = profile;
  }
  hideAuthScreen();
  await handleWhoopAuthCallback();
  routeUser();
}
async function loadProfile() {
  const { data, error } = await _supabase.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
  if (error) console.warn('loadProfile:', error);
  return data;
}

async function loadAthleteData(userId) {

  try {

      _supabase.from('whoop_recovery').select('*').eq('user_id', uid).order('date', { ascending: true }),
      _supabase.from('whoop_sleep').select('*').eq('user_id', uid).order('date', { ascending: true }),
      _supabase.from('whoop_cycles').select('*').eq('user_id', uid).order('date', { ascending: true }),
      _supabase.from('sessions').select('*').eq('user_id', uid).order('date', { ascending: false }),
      _supabase.from('habit_checks').select('*').eq('user_id', uid).eq('date', todayISO()),
      _supabase.from('goals').select('*').eq('user_id', uid).order('created_at', { ascending: false }),
      _supabase.from('whoop_tokens').select('*').eq('user_id', uid).maybeSingle(),

      _supabase.from('consultations').select('*').eq('patient_id', uid).order('date', { ascending: false }),
    ]);
    const habChecks = {};
    (hab.data || []).forEach(h => { habChecks[h.habit_id] = h.done; });
    return {
      whoopRecovery: rec.data || [],
      whoopSleep: slp.data || [],
      whoopCycles: cyc.data || [],
      sessions: sess.data || [],
      habitChecks: habChecks,
      goals: gol.data || [],
      biomarkers: bio.data || [],
      consultations: cons.data || [],
      whoopConnected: !!tok.data,
      whoopTokens: tok.data || null,
    };
  } catch(e) {
    console.warn('loadAthleteData:', e);
    return { whoopRecovery: [], whoopSleep: [], whoopCycles: [], sessions: [], habitChecks: {}, goals: [], biomarkers: [], consultations: [], whoopConnected: false, whoopTokens: null };
  }
}

function cleanMarkdown(t) {
  if (!t) return '';
  return t.replace(/\*\*([^*]+)\*\*/g, '$1').replace(/\*([^*]+)\*/g, '$1')
    .replace(/__([^_]+)__/g, '$1').replace(/_([^_]+)_/g, '$1')
    .replace(/^#{1,6}\s+/gm, '').replace(/`([^`]+)`/g, '$1')
    .replace(/^\s*[-*+]\s+/gm, '• ').trim();
}
function buildAIContext() {
  const lines = [];
  const today = new Date();
  const dayNames = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const monthNames = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  lines.push('=== FECHA DE HOY ===');
  lines.push('Hoy es ' + dayNames[today.getDay()] + ' ' + today.getDate() + ' de ' + monthNames[today.getMonth()] + ' de ' + today.getFullYear());
  lines.push('Cuando el usuario pregunte por "hoy", "ayer" o "mañana", usá esta fecha como referencia, NO las fechas de los datos históricos.');

  lines.push('\n=== USUARIO ===');
  lines.push('Nombre: ' + (currentProfile.full_name || 'sin nombre'));
  if (currentProfile.birth_date) lines.push('Edad: ' + ageFromDate(currentProfile.birth_date) + ' años');
  if (currentProfile.sex) lines.push('Sexo: ' + currentProfile.sex);
  if (currentProfile.height_cm) lines.push('Altura: ' + currentProfile.height_cm + ' cm');
  if (currentProfile.weight_kg) lines.push('Peso: ' + currentProfile.weight_kg + ' kg');
  if (currentProfile.archetype) {
    const a = ARCHETYPES[currentProfile.archetype];
    lines.push('Arquetipo: ' + a.archetype + ' (' + a.label + ') - ' + a.desc);
  }
  if (currentProfile.main_goal) lines.push('Objetivo principal: ' + currentProfile.main_goal);

  const rec = athleteData.whoopRecovery || [];
  if (rec.length) {
    const last7 = rec.slice(-7);
    lines.push('\n=== WHOOP ÚLTIMOS 7 DÍAS ===');
    last7.forEach(r => {
      lines.push(r.date + ': HRV ' + (r.hrv_rmssd ? Math.round(r.hrv_rmssd)+'ms' : '-') + ', FCR ' + (r.resting_hr || '-') + 'bpm, Recovery ' + (r.recovery_score !== null ? r.recovery_score+'%' : '-'));
    });
    const last30 = rec.slice(-30);
    const baseHrv = avg(last30, 'hrv_rmssd');
    const baseRhr = avg(last30, 'resting_hr');
    if (baseHrv) lines.push('Baseline 30d: HRV ' + Math.round(baseHrv) + 'ms, FCR ' + Math.round(baseRhr) + 'bpm');
  } else {
    lines.push('\n(Sin datos de WHOOP todavía)');
  }

  const cyc = athleteData.whoopCycles || [];
  if (cyc.length) {
    const lastCyc = cyc.slice(-7);
    lines.push('\n=== STRAIN ÚLTIMOS 7 DÍAS ===');
    lastCyc.forEach(c => lines.push(c.date + ': strain ' + (c.strain ? c.strain.toFixed(1) : '-')));
  }

  const habs = Object.entries(athleteData.habitChecks || {}).filter(([k,v]) => v).length;
  lines.push('\n=== HÁBITOS HOY === ' + habs + '/' + DEFAULT_HABITS.length + ' completados');

  if (athleteData.goals && athleteData.goals.length) {
    lines.push('\n=== OBJETIVOS ACTIVOS ===');
    athleteData.goals.slice(0, 5).forEach(g => {
      lines.push('- ' + g.title + ' (' + (g.pct_progress || 0) + '%)' + (g.target_value ? ' meta: ' + g.target_value + (g.unit || '') : ''));
    });
  }

  if (athleteData.sessions && athleteData.sessions.length) {
    lines.push('\n=== ÚLTIMAS 3 SESIONES ===');
    athleteData.sessions.slice(0, 3).forEach(s => {
      lines.push(s.date + ' RPE ' + (s.rpe || '-') + ': ' + (s.notes ? s.notes.substring(0, 100) : '(sin notas)'));
    });
  }

  return lines.join('\n');
}
async function sendChatMessage(userMsg) {
  if (!userMsg.trim() || _aiLoading) return;
  chatMessages.push({ from: 'user', text: userMsg });
  _aiLoading = true;
  render();
  scrollChatToBottom();
  try {
    await persistChatMessage('user', userMsg);
    const recent = chatMessages.slice(-10).map(m => ({ role: m.from === 'user' ? 'user' : 'assistant', content: m.text }));
    const archetypeInfo = currentProfile.archetype ? ARCHETYPES[currentProfile.archetype] : null;
    const archetypeLine = archetypeInfo ? '\nArquetipo del usuario: ' + archetypeInfo.archetype + ' (' + archetypeInfo.label + ') — ' + archetypeInfo.desc + '.' : '';
    const sys = 'Sos el asistente de IA de VirtusLab, un sistema de optimización de rendimiento humano. Respondé en español argentino, directo y breve (máximo 3-4 oraciones salvo que pidan más detalle). Tono: coach con base científica, sin rodeos, pinceladas estoicas ocasionales.\n\nFORMATO: NUNCA uses markdown (asteriscos, headers, etc). Texto plano como WhatsApp. Si necesitás bullets, usá "•". Si querés enfatizar, usá MAYÚSCULAS puntuales.' + archetypeLine + '\n\nTenés acceso a los datos reales del usuario:\n\n' + buildAIContext();
    const res = await fetch(CLAUDE_PROXY_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: CLAUDE_MODEL, max_tokens: 800, system: sys, messages: recent })
    });
    const data = await res.json();
    if (data.content && data.content[0]) {
      const out = cleanMarkdown(data.content[0].text);
      chatMessages.push({ from: 'ai', text: out });
      await persistChatMessage('assistant', out);
    } else if (data.error) {
      chatMessages.push({ from: 'ai', text: 'Error: ' + (data.error.message || 'no pude procesar.') });
    }
  } catch(e) {
    chatMessages.push({ from: 'ai', text: 'Error de conexión. Probá de nuevo.' });
  }
  _aiLoading = false;
  render();
  scrollChatToBottom();
}

function connectWhoop() {
  const state = 'vl_' + Math.random().toString(36).substring(2, 15);
  const authUrl = 'https://api.prod.whoop.com/oauth/oauth2/auth'
    + '?client_id=' + WHOOP_CLIENT_ID
    + '&redirect_uri=' + encodeURIComponent(WHOOP_REDIRECT_URI)
    + '&response_type=code'
    + '&scope=' + encodeURIComponent(WHOOP_SCOPES)
    + '&state=' + state;
  window.location.href = authUrl;
}
async function disconnectWhoop() {
  if (!confirm('¿Desconectar WHOOP?')) return;
  await _supabase.from('whoop_tokens').delete().eq('user_id', currentUser.id);
  athleteData.whoopConnected = false;
  athleteData.whoopTokens = null;
  render();
}
async function handleWhoopAuthCallback() {
  if (!window.location.hash || !window.location.hash.includes('access_token')) return;
  const params = new URLSearchParams(window.location.hash.substring(1));
  const access_token = params.get('access_token');
  const refresh_token = params.get('refresh_token');
  const expires_in = parseInt(params.get('expires_in') || '3600');
  if (!access_token || !refresh_token) return;
  const expires_at = new Date(Date.now() + expires_in * 1000).toISOString();
  const { error } = await _supabase.from('whoop_tokens').upsert({
    user_id: currentUser.id, access_token, refresh_token, expires_at,
    updated_at: new Date().toISOString(),
  }, { onConflict: 'user_id' });
  window.history.replaceState({}, document.title, window.location.pathname);
  if (error) {
    alert('Error guardando WHOOP: ' + error.message);
  } else {
    // Force first sync immediately
    setTimeout(() => syncWhoop(), 500);
  }
}
async function syncWhoop() {
  if (_whoopSyncing) return;
  if (!athleteData.whoopTokens && currentProfile && currentProfile.role !== 'doctor') {
    // Fetch tokens from DB if not in athleteData yet (right after callback)
    const { data: tok } = await _supabase.from('whoop_tokens').select('*').eq('user_id', currentUser.id).maybeSingle();
    if (!tok) { alert('Conectá WHOOP primero.'); return; }
    athleteData.whoopTokens = tok;
    athleteData.whoopConnected = true;
  }
  _whoopSyncing = true;
  render();
  try {
    const tok = athleteData.whoopTokens;
    let newTokens = null;
    async function fetchType(type) {
      const res = await fetch('/api/whoop-sync', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ access_token: tok.access_token, refresh_token: tok.refresh_token, expires_at: tok.expires_at, type })
      });
      const data = await res.json();
      if (data.error) throw new Error(type + ': ' + (data.detail || data.error));
      if (data.newTokens) newTokens = data.newTokens;
      return data.records || [];
    }
    const recovery = await fetchType('recovery');
    const sleep = await fetchType('sleep');
    const cycles = await fetchType('cycles');
    if (newTokens) {
      await _supabase.from('whoop_tokens').update({
        access_token: newTokens.access_token || tok.access_token,
        refresh_token: newTokens.refresh_token || tok.refresh_token,
        expires_at: newTokens.expires_at || tok.expires_at,
        updated_at: new Date().toISOString(),
      }).eq('user_id', currentUser.id);
    }
    await saveWhoopToSupabase(recovery, sleep, cycles);
    await loadOwnAthleteData();
    alert('Sincronizado: ' + recovery.length + ' recovery / ' + sleep.length + ' sleep / ' + cycles.length + ' cycles');
  } catch(e) {
    alert('Error sync: ' + e.message);
  }
  _whoopSyncing = false;
  render();
}
async function saveWhoopToSupabase(recoveryArr, sleepArr, cyclesArr) {
  const recRows = []; const seenR = new Set();
  (recoveryArr || []).forEach(r => {
    const score = r.score || {};
    const date = (r.created_at || '').split('T')[0]; if (!date || seenR.has(date)) return;
    seenR.add(date);
    recRows.push({
      user_id: currentUser.id, cycle_id: r.cycle_id ? String(r.cycle_id) : null,
      sleep_id: r.sleep_id ? String(r.sleep_id) : null, date,
      recovery_score: Math.round(score.recovery_score || 0) || null,
      hrv_rmssd: score.hrv_rmssd_milli || null,
      resting_hr: Math.round(score.resting_heart_rate || 0) || null,
      spo2: score.spo2_percentage || null, skin_temp: score.skin_temp_celsius || null,
      raw_json: r,
    });
  });
  const sleepByDate = {};
  (sleepArr || []).forEach(s => {
    const score = s.score || {}; const stages = score.stage_summary || {};
    const date = (s.end || s.created_at || '').split('T')[0]; if (!date) return;
    const dur = stages.total_in_bed_time_milli || 0;
    if (!sleepByDate[date] || dur > sleepByDate[date].dur) sleepByDate[date] = { s, score, stages, dur };
  });
  const slpRows = Object.entries(sleepByDate).map(([date, info]) => {
    const { s, score, stages } = info;
    return {
      user_id: currentUser.id, sleep_id: s.id ? String(s.id) : null, date,
      total_sleep_min: Math.round((stages.total_in_bed_time_milli || 0) / 60000) || null,
      sleep_efficiency: score.sleep_efficiency_percentage || null,
      sleep_performance: score.sleep_performance_percentage || null,
      sleep_consistency: score.sleep_consistency_percentage || null,
      slow_wave_min: Math.round((stages.total_slow_wave_sleep_time_milli || 0) / 60000) || null,
      rem_min: Math.round((stages.total_rem_sleep_time_milli || 0) / 60000) || null,
      light_min: Math.round((stages.total_light_sleep_time_milli || 0) / 60000) || null,
      awake_min: Math.round((stages.total_awake_time_milli || 0) / 60000) || null,
      respiratory_rate: score.respiratory_rate || null, raw_json: s,
    };
  });
  const cycRows = []; const seenC = new Set();
  (cyclesArr || []).forEach(c => {
    const score = c.score || {};
    const date = (c.start || c.created_at || '').split('T')[0]; if (!date || seenC.has(date)) return;
    seenC.add(date);
    cycRows.push({
      user_id: currentUser.id, cycle_id: c.id ? String(c.id) : null, date,
      strain: score.strain || null, kilojoules: score.kilojoule || null,
      avg_hr: Math.round(score.average_heart_rate || 0) || null,
      max_hr: Math.round(score.max_heart_rate || 0) || null, raw_json: c,
    });
  });
  if (recRows.length) await _supabase.from('whoop_recovery').upsert(recRows, { onConflict: 'user_id,date' });
  if (slpRows.length) await _supabase.from('whoop_sleep').upsert(slpRows, { onConflict: 'user_id,date' });
  if (cycRows.length) await _supabase.from('whoop_cycles').upsert(cycRows, { onConflict: 'user_id,date' });
}
window.connectWhoop = connectWhoop;
window.disconnectWhoop = disconnectWhoop;
window.syncWhoop = syncWhoop;

  if (onboardingStep === 1) {
    if (!o.full_name || !o.birth_date || !o.height_cm || !o.weight_kg) { alert('Completá todos los campos.'); return; }
    onboardingStep = 2;
  } else if (onboardingStep === 2) {
    if (!o.archetype) { alert('Elegí un arquetipo.'); return; }
    onboardingStep = 3;
  } else if (onboardingStep === 3) {
    if (!o.main_goal || o.main_goal.trim().length < 5) { alert('Contanos brevemente tu objetivo.'); return; }
    onboardingStep = 4;
  }
  render();

window.finishOnboarding = async function(connectAfter) {
  const o = onboardingData;
  await updateProfile({
    full_name: o.full_name, birth_date: o.birth_date, sex: o.sex,
    height_cm: parseFloat(o.height_cm) || null, weight_kg: parseFloat(o.weight_kg) || null,
    archetype: o.archetype, main_goal: o.main_goal,
    profile_complete: true, onboarded_at: new Date().toISOString(),
  });
  await saveGoal({ title: 'Objetivo principal', description: o.main_goal, category: 'performance', priority: 'high' });

  else {
    activeView = 'athlete';

function getReadiness(rec) {
  if (rec === null || rec === undefined) return { c: 'var(--text-faint)', label: '—', bg: 'transparent' };
  if (rec >= 67) return { c: 'var(--green)', label: 'Listo para entrenar', bg: 'var(--green-dim)' };
  if (rec >= 34) return { c: 'var(--yellow)', label: 'Precaución', bg: 'var(--yellow-dim)' };
  return { c: 'var(--red)', label: 'Recuperar', bg: 'var(--red-dim)' };
}

function renderAthleteHabits() {
  const s = ATHLETE_SECTIONS[4];

  const groups = [
    { key: 'circadian', label: 'Ritmo circadiano' },

  const done = DEFAULT_HABITS.filter(h => checks[h.id]).length;
  const total = DEFAULT_HABITS.length;
  const score = Math.round(done / total * 100);
  return sectionHeader(s.label, s.sub) +
    '<div class="card" style="background: var(--blue-dim); border-left: 3px solid var(--blue); padding: 18px 22px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px;">' +

      '<div class="num num-georgia" style="font-size: 44px; color: var(--blue); line-height: 1;">' + score + '<span style="font-size: 14px; color: var(--text-muted);">/100</span></div>' +
    '</div>' +
    groups.map(g => {
      const items = DEFAULT_HABITS.filter(h => h.cat === g.key);
      if (!items.length) return '';
      const groupDone = items.filter(h => checks[h.id]).length;
      return '<div style="margin-bottom: 22px;">' +
        '<div class="row-between" style="margin-bottom: 12px;">' +
          '<div style="font-size: 11px; color: var(--blue); letter-spacing: 1.4px; text-transform: uppercase; font-weight: 600;">' + escapeHtml(g.label) + '</div>' +
          '<div style="font-size: 11px; color: var(--text-faint); font-family: Georgia, serif;">' + groupDone + '/' + items.length + '</div>' +
        '</div>' +
        '<div class="stack">' +
          items.map(h => {
            const isDone = !!checks[h.id];
            return '<button onclick="toggleHabit(\'' + h.id + '\')" style="text-align: left; display: flex; align-items: center; gap: 12px; padding: 13px 15px; border: 0.5px solid ' + (isDone ? 'var(--blue)' : 'var(--border)') + '; background: ' + (isDone ? 'var(--blue-dim)' : 'var(--panel)') + '; cursor: pointer; width: 100%; color: var(--text); border-radius: 4px;">' +
              '<div style="width: 18px; height: 18px; border: 1.5px solid ' + (isDone ? 'var(--blue)' : 'var(--text-muted)') + '; background: ' + (isDone ? 'var(--blue)' : 'transparent') + '; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border-radius: 3px;">' +
                (isDone ? '<span style="color: var(--bg); font-size: 12px; font-weight: 700;">&#10003;</span>' : '') +
              '</div>' +
              '<div style="flex: 1; font-size: 12px; color: ' + (isDone ? 'var(--blue)' : 'var(--text)') + ';">' + escapeHtml(h.name) + '</div>' +
            '</button>';
          }).join('') +
        '</div>' +
      '</div>';
    }).join('');
}
window.toggleHabit = async function(habitId) {
  const cur = !!athleteData.habitChecks[habitId];
  athleteData.habitChecks[habitId] = !cur;
  render();
  try { await saveHabitCheck(habitId, !cur); }

};

      '</div>' +
    '</div>' +
    (p.main_goal ? '<div class="card" style="border-left: 3px solid var(--blue); padding: 14px 18px; margin-bottom: 14px;"><div style="font-size: 9px; color: var(--blue); letter-spacing: 1.2px; text-transform: uppercase; font-weight: 500; margin-bottom: 4px;">Objetivo principal</div><div style="font-size: 12px; line-height: 1.6;">' + escapeHtml(p.main_goal) + '</div></div>' : '') +
    '<div class="grid-4" style="margin-bottom: 12px;">' +
      baselineCard('HRV', last && last.hrv_rmssd ? Math.round(last.hrv_rmssd) : '—', 'ms', null) +
      baselineCard('FC reposo', last && last.resting_hr ? last.resting_hr : '—', 'bpm', null) +
      baselineCard('Recovery', last && last.recovery_score !== null ? last.recovery_score : '—', '%', null) +
      baselineCard('Sueño', lastSlp && lastSlp.total_sleep_min ? (lastSlp.total_sleep_min/60).toFixed(1) : '—', 'h', null) +
    '</div>' +
    '<div class="grid-3" style="margin-bottom: 14px;">' +
      '<div class="metric"><div class="metric-label">Hábitos hoy</div><div class="metric-value">' + habitsDone + '<span class="unit">/' + DEFAULT_HABITS.length + '</span></div><div class="metric-sub">cargados por el paciente</div></div>' +
      '<div class="metric"><div class="metric-label">Sesiones</div><div class="metric-value">' + (d.sessions ? d.sessions.length : 0) + '</div><div class="metric-sub">total</div></div>' +
      '<div class="metric"><div class="metric-label">Objetivos</div><div class="metric-value">' + (d.goals ? d.goals.length : 0) + '</div><div class="metric-sub">activos</div></div>' +
    '</div>' +

    (selectedPatientNotes.length ?
      '<div style="margin-bottom: 14px;">' +
        '<div style="font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px;">Notas clínicas</div>' +
        '<div class="stack">' +
          selectedPatientNotes.map(n =>
            '<div class="card" style="border-left: 2px solid var(--blue); padding: 12px 14px;">' +
              '<div class="row-between" style="margin-bottom: 6px;">' +
                '<div style="font-size: 9px; color: var(--blue); letter-spacing: 1.2px; text-transform: uppercase;">' + escapeHtml(n.type || 'nota') + ' · ' + escapeHtml(n.date) + '</div>' +
                '<button onclick="confirmDeleteConsult(' + n.id + ')" class="btn btn-danger btn-sm">×</button>' +
              '</div>' +
              (n.title ? '<div style="font-size: 13px; font-weight: 500; margin-bottom: 4px;">' + escapeHtml(n.title) + '</div>' : '') +
              '<div style="font-size: 11px; color: var(--text-muted); line-height: 1.6; white-space: pre-wrap;">' + escapeHtml(n.body) + '</div>' +
            '</div>'
          ).join('') +
        '</div>' +
      '</div>' : '') +

    (d.whoopRecovery && d.whoopRecovery.length ? (
      '<div class="card" style="padding: 16px 20px; margin-bottom: 12px;">' +
        '<div style="font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 14px;">HRV — últimos 60 días</div>' +
        '<div style="position: relative; height: 220px;"><canvas id="patientHrvChart"></canvas></div>' +
      '</div>'
    ) : '') +

    (d.whoopCycles && d.whoopCycles.length ? (
      '<div class="card" style="padding: 16px 20px; margin-bottom: 12px;">' +
        '<div style="font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 14px;">Strain — últimos 60 días</div>' +
        '<div style="position: relative; height: 220px;"><canvas id="patientStrainChart"></canvas></div>' +
      '</div>'
    ) : '') +

    (d.goals && d.goals.length ? (
      '<div style="margin-bottom: 14px;">' +
        '<div style="font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px;">Objetivos del paciente</div>' +
        '<div class="stack">' +
          d.goals.map(g =>
            '<div class="card" style="padding: 12px 14px;">' +
              '<div class="row-between"><div><div style="font-size: 12px; font-weight: 500;">' + escapeHtml(g.title) + '</div>' +
              (g.description ? '<div style="font-size: 10px; color: var(--text-muted); margin-top: 3px;">' + escapeHtml(g.description) + '</div>' : '') + '</div>' +
              '<div class="num num-georgia" style="font-size: 16px;">' + (g.pct_progress || 0) + '<span style="font-size: 10px; color: var(--text-muted);">%</span></div></div>' +
              '<div class="progress-track" style="margin-top: 8px;"><div class="progress-fill" style="width: ' + (g.pct_progress || 0) + '%;"></div></div>' +
            '</div>'
          ).join('') +
        '</div>' +
      '</div>'
    ) : '') +

    (d.sessions && d.sessions.length ? (
      '<div>' +
        '<div style="font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px;">Últimas sesiones</div>' +
        '<div class="stack">' +
          d.sessions.slice(0, 8).map(s =>
            '<div class="card" style="padding: 12px 14px;">' +
              '<div class="row-between"><div><div style="font-size: 12px; font-weight: 500;">' + escapeHtml(s.date) + '</div>' +
              '<div style="font-size: 10px; color: var(--text-faint); margin-top: 3px;">RPE ' + (s.rpe || '—') + '/10</div></div></div>' +
              (s.notes ? '<div style="font-size: 11px; color: var(--text-muted); margin-top: 8px; font-style: italic; line-height: 1.5;">' + escapeHtml(s.notes) + '</div>' : '') +
            '</div>'
          ).join('') +
        '</div>' +
      '</div>'
    ) : '') +
    '<div id="consult-modal" class="hidden"></div>';
}
function drawPatientCharts() {
  const d = selectedPatientData;
  if (!d) return;
  const rec = (d.whoopRecovery || []).slice(-60);
  const cyc = (d.whoopCycles || []).slice(-60);
  if (rec.length) {
    safeChart('patientHrvChart', {
      type: 'line',
      data: { labels: rec.map(r => r.date.substring(5)), datasets: [{ data: rec.map(r => r.hrv_rmssd), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.12)', tension: 0.3, fill: true, pointRadius: 0, borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { maxTicksLimit: 8, font: { size: 9 }, color: '#a8a59c' }, grid: { color: 'rgba(245,241,232,0.08)' } }, y: { ticks: { font: { size: 9 }, color: '#a8a59c' }, grid: { color: 'rgba(245,241,232,0.08)' } } } }
    });
  }
  if (cyc.length) {
    safeChart('patientStrainChart', {
      type: 'bar',
      data: { labels: cyc.map(c => c.date.substring(5)), datasets: [{ data: cyc.map(c => c.strain), backgroundColor: cyc.map(c => c.strain > 15 ? '#b84040' : c.strain > 10 ? '#b8893f' : '#3b82f6') }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { maxTicksLimit: 8, font: { size: 9 }, color: '#a8a59c' }, grid: { color: 'rgba(245,241,232,0.08)' } }, y: { ticks: { font: { size: 9 }, color: '#a8a59c' }, grid: { color: 'rgba(245,241,232,0.08)' } } } }
    });
  }
}

window.openConsultModal = function() {
  const html = '<div class="modal-bg" onclick="if(event.target===this)closeConsultModal()">' +
    '<div class="modal-card">' +
      '<div class="row-between" style="margin-bottom: 14px;">' +
        '<div style="font-size: 18px; font-family: Georgia, serif; font-weight: 500;">Nota clínica</div>' +
        '<button onclick="closeConsultModal()" class="btn btn-ghost btn-sm">Cerrar</button>' +
      '</div>' +
      '<div style="font-size: 11px; color: var(--text-faint); margin-bottom: 12px;">Esta nota va a aparecer en la sección Consulta médica del paciente.</div>' +
      '<div style="display: grid; gap: 10px; margin-bottom: 14px;">' +
        '<select id="c-type" class="auth-input" style="margin: 0;">' +
          '<option value="note">Nota</option><option value="consult">Consulta</option>' +
          '<option value="followup">Seguimiento</option><option value="alert">Alerta</option>' +
        '</select>' +
        '<input id="c-title" type="text" placeholder="Título (opcional)" class="auth-input" style="margin: 0;" />' +
        '<input id="c-date" type="date" value="' + todayISO() + '" class="auth-input" style="margin: 0;" />' +
        '<textarea id="c-body" placeholder="Observaciones, plan, recomendaciones..." style="width: 100%; min-height: 140px; padding: 12px; font-size: 13px; border: 0.5px solid var(--border); background: var(--panel-hi); color: var(--text); border-radius: 6px; resize: vertical; line-height: 1.5;"></textarea>' +
      '</div>' +
      '<div class="row" style="gap: 8px;">' +
        '<button onclick="closeConsultModal()" class="btn btn-ghost" style="flex: 1;">Cancelar</button>' +
        '<button onclick="saveConsultForm()" class="btn btn-primary" style="flex: 2;">Guardar</button>' +
      '</div>' +
    '</div></div>';
  document.getElementById('consult-modal').classList.remove('hidden');
  document.getElementById('consult-modal').innerHTML = html;
};
window.closeConsultModal = function() {
  const el = document.getElementById('consult-modal');
  if (el) { el.innerHTML = ''; el.classList.add('hidden'); }
};
window.saveConsultForm = async function() {
  const body = document.getElementById('c-body').value.trim();
  if (!body || body.length < 5) { alert('La nota es obligatoria.'); return; }
  await addConsultation(selectedPatientId, {
    type: document.getElementById('c-type').value,
    title: document.getElementById('c-title').value.trim(),
    date: document.getElementById('c-date').value || todayISO(),
    body: body,
  });
  closeConsultModal();
  await loadPatientDetail(selectedPatientId);
  render();
};
window.confirmDeleteConsult = async function(id) {
  if (!confirm('¿Borrar nota?')) return;
  await deleteConsultation(id);
  await loadPatientDetail(selectedPatientId);
  render();
};

function renderDoctorSettings() {
  const p = currentProfile;
  return '<div class="section-title-block"><div class="section-title">Perfil</div><div class="section-sub latin">Cura sui · ad virtutem</div></div>' +
    '<div class="card" style="padding: 18px;">' +
      '<div style="font-size: 11px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.6;">Cuenta de médico. Tenés acceso de lectura a los datos de todos los atletas registrados, y podés escribir notas clínicas.</div>' +
      '<div class="grid-2" style="gap: 10px;">' +
        '<div><div style="font-size: 9px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;">Nombre</div>' +
        '<input id="dp-name" type="text" value="' + escapeHtml(p.full_name || '') + '" class="auth-input" style="margin: 0;" /></div>' +
        '<div><div style="font-size: 9px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;">Email</div>' +
        '<input type="email" value="' + escapeHtml(currentUser ? currentUser.email : '') + '" disabled class="auth-input" style="margin: 0; opacity: 0.6;" /></div>' +
      '</div>' +
      '<button onclick="saveDoctorProfileForm()" class="btn btn-primary" style="margin-top: 14px;">Guardar</button>' +
    '</div>' +
    '<div style="margin-top: 18px;"><button onclick="handleSignOut()" class="btn btn-danger">Cerrar sesión</button></div>';
}
window.saveDoctorProfileForm = async function() {
  await updateProfile({ full_name: document.getElementById('dp-name').value.trim() });
  alert('Perfil actualizado.'); render();
};

</script>
