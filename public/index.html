<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VirtusLab</title>
<meta name="description" content="Engineered for Peak Human Performance">
<meta name="theme-color" content="#0f0f12">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="manifest" href="/site.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VirtusLab">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0c;
    --panel: #16161a;
    --panel-hi: #1c1c21;
    --border: rgba(245,241,232,0.08);
    --border-strong: rgba(245,241,232,0.16);
    --text: #f5f1e8;
    --text-muted: #a8a59c;
    --text-faint: #6b6962;
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.12);
    --red: #b84040;
    --red-dim: rgba(184,64,64,0.12);
    --yellow: #b8893f;
    --yellow-dim: rgba(184,137,63,0.12);
    --green: #7a9456;
    --green-dim: rgba(122,148,86,0.12);
  }
  html, body {
    background: var(--bg);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
  }
  body {
    padding-top: env(safe-area-inset-top);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
  }
  #app-wrapper { width: 100%; min-height: 100vh; }
  #app { max-width: 1400px; margin: 0 auto; min-height: 100vh; }
  .num { font-variant-numeric: tabular-nums; }
  button, .card { transition: all 0.18s ease; }
  button:hover:not(:disabled) { filter: brightness(1.12); }
  button { font-family: inherit; cursor: pointer; }
  button:focus { outline: none; }
  input, textarea, select { font-family: inherit; font-size: 16px; }
  input:focus, textarea:focus, select:focus { border-color: var(--blue) !important; outline: none; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--panel); }
  ::-webkit-scrollbar-thumb { background: rgba(245,241,232,0.16); }

  .sticky-header {
    position: sticky; top: 0; z-index: 50;
    background: var(--panel);
    border-bottom: 0.5px solid var(--border);
  }
  .vl-logo {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    color: var(--text);
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .vl-logo .accent { color: var(--blue); }
  .tagline {
    font-family: Georgia, serif;
    font-style: italic;
    color: var(--text-faint);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-size: 10px;
  }
  .num-georgia { font-family: Georgia, serif; font-weight: 500; }
  .latin { font-family: Georgia, serif; font-style: italic; letter-spacing: 0.4px; }

  /* Auth */
  .auth-wrapper {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px;
  }
  .auth-card {
    width: 100%; max-width: 380px; text-align: center;
  }
  .auth-input {
    width: 100%; padding: 13px 16px; margin-bottom: 10px;
    background: var(--panel); border: 0.5px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 14px; outline: none;
  }
  .auth-button {
    width: 100%; padding: 13px;
    background: var(--blue); color: #fff; border: none; border-radius: 6px;
    font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
    font-weight: 500;
  }
  .auth-msg-error {
    background: var(--red-dim); border: 0.5px solid var(--red);
    color: var(--red); padding: 10px 14px; border-radius: 6px;
    font-size: 13px; margin-bottom: 16px;
  }
  .auth-msg-ok {
    background: var(--green-dim); border: 0.5px solid var(--green);
    color: var(--green); padding: 10px 14px; border-radius: 6px;
    font-size: 13px; margin-bottom: 16px;
  }
  .hidden { display: none !important; }

  /* Card primitives */
  .card {
    border: 0.5px solid var(--border);
    background: var(--panel);
    padding: 14px;
  }
  .card:hover { border-color: var(--border-strong); }
  .metric {
    border: 0.5px solid var(--border); padding: 14px; background: var(--panel);
    min-height: 92px; display: flex; flex-direction: column; justify-content: space-between;
  }
  .metric-label {
    font-size: 9px; color: var(--text-muted);
    letter-spacing: 1.2px; text-transform: uppercase;
  }
  .metric-value {
    font-size: 24px; font-family: Georgia, serif; font-weight: 500;
    color: var(--text); line-height: 1;
  }
  .metric-value .unit {
    font-size: 11px; color: var(--text-muted); margin-left: 4px; font-weight: 400;
  }
  .metric-sub { font-size: 10px; color: var(--text-faint); }

  /* Buttons */
  .btn {
    padding: 10px 18px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    border-radius: 24px; font-weight: 500; cursor: pointer;
    border: 0.5px solid var(--border-strong); background: transparent; color: var(--text-muted);
  }
  .btn-primary {
    border: 0.5px solid var(--blue); background: var(--blue-dim); color: var(--blue);
  }
  .btn-danger {
    border: 0.5px solid var(--red); background: transparent; color: var(--red);
  }
  .btn-ghost {
    border: 0.5px solid var(--border); background: transparent; color: var(--text-muted);
  }
  .btn-block { width: 100%; }
  .btn-sm { padding: 7px 12px; font-size: 9px; }

  /* Section title */
  .section-title-block {
    margin-bottom: 1.25rem; padding-bottom: 12px;
    border-bottom: 0.5px solid var(--border);
  }
  .section-title {
    font-size: 19px; font-weight: 500; color: var(--text); letter-spacing: -0.2px;
  }
  .section-sub { font-size: 11px; color: var(--text-faint); margin-top: 3px; }

  /* Nav tabs */
  .nav-tabs {
    display: flex; gap: 0; padding: 0 1.5rem; background: var(--panel);
    overflow-x: auto; border-bottom: 0.5px solid var(--border);
  }
  .nav-tab {
    padding: 12px 14px; font-size: 11px; border: none; background: transparent;
    color: var(--text-muted); font-weight: 400;
    letter-spacing: 0.8px; text-transform: uppercase;
    white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -0.5px;
  }
  .nav-tab.active { color: var(--blue); font-weight: 500; border-bottom-color: var(--blue); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    padding: 20px; z-index: 1000; overflow-y: auto;
  }
  .modal-card {
    background: var(--panel); padding: 1.75rem;
    max-width: 560px; margin: 40px auto;
    border: 0.5px solid var(--border-strong); border-radius: 14px;
    color: var(--text);
  }

  /* Goal pill */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500;
  }
  .pill-blue { background: var(--blue-dim); color: var(--blue); border: 0.5px solid var(--blue); }
  .pill-green { background: var(--green-dim); color: var(--green); border: 0.5px solid var(--green); }
  .pill-yellow { background: var(--yellow-dim); color: var(--yellow); border: 0.5px solid var(--yellow); }
  .pill-red { background: var(--red-dim); color: var(--red); border: 0.5px solid var(--red); }
  .pill-faint { background: transparent; color: var(--text-faint); border: 0.5px solid var(--border-strong); }

  /* Progress bar */
  .progress-track { height: 4px; background: var(--border-strong); overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue); transition: width 0.3s ease; }

  /* Patient row (doctor portal) */
  .patient-row {
    display: grid; grid-template-columns: 1fr auto auto auto;
    gap: 14px; align-items: center;
    padding: 14px 16px; background: var(--panel);
    border: 0.5px solid var(--border); cursor: pointer;
  }
  .patient-row:hover { border-color: var(--border-strong); background: var(--panel-hi); }

  /* Layout helpers */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .row { display: flex; align-items: center; }
  .row-between { display: flex; justify-content: space-between; align-items: center; }
  .stack { display: grid; gap: 6px; }

  @media (max-width: 768px) {
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
    .nav-tabs { padding: 0 1rem; }
    .patient-row { grid-template-columns: 1fr auto; }
    .patient-row .hide-mobile { display: none; }
    .hide-mobile { display: none; }
  }
</style>
</head>
<body>

<!-- ============ AUTH SCREEN ============ -->
<div id="auth-screen" class="auth-wrapper">
  <div class="auth-card">
    <div style="margin-bottom: 32px;">
      <div style="width: 72px; height: 72px; background: #0f0f12; border: 1px solid rgba(245,241,232,0.08); display: flex; align-items: center; justify-content: center; border-radius: 14px; margin: 0 auto 16px;">
        <span class="vl-logo" style="font-size: 36px;">VL</span>
      </div>
      <div class="vl-logo" style="font-size: 22px;">Virtvs<span class="accent">Lab</span></div>
      <div class="tagline" style="margin-top: 6px;">Engineered for Peak Human Performance</div>
    </div>
    <div id="auth-error" class="auth-msg-error hidden"></div>
    <div id="auth-success" class="auth-msg-ok hidden"></div>

    <div id="auth-form-login">
      <input id="auth-email" type="email" placeholder="Email" class="auth-input" />
      <input id="auth-pass" type="password" placeholder="Contraseña" class="auth-input" />
      <button onclick="handleLogin()" class="auth-button">Iniciar sesión</button>
      <div style="margin-top: 16px; font-size: 12px; color: var(--text-faint);">
        ¿Sos paciente nuevo? <a href="#" onclick="showRegister()" style="color: var(--blue); text-decoration: none;">Registrate</a>
      </div>
    </div>

    <div id="auth-form-register" class="hidden">
      <input id="reg-name" type="text" placeholder="Nombre completo" class="auth-input" />
      <input id="reg-email" type="email" placeholder="Email" class="auth-input" />
      <input id="reg-pass" type="password" placeholder="Contraseña (mín. 6)" class="auth-input" />
      <button onclick="handleRegister()" class="auth-button">Crear cuenta</button>
      <div style="margin-top: 16px; font-size: 12px; color: var(--text-faint);">
        ¿Ya tenés cuenta? <a href="#" onclick="showLogin()" style="color: var(--blue); text-decoration: none;">Iniciá sesión</a>
      </div>
    </div>

    <div style="margin-top: 28px; font-size: 10px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase;">
      Acceso supervisado · medicus sui
    </div>
  </div>
</div>

<!-- ============ APP WRAPPER ============ -->
<div id="app-wrapper" class="hidden">
  <div id="app"></div>
</div>

<!-- ============ EXTERNAL SCRIPTS ============ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- ============ APP SCRIPT ============ -->
<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://pybkzlslfbwoktyvcwhk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_obpv0u23Rf4O-EChOmOg3w_jT7-C3Lf';

const WHOOP_CLIENT_ID = '708dc8a7-b891-46ab-af98-5d5049a1502c';
const WHOOP_REDIRECT_URI = window.location.origin + '/api/whoop-callback';
const WHOOP_SCOPES = 'offline read:recovery read:sleep read:workout read:cycles read:profile read:body_measurement';

let _supabase = null;
try {
  if (window.supabase && window.supabase.createClient) {
    _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
} catch(e) { console.error('Supabase init:', e); }

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let currentProfile = null;
let activeView = 'auth'; // 'auth' | 'onboarding' | 'athlete' | 'doctor'
let activeSection = 'dashboard';
let onboardingStep = 1;
let onboardingData = {
  full_name: '', sex: 'M', birth_date: '', height_cm: '', weight_kg: '',
  main_goal: '', goals: [],
};

let selectedPatientId = null;
let selectedPatientProfile = null;
let selectedPatientData = null;

let athleteData = {
  whoopRecovery: [],
  whoopSleep: [],
  whoopCycles: [],
  sessions: [],
  habitChecks: {},
  goals: [],
  whoopConnected: false,
  whoopTokens: null,
};

// ============================================================
// UTILS
// ============================================================
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function todayISO() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function ageFromDate(birthISO) {
  if (!birthISO) return null;
  const b = new Date(birthISO);
  const t = new Date();
  let age = t.getFullYear() - b.getFullYear();
  const m = t.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && t.getDate() < b.getDate())) age--;
  return age;
}

function safeChart(canvasId, config) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  const existing = Chart.getChart(canvas);
  if (existing) existing.destroy();
  return new Chart(canvas, config);
}

function fmt(n, dec) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toFixed(dec || 0);
}

function avg(arr, key) {
  const vals = arr.map(x => key ? x[key] : x).filter(v => v !== null && v !== undefined && !isNaN(v));
  if (!vals.length) return null;
  return vals.reduce((s, v) => s + Number(v), 0) / vals.length;
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  const ok = document.getElementById('auth-success');
  ok.classList.add('hidden');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function showAuthSuccess(msg) {
  const el = document.getElementById('auth-success');
  const er = document.getElementById('auth-error');
  er.classList.add('hidden');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function clearAuthMsgs() {
  document.getElementById('auth-error').classList.add('hidden');
  document.getElementById('auth-success').classList.add('hidden');
}

// ============================================================
// AUTH
// ============================================================
async function initAuth() {
  if (!_supabase) {
    showAuthError('Error cargando Supabase. Recargá la página.');
    return;
  }
  const { data: { session } } = await _supabase.auth.getSession();
  if (session) {
    currentUser = session.user;
    await onSignedIn();
  } else {
    showAuthScreen();
  }
  _supabase.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      await onSignedIn();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      currentProfile = null;
      showAuthScreen();
    }
  });
}

async function onSignedIn() {
  const profile = await loadProfile();
  if (!profile) {
    // Create empty profile if missing (trigger should have created it but just in case)
    await _supabase.from('profiles').insert({ id: currentUser.id, full_name: '' });
    currentProfile = { id: currentUser.id, full_name: '', role: 'athlete', profile_complete: false };
  } else {
    currentProfile = profile;
  }
  hideAuthScreen();
  await handleWhoopAuthCallback();
  routeUser();
}

async function loadProfile() {
  const { data, error } = await _supabase
    .from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
  if (error) console.warn('loadProfile:', error);
  return data;
}

function showAuthScreen() {
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app-wrapper').classList.add('hidden');
}
function hideAuthScreen() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app-wrapper').classList.remove('hidden');
}

window.showRegister = function() {
  document.getElementById('auth-form-login').classList.add('hidden');
  document.getElementById('auth-form-register').classList.remove('hidden');
  clearAuthMsgs();
};
window.showLogin = function() {
  document.getElementById('auth-form-register').classList.add('hidden');
  document.getElementById('auth-form-login').classList.remove('hidden');
  clearAuthMsgs();
};

window.handleLogin = async function() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  if (!email || !pass) { showAuthError('Completá email y contraseña.'); return; }
  try {
    const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
  } catch(e) {
    showAuthError(e.message || 'Error al iniciar sesión.');
  }
};

window.handleRegister = async function() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if (!name || !email || !pass) { showAuthError('Completá todos los campos.'); return; }
  if (pass.length < 6) { showAuthError('Contraseña mín. 6 caracteres.'); return; }
  try {
    const { data, error } = await _supabase.auth.signUp({
      email, password: pass,
      options: { data: { full_name: name } }
    });
    if (error) throw error;
    if (data.user && !data.session) {
      showAuthSuccess('Cuenta creada. Revisá tu email para confirmar y después iniciá sesión.');
    }
  } catch(e) {
    showAuthError(e.message || 'Error al registrarse.');
  }
};

window.handleSignOut = async function() {
  if (!confirm('¿Cerrar sesión?')) return;
  await _supabase.auth.signOut();
};

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const authVisible = !document.getElementById('auth-screen').classList.contains('hidden');
  if (!authVisible) return;
  const regVisible = !document.getElementById('auth-form-register').classList.contains('hidden');
  if (regVisible) handleRegister();
  else handleLogin();
});

// ============================================================
// ROUTING
// ============================================================
function routeUser() {
  if (!currentProfile) { showAuthScreen(); return; }
  const role = currentProfile.role || 'athlete';
  if (role === 'doctor' || role === 'admin') {
    activeView = 'doctor';
    activeSection = 'patients';
    loadDoctorData().then(render);
  } else {
    if (!currentProfile.profile_complete) {
      activeView = 'onboarding';
      onboardingStep = 1;
      onboardingData.full_name = currentProfile.full_name || '';
      render();
    } else {
      activeView = 'athlete';
      activeSection = 'dashboard';
      loadAthleteData().then(render);
    }
  }
}

// ============================================================
// DATA LAYER — ATHLETE
// ============================================================
async function loadAthleteData(userId) {
  const uid = userId || currentUser.id;
  try {
    const [rec, slp, cyc, sess, hab, gol, tok] = await Promise.all([
      _supabase.from('whoop_recovery').select('*').eq('user_id', uid).order('date', { ascending: true }),
      _supabase.from('whoop_sleep').select('*').eq('user_id', uid).order('date', { ascending: true }),
      _supabase.from('whoop_cycles').select('*').eq('user_id', uid).order('date', { ascending: true }),
      _supabase.from('sessions').select('*').eq('user_id', uid).order('date', { ascending: false }),
      _supabase.from('habit_checks').select('*').eq('user_id', uid).eq('date', todayISO()),
      _supabase.from('goals').select('*').eq('user_id', uid).order('created_at', { ascending: false }),
      _supabase.from('whoop_tokens').select('*').eq('user_id', uid).maybeSingle(),
    ]);
    const habChecks = {};
    (hab.data || []).forEach(h => { habChecks[h.habit_id] = h.done; });
    return {
      whoopRecovery: rec.data || [],
      whoopSleep: slp.data || [],
      whoopCycles: cyc.data || [],
      sessions: sess.data || [],
      habitChecks: habChecks,
      goals: gol.data || [],
      whoopConnected: !!tok.data,
      whoopTokens: tok.data || null,
    };
  } catch(e) {
    console.warn('loadAthleteData:', e);
    return { whoopRecovery: [], whoopSleep: [], whoopCycles: [], sessions: [], habitChecks: {}, goals: [], whoopConnected: false, whoopTokens: null };
  }
}

// Wrapper para el atleta logueado (escribe a athleteData)
async function loadOwnAthleteData() {
  athleteData = await loadAthleteData(currentUser.id);
}

async function saveHabitCheck(habitId, done) {
  if (!currentUser) return;
  const { error } = await _supabase.from('habit_checks').upsert({
    user_id: currentUser.id, habit_id: habitId, date: todayISO(), done: done,
  }, { onConflict: 'user_id,habit_id,date' });
  if (error) console.warn('saveHabitCheck:', error);
}

async function addSession(session) {
  if (!currentUser) return;
  session.id = 's_' + Date.now();
  const { error } = await _supabase.from('sessions').insert({
    id: session.id, user_id: currentUser.id,
    day_index: session.dayIndex, date: session.date,
    exercises: session.exercises, aerobics: session.aerobics || [],
    rpe: session.rpe, notes: session.notes,
  });
  if (error) console.warn('addSession:', error);
}

async function deleteSessionById(id) {
  const { error } = await _supabase.from('sessions').delete().eq('id', id);
  if (error) console.warn('deleteSession:', error);
}

async function saveGoal(goal) {
  if (!currentUser) return null;
  if (goal.id) {
    const { error } = await _supabase.from('goals').update({
      title: goal.title, description: goal.description, category: goal.category,
      current_value: goal.current_value, target_value: goal.target_value, unit: goal.unit,
      deadline: goal.deadline || null, priority: goal.priority,
      status: goal.status, pct_progress: goal.pct_progress, updated_at: new Date().toISOString(),
    }).eq('id', goal.id);
    if (error) console.warn('updateGoal:', error);
    return goal.id;
  } else {
    const { data, error } = await _supabase.from('goals').insert({
      user_id: currentUser.id,
      title: goal.title, description: goal.description, category: goal.category || 'performance',
      current_value: goal.current_value, target_value: goal.target_value, unit: goal.unit,

      status: 'active', pct_progress: 0,
    }).select().single();
    if (error) { console.warn('createGoal:', error); return null; }
    return data.id;
  }
}

let doctorPatients = [];

async function loadDoctorData() {
  if (!currentUser) return;

  if (doctorPatients.length > 0) {
    const ids = doctorPatients.map(p => p.id);
    const since = new Date(Date.now() - 7*86400000).toISOString().split('T')[0];
    const { data: recs } = await _supabase
      .from('whoop_recovery').select('user_id, date, recovery_score, hrv_rmssd, resting_hr')
      .in('user_id', ids).gte('date', since).order('date', { ascending: false });
    const latest = {};
    (recs || []).forEach(r => {
      if (!latest[r.user_id]) latest[r.user_id] = r;

    doctorPatients.forEach(p => { p._latestRecovery = latest[p.id] || null; });
  }
}

function connectWhoop() {
  const state = 'vl_' + Math.random().toString(36).substring(2, 15);
  const authUrl = 'https://api.prod.whoop.com/oauth/oauth2/auth'
    + '?client_id=' + WHOOP_CLIENT_ID
    + '&redirect_uri=' + encodeURIComponent(WHOOP_REDIRECT_URI)
    + '&response_type=code'
    + '&scope=' + encodeURIComponent(WHOOP_SCOPES)
    + '&state=' + state;
  window.location.href = authUrl;
}

async function disconnectWhoop() {
  if (!confirm('¿Desconectar WHOOP? Dejarás de recibir datos automáticos.')) return;
  const { error } = await _supabase.from('whoop_tokens').delete().eq('user_id', currentUser.id);
  if (error) { alert('Error: ' + error.message); return; }
  athleteData.whoopConnected = false;
  athleteData.whoopTokens = null;
  render();
}

async function handleWhoopAuthCallback() {
  if (!window.location.hash || !window.location.hash.includes('access_token')) return;
  const params = new URLSearchParams(window.location.hash.substring(1));
  const access_token = params.get('access_token');
  const refresh_token = params.get('refresh_token');
  const expires_in = parseInt(params.get('expires_in') || '3600');
  if (!access_token || !refresh_token) return;
  const expires_at = new Date(Date.now() + expires_in * 1000).toISOString();
  const { error } = await _supabase.from('whoop_tokens').upsert({
    user_id: currentUser.id, access_token, refresh_token, expires_at,
    updated_at: new Date().toISOString(),
  }, { onConflict: 'user_id' });
  if (error) {
    alert('Error guardando WHOOP: ' + error.message);
  } else {
    window.history.replaceState({}, document.title, window.location.pathname);
    alert('WHOOP conectado.');
  }
}

let _whoopSyncing = false;
async function syncWhoop() {
  if (_whoopSyncing) return;
  if (!athleteData.whoopTokens) return;
  _whoopSyncing = true;
  render();
  try {
    const tok = athleteData.whoopTokens;
    let newTokens = null;
    async function fetchType(type) {
      const res = await fetch('/api/whoop-sync', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          access_token: tok.access_token, refresh_token: tok.refresh_token,
          expires_at: tok.expires_at, type,
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(type + ': ' + (data.detail || data.error));
      if (data.newTokens) newTokens = data.newTokens;
      return data.records || [];
    }
    const recovery = await fetchType('recovery');
    const sleep = await fetchType('sleep');
    const cycles = await fetchType('cycles');
    if (newTokens) {
      await _supabase.from('whoop_tokens').update({
        access_token: newTokens.access_token || tok.access_token,
        refresh_token: newTokens.refresh_token || tok.refresh_token,
        expires_at: newTokens.expires_at || tok.expires_at,
        updated_at: new Date().toISOString(),
      }).eq('user_id', currentUser.id);
    }
    await saveWhoopToSupabase(recovery, sleep, cycles);
    await loadOwnAthleteData();
    alert('Sincronizado: ' + recovery.length + ' recovery / ' + sleep.length + ' sleep / ' + cycles.length + ' cycles');
  } catch(e) {
    alert('Error sync: ' + e.message);
  }
  _whoopSyncing = false;
  render();
}

async function saveWhoopToSupabase(recoveryArr, sleepArr, cyclesArr) {
  const recRows = []; const seenR = new Set();
  (recoveryArr || []).forEach(r => {
    const score = r.score || {};
    const date = (r.created_at || '').split('T')[0]; if (!date || seenR.has(date)) return;
    seenR.add(date);
    recRows.push({
      user_id: currentUser.id,
      cycle_id: r.cycle_id ? String(r.cycle_id) : null,
      sleep_id: r.sleep_id ? String(r.sleep_id) : null,
      date,
      recovery_score: Math.round(score.recovery_score || 0) || null,
      hrv_rmssd: score.hrv_rmssd_milli || null,
      resting_hr: Math.round(score.resting_heart_rate || 0) || null,
      spo2: score.spo2_percentage || null,
      skin_temp: score.skin_temp_celsius || null,
      raw_json: r,
    });
  });
  const sleepByDate = {};
  (sleepArr || []).forEach(s => {
    const score = s.score || {}; const stages = score.stage_summary || {};
    const date = (s.end || s.created_at || '').split('T')[0]; if (!date) return;
    const dur = stages.total_in_bed_time_milli || 0;
    if (!sleepByDate[date] || dur > sleepByDate[date].dur) sleepByDate[date] = { s, score, stages, dur };
  });
  const slpRows = Object.entries(sleepByDate).map(([date, info]) => {
    const { s, score, stages } = info;
    return {
      user_id: currentUser.id, sleep_id: s.id ? String(s.id) : null, date,
      total_sleep_min: Math.round((stages.total_in_bed_time_milli || 0) / 60000) || null,
      sleep_efficiency: score.sleep_efficiency_percentage || null,
      sleep_performance: score.sleep_performance_percentage || null,
      sleep_consistency: score.sleep_consistency_percentage || null,
      slow_wave_min: Math.round((stages.total_slow_wave_sleep_time_milli || 0) / 60000) || null,
      rem_min: Math.round((stages.total_rem_sleep_time_milli || 0) / 60000) || null,
      light_min: Math.round((stages.total_light_sleep_time_milli || 0) / 60000) || null,
      awake_min: Math.round((stages.total_awake_time_milli || 0) / 60000) || null,
      respiratory_rate: score.respiratory_rate || null,
      raw_json: s,
    };
  });
  const cycRows = []; const seenC = new Set();
  (cyclesArr || []).forEach(c => {
    const score = c.score || {};
    const date = (c.start || c.created_at || '').split('T')[0]; if (!date || seenC.has(date)) return;
    seenC.add(date);
    cycRows.push({
      user_id: currentUser.id, cycle_id: c.id ? String(c.id) : null, date,
      strain: score.strain || null, kilojoules: score.kilojoule || null,
      avg_hr: Math.round(score.average_heart_rate || 0) || null,
      max_hr: Math.round(score.max_heart_rate || 0) || null,
      raw_json: c,
    });
  });
  if (recRows.length) await _supabase.from('whoop_recovery').upsert(recRows, { onConflict: 'user_id,date' });
  if (slpRows.length) await _supabase.from('whoop_sleep').upsert(slpRows, { onConflict: 'user_id,date' });
  if (cycRows.length) await _supabase.from('whoop_cycles').upsert(cycRows, { onConflict: 'user_id,date' });
}

function renderEmptyHero() {
  return `

function baselineCard(label, value, unit, baselineVal) {
  return `
    <div class="metric">
      <div class="metric-label">${label}</div>
      <div class="metric-value">${value}<span class="unit">${unit}</span></div>
      <div class="metric-sub">${baselineVal !== null && baselineVal !== undefined ? 'baseline ' + baselineVal : '—'}</div>
    </div>
  `;
}

// ---------- HABITS ----------
function renderAthleteHabits() {
  const s = ATHLETE_SECTIONS[3];
  const checks = athleteData.habitChecks;
  const groups = [
    { key: 'circadian', label: 'Ritmo circadiano' },
    { key: 'recovery', label: 'Recuperación' },
    { key: 'health', label: 'Salud' },
    { key: 'mind', label: 'Mente' },
  ];
  const done = DEFAULT_HABITS.filter(h => checks[h.id]).length;
  const total = DEFAULT_HABITS.length;
  const score = Math.round(done / total * 100);
  return `
    ${sectionHeader(s)}
    <div class="card" style="background: var(--blue-dim); border-left: 3px solid var(--blue); padding: 18px 20px; margin-bottom: 18px;" class="row-between">
      <div class="row-between">
        <div>
          <div style="font-size: 10px; color: var(--blue); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600;">Disciplina hoy</div>
          <div style="font-size: 12px; color: var(--text-muted); margin-top: 5px; font-style: italic;">${escapeHtml(todayISO())}</div>
        </div>
        <div style="text-align: right;">
          <div class="num num-georgia" style="font-size: 44px; color: var(--blue); line-height: 1;">${score}<span style="font-size: 14px; color: var(--text-muted);">/100</span></div>
        </div>
      </div>
    </div>
    ${groups.map(g => {
      const items = DEFAULT_HABITS.filter(h => h.cat === g.key);
      if (!items.length) return '';
      const groupDone = items.filter(h => checks[h.id]).length;
      return `
        <div style="margin-bottom: 22px;">
          <div class="row-between" style="margin-bottom: 12px;">
            <div style="font-size: 11px; color: var(--blue); letter-spacing: 1.4px; text-transform: uppercase; font-weight: 600;">${g.label}</div>
            <div style="font-size: 11px; color: var(--text-faint); font-family: Georgia, serif;">${groupDone}/${items.length}</div>
          </div>
          <div class="stack">
            ${items.map(h => {
              const isDone = !!checks[h.id];
              return `
                <button onclick="toggleHabit('${h.id}')" style="text-align: left; display: flex; align-items: center; gap: 12px; padding: 13px 15px; border: 0.5px solid ${isDone ? 'var(--blue)' : 'var(--border)'}; background: ${isDone ? 'var(--blue-dim)' : 'var(--panel)'}; cursor: pointer; width: 100%; color: var(--text); border-radius: 4px;">
                  <div style="width: 18px; height: 18px; border: 1.5px solid ${isDone ? 'var(--blue)' : 'var(--text-muted)'}; background: ${isDone ? 'var(--blue)' : 'transparent'}; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border-radius: 3px;">
                    ${isDone ? '<span style="color: var(--bg); font-size: 12px; font-weight: 700;">✓</span>' : ''}
                  </div>
                  <div style="flex: 1; font-size: 12px; color: ${isDone ? 'var(--blue)' : 'var(--text)'};">${escapeHtml(h.name)}</div>
                </button>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }).join('')}
  `;
}

window.toggleHabit = async function(habitId) {
  const cur = !!athleteData.habitChecks[habitId];
  athleteData.habitChecks[habitId] = !cur;
  render();
  try {
    await saveHabitCheck(habitId, !cur);
  } catch(e) {
    athleteData.habitChecks[habitId] = cur;
    render();
    alert('No se pudo guardar el hábito.');
  }
};

          ${g.description ? `<div style="font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.5;">${escapeHtml(g.description)}</div>` : ''}
          ${g.current_value || g.target_value ? `
            <div style="font-size: 11px; color: var(--text-faint); margin-top: 4px;">
              ${g.current_value ? 'actual ' + escapeHtml(g.current_value) : ''}
              ${g.target_value ? ' → meta ' + escapeHtml(g.target_value) : ''}
              ${g.unit ? ' ' + escapeHtml(g.unit) : ''}

          ` : ''}
        </div>
        <div style="text-align: right;">
          <div class="num num-georgia" style="font-size: 20px;">${pct}<span style="font-size: 11px; color: var(--text-muted);">%</span></div>
        </div>
      </div>
      <div class="progress-track" style="margin-top: 8px;"><div class="progress-fill" style="width: ${pct}%; background: var(--blue);"></div></div>
      <div class="row" style="gap: 6px; margin-top: 10px; flex-wrap: wrap;">
        <button onclick="openGoalModal(${g.id})" class="btn btn-ghost btn-sm">Editar</button>
        <button onclick="updateGoalPct(${g.id}, ${Math.min(100, pct + 10)})" class="btn btn-ghost btn-sm">+10%</button>
        <button onclick="confirmDeleteGoal(${g.id})" class="btn btn-danger btn-sm">Borrar</button>
      </div>
    </div>
  `;
}

      <div class="card" style="padding: 18px;">
        <div class="grid-2" style="gap: 10px;">
          <div>
            <div style="font-size: 9px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;">Nombre</div>
            <input id="sp-name" type="text" value="${escapeHtml(p.full_name || '')}" class="auth-input" style="margin: 0;" />
          </div>
          <div>
            <div style="font-size: 9px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;">Fecha nacimiento</div>
            <input id="sp-birth" type="date" value="${p.birth_date || ''}" class="auth-input" style="margin: 0;" />
          </div>
          <div>
            <div style="font-size: 9px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;">Sexo</div>
            <select id="sp-sex" class="auth-input" style="margin: 0;">
              <option value="M" ${p.sex==='M'?'selected':''}>Masculino</option>
              <option value="F" ${p.sex==='F'?'selected':''}>Femenino</option>
              <option value="other" ${p.sex==='other'?'selected':''}>Otro</option>
            </select>
          </div>
          <div></div>
          <div>
            <div style="font-size: 9px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;">Altura (cm)</div>
            <input id="sp-h" type="number" value="${p.height_cm || ''}" class="auth-input" style="margin: 0;" />
          </div>
          <div>
            <div style="font-size: 9px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;">Peso (kg)</div>
            <input id="sp-w" type="number" step="0.1" value="${p.weight_kg || ''}" class="auth-input" style="margin: 0;" />
          </div>
        </div>
        <button onclick="saveProfileForm()" class="btn btn-primary" style="margin-top: 14px;">Guardar perfil</button>
      </div>
    </div>

    <div style="margin-bottom: 18px;">
      <div style="font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px;">Dispositivos</div>
      <div class="card" style="padding: 14px 18px;">
        <div class="row-between" style="gap: 12px;">
          <div>
            <div style="font-size: 13px; font-weight: 500;">WHOOP</div>
            <div style="font-size: 11px; color: ${athleteData.whoopConnected ? 'var(--green)' : 'var(--text-faint)'}; margin-top: 4px;">
              ${athleteData.whoopConnected ? '● Conectado' : '○ No conectado'}
            </div>
          </div>
          ${athleteData.whoopConnected
            ? `<div class="row" style="gap: 6px;">
                <button onclick="syncWhoop()" class="btn btn-ghost btn-sm" ${_whoopSyncing ? 'disabled' : ''}>${_whoopSyncing ? 'Sincronizando...' : 'Sincronizar'}</button>
                <button onclick="disconnectWhoop()" class="btn btn-danger btn-sm">Desconectar</button>
              </div>`
            : `<button onclick="connectWhoop()" class="btn btn-primary">Conectar</button>`
          }
        </div>
      </div>
    </div>

    <div style="margin-bottom: 18px;">
      <div style="font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px;">Cuenta</div>
      <div class="card" style="padding: 14px 18px;">
        <div style="font-size: 11px; color: var(--text-faint); margin-bottom: 8px;">${escapeHtml(currentUser ? currentUser.email : '')}</div>
        <button onclick="handleSignOut()" class="btn btn-danger">Cerrar sesión</button>
      </div>
    </div>
  `;
}

window.saveProfileForm = async function() {
  const patch = {
    full_name: document.getElementById('sp-name').value.trim(),
    birth_date: document.getElementById('sp-birth').value || null,
    sex: document.getElementById('sp-sex').value,
    height_cm: parseFloat(document.getElementById('sp-h').value) || null,
    weight_kg: parseFloat(document.getElementById('sp-w').value) || null,
  };
  await updateProfile(patch);
  alert('Perfil actualizado.');
  render();
};

// ============================================================
// DOCTOR PORTAL
// ============================================================
const DOCTOR_SECTIONS = [
  { id: 'patients', label: 'Pacientes' },
  { id: 'patient-detail', label: 'Detalle', hidden: true },
  { id: 'doctor-settings', label: 'Perfil' },
];

function renderDoctor() {
  return `
    <div style="background: var(--bg); min-height: 100vh;">
      <div class="sticky-header">
        ${renderHeaderShared(escapeHtml(currentProfile.full_name || 'Médico'), 'Pro · Médico')}
        <div class="nav-tabs">
          ${DOCTOR_SECTIONS.filter(s => !s.hidden).map(s => `
            <button class="nav-tab ${activeSection===s.id?'active':''}" onclick="setDoctorSection('${s.id}')">${s.label}</button>
          `).join('')}
          ${selectedPatientId ? `<button class="nav-tab ${activeSection==='patient-detail'?'active':''}" onclick="setDoctorSection('patient-detail')">${escapeHtml(selectedPatientProfile ? (selectedPatientProfile.full_name || 'Paciente') : 'Paciente')}</button>` : ''}
        </div>
      </div>
      <div style="padding: 1.5rem 2rem;">
        ${activeSection === 'patients' ? renderPatientsList() : ''}
        ${activeSection === 'patient-detail' ? renderPatientDetail() : ''}
        ${activeSection === 'doctor-settings' ? renderDoctorSettings() : ''}
      </div>
      ${renderFooter()}
    </div>
  `;
}

window.setDoctorSection = function(s) {
  activeSection = s;
  if (s !== 'patient-detail') {
    selectedPatientId = null;
    selectedPatientProfile = null;
    selectedPatientData = null;
  }
  render();
};

function renderPatientsList() {
  return `
    <div class="section-title-block">
      <div class="section-title">Pacientes</div>
      <div class="section-sub latin">Cura aliorum · ad virtutem</div>
    </div>
    <div class="row-between" style="margin-bottom: 14px;">
      <div style="font-size: 11px; color: var(--text-muted);">${doctorPatients.length} ${doctorPatients.length === 1 ? 'paciente' : 'pacientes'}</div>
      <button onclick="refreshDoctor()" class="btn btn-ghost btn-sm">Actualizar</button>
    </div>
    ${doctorPatients.length === 0 ? `
      <div class="card" style="padding: 30px; text-align: center; color: var(--text-faint); font-size: 12px;">
        Todavía no hay pacientes registrados.
      </div>
    ` : `
      <div class="stack">
        ${doctorPatients.map(p => renderPatientRow(p)).join('')}
      </div>
    `}
  `;
}

function renderPatientRow(p) {
  const r = p._latestRecovery;
  const recScore = r ? r.recovery_score : null;
  const recColor = recScore === null ? 'var(--text-faint)' : recScore >= 67 ? 'var(--green)' : recScore >= 34 ? 'var(--yellow)' : 'var(--red)';
  const age = ageFromDate(p.birth_date);
  return `
    <div class="patient-row" onclick="openPatient('${p.id}')">
      <div style="min-width: 0;">
        <div style="font-size: 13px; font-weight: 500;">${escapeHtml(p.full_name || '(sin nombre)')}</div>
        <div style="font-size: 10px; color: var(--text-faint); margin-top: 3px;">
          ${age !== null ? age + ' años' : ''}${p.sex ? ' · ' + escapeHtml(p.sex) : ''}${p.weight_kg ? ' · ' + p.weight_kg + ' kg' : ''}
        </div>
      </div>
      <div class="hide-mobile" style="text-align: center;">
        <div style="font-size: 9px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase;">HRV</div>
        <div class="num num-georgia" style="font-size: 16px; margin-top: 2px;">${r && r.hrv_rmssd ? Math.round(r.hrv_rmssd) : '—'}</div>
      </div>
      <div style="text-align: center;">
        <div style="font-size: 9px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase;">Recovery</div>
        <div class="num num-georgia" style="font-size: 16px; margin-top: 2px; color: ${recColor};">${recScore !== null ? recScore + '%' : '—'}</div>
      </div>
      <div style="font-size: 16px; color: var(--text-faint);">›</div>
    </div>
  `;
}

window.openPatient = async function(id) {
  await loadPatientDetail(id);
  activeSection = 'patient-detail';
  render();
};

window.refreshDoctor = async function() {
  await loadDoctorData();
  render();
};

function renderPatientDetail() {
  if (!selectedPatientProfile) {
    return `<div class="card" style="padding: 20px;">Cargando paciente...</div>`;
  }
  const p = selectedPatientProfile;
  const d = selectedPatientData;
  const last = (d.whoopRecovery && d.whoopRecovery.length) ? d.whoopRecovery[d.whoopRecovery.length - 1] : null;
  const lastSlp = (d.whoopSleep && d.whoopSleep.length) ? d.whoopSleep[d.whoopSleep.length - 1] : null;
  const age = ageFromDate(p.birth_date);
  const habitsDone = Object.values(d.habitChecks || {}).filter(Boolean).length;
  return `
    <div class="row-between" style="margin-bottom: 14px; flex-wrap: wrap; gap: 10px;">
      <button onclick="setDoctorSection('patients')" class="btn btn-ghost btn-sm">‹ Volver a pacientes</button>
      <div style="font-size: 11px; color: var(--text-faint);">${escapeHtml(currentUser.email)}</div>
    </div>

    <div class="section-title-block">
      <div class="section-title">${escapeHtml(p.full_name || '(sin nombre)')}</div>
      <div class="section-sub">
        ${age !== null ? age + ' años' : '—'}${p.sex ? ' · ' + escapeHtml(p.sex) : ''}${p.height_cm ? ' · ' + p.height_cm + ' cm' : ''}${p.weight_kg ? ' · ' + p.weight_kg + ' kg' : ''}
      </div>
    </div>

    ${p.main_goal ? `
      <div class="card" style="border-left: 3px solid var(--blue); padding: 14px 18px; margin-bottom: 14px;">
        <div style="font-size: 9px; color: var(--blue); letter-spacing: 1.2px; text-transform: uppercase; font-weight: 500; margin-bottom: 4px;">Objetivo principal</div>
        <div style="font-size: 12px; line-height: 1.6;">${escapeHtml(p.main_goal)}</div>
      </div>
    ` : ''}

    <div class="grid-4" style="margin-bottom: 12px;">
      ${baselineCard('HRV', last && last.hrv_rmssd ? Math.round(last.hrv_rmssd) : '—', 'ms', null)}
      ${baselineCard('FC reposo', last && last.resting_hr ? last.resting_hr : '—', 'bpm', null)}
      ${baselineCard('Recovery', last && last.recovery_score !== null ? last.recovery_score : '—', '%', null)}
      ${baselineCard('Sueño', lastSlp && lastSlp.total_sleep_min ? (lastSlp.total_sleep_min/60).toFixed(1) : '—', 'h', null)}
    </div>

    <div class="grid-3" style="margin-bottom: 14px;">
      <div class="metric"><div class="metric-label">Hábitos hoy</div><div class="metric-value">${habitsDone}<span class="unit">/${DEFAULT_HABITS.length}</span></div><div class="metric-sub">cargados por el paciente</div></div>
      <div class="metric"><div class="metric-label">Sesiones</div><div class="metric-value">${d.sessions ? d.sessions.length : 0}<span class="unit"></span></div><div class="metric-sub">total registradas</div></div>
      <div class="metric"><div class="metric-label">Objetivos</div><div class="metric-value">${d.goals ? d.goals.length : 0}<span class="unit"></span></div><div class="metric-sub">activos</div></div>
    </div>

    <div class="card" style="padding: 16px 20px; margin-bottom: 12px;">
      <div style="font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 14px;">HRV — últimos 60 días</div>
      <div style="position: relative; height: 220px;"><canvas id="patientHrvChart"></canvas></div>
    </div>

    <div class="card" style="padding: 16px 20px; margin-bottom: 12px;">
      <div style="font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 14px;">Strain — últimos 60 días</div>
      <div style="position: relative; height: 220px;"><canvas id="patientStrainChart"></canvas></div>
    </div>

    ${d.goals && d.goals.length ? `
      <div style="margin-bottom: 14px;">
        <div style="font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px;">Objetivos del paciente</div>
        <div class="stack">
          ${d.goals.map(g => `
            <div class="card" style="padding: 12px 14px;">
              <div class="row-between">
                <div>
                  <div style="font-size: 12px; font-weight: 500;">${escapeHtml(g.title)}</div>
                  ${g.description ? `<div style="font-size: 10px; color: var(--text-muted); margin-top: 3px;">${escapeHtml(g.description)}</div>` : ''}
                </div>
                <div class="num num-georgia" style="font-size: 16px;">${g.pct_progress || 0}<span style="font-size: 10px; color: var(--text-muted);">%</span></div>
              </div>
              <div class="progress-track" style="margin-top: 8px;"><div class="progress-fill" style="width: ${g.pct_progress || 0}%;"></div></div>
            </div>
          `).join('')}
        </div>
      </div>
    ` : ''}

    ${d.sessions && d.sessions.length ? `
      <div>
        <div style="font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px;">Últimas sesiones</div>
        <div class="stack">
          ${d.sessions.slice(0, 8).map(s => `
            <div class="card" style="padding: 12px 14px;">
              <div class="row-between">
                <div>
                  <div style="font-size: 12px; font-weight: 500;">${escapeHtml(s.date)}</div>
                  <div style="font-size: 10px; color: var(--text-faint); margin-top: 3px;">RPE ${s.rpe || '—'}/10</div>
                </div>
              </div>
              ${s.notes ? `<div style="font-size: 11px; color: var(--text-muted); margin-top: 8px; font-style: italic; line-height: 1.5;">${escapeHtml(s.notes)}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    ` : ''}
  `;
}

function drawPatientCharts() {
  const d = selectedPatientData;
  if (!d) return;
  const rec = (d.whoopRecovery || []).slice(-60);
  const cyc = (d.whoopCycles || []).slice(-60);
  if (rec.length) {
    safeChart('patientHrvChart', {
      type: 'line',
      data: { labels: rec.map(r => r.date.substring(5)), datasets: [{ data: rec.map(r => r.hrv_rmssd), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.12)', tension: 0.3, fill: true, pointRadius: 0, borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { maxTicksLimit: 8, font: { size: 9 }, color: '#a8a59c' }, grid: { color: 'rgba(245,241,232,0.08)' } }, y: { ticks: { font: { size: 9 }, color: '#a8a59c' }, grid: { color: 'rgba(245,241,232,0.08)' } } } }
    });
  }
  if (cyc.length) {
    safeChart('patientStrainChart', {
      type: 'bar',
      data: { labels: cyc.map(c => c.date.substring(5)), datasets: [{ data: cyc.map(c => c.strain), backgroundColor: cyc.map(c => c.strain > 15 ? '#b84040' : c.strain > 10 ? '#b8893f' : '#3b82f6') }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { maxTicksLimit: 8, font: { size: 9 }, color: '#a8a59c' }, grid: { color: 'rgba(245,241,232,0.08)' } }, y: { ticks: { font: { size: 9 }, color: '#a8a59c' }, grid: { color: 'rgba(245,241,232,0.08)' } } } }
    });
  }
}

function renderDoctorSettings() {
  const p = currentProfile;
  return `
    <div class="section-title-block">
      <div class="section-title">Perfil</div>
      <div class="section-sub latin">Cura sui · ad virtutem</div>
    </div>
    <div class="card" style="padding: 18px;">
      <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.6;">
        Cuenta de médico. Tenés acceso de lectura a los datos de todos los atletas registrados.
      </div>
      <div class="grid-2" style="gap: 10px;">
        <div>
          <div style="font-size: 9px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;">Nombre</div>
          <input id="dp-name" type="text" value="${escapeHtml(p.full_name || '')}" class="auth-input" style="margin: 0;" />
        </div>
        <div>
          <div style="font-size: 9px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;">Email</div>
          <input type="email" value="${escapeHtml(currentUser ? currentUser.email : '')}" disabled class="auth-input" style="margin: 0; opacity: 0.6;" />
        </div>
      </div>
      <button onclick="saveDoctorProfileForm()" class="btn btn-primary" style="margin-top: 14px;">Guardar</button>
    </div>
    <div style="margin-top: 18px;">
      <button onclick="handleSignOut()" class="btn btn-danger">Cerrar sesión</button>
    </div>
  `;
}

window.saveDoctorProfileForm = async function() {
  await updateProfile({ full_name: document.getElementById('dp-name').value.trim() });
  alert('Perfil actualizado.');
  render();
};

// ============================================================
// INIT
// ============================================================
initAuth();
</script>
</body>
</html>
